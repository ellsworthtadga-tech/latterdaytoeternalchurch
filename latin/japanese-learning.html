<title>日本語道 — The Path of Japanese</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #1a0a0a;
  --bg-warm: #2a1810;
  --bg-card: #33201a;
  --bg-card-hover: #3d2820;
  --red-primary: #c0392b;
  --red-light: #e74c3c;
  --red-deep: #8b1a1a;
  --gold: #d4a843;
  --gold-light: #e8c96a;
  --cream: #f5e6d3;
  --cream-light: #faf3eb;
  --text-primary: #f0e0d0;
  --text-secondary: #b8a090;
  --text-muted: #8a7060;
  --ink: #2c1810;
  --green-correct: #4a7c59;
  --green-light: #6bac7a;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
  --radius: 12px;
  --radius-sm: 8px;
  --safe-bottom: env(safe-area-inset-bottom);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Noto Sans JP','Crimson Pro',sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh; min-height: 100dvh;
  overflow-x: hidden;
}
body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(192,57,43,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(212,168,67,0.06) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}
.screen { display:none; min-height:100vh; min-height:100dvh; position:relative; z-index:1; }
.screen.active { display:flex; flex-direction:column; }

/* HOME */
.home-screen { align-items:center; justify-content:center; padding:2rem 1.5rem; text-align:center; }
.home-emblem {
  width:100px; height:100px;
  border:2px solid var(--red-primary); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Noto Serif JP',serif; font-size:2.4rem; color:var(--red-light);
  margin-bottom:1.5rem; position:relative;
  animation: emblemFade 1.2s ease-out;
}
.home-emblem::after { content:''; position:absolute; inset:-6px; border:1px solid rgba(192,57,43,0.3); border-radius:50%; }
@keyframes emblemFade { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
.home-title { font-family:'Noto Serif JP',serif; font-size:2rem; font-weight:700; color:var(--cream); letter-spacing:0.08em; margin-bottom:0.3rem; animation:slideUp .8s ease-out .2s both; }
.home-subtitle { font-family:'Crimson Pro',serif; font-size:1.1rem; font-weight:300; font-style:italic; color:var(--text-secondary); margin-bottom:0.5rem; animation:slideUp .8s ease-out .35s both; }
.home-tagline { font-size:0.82rem; color:var(--text-muted); margin-bottom:2.5rem; animation:slideUp .8s ease-out .45s both; }
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.home-nav { display:flex; flex-direction:column; gap:0.8rem; width:100%; max-width:340px; }
.home-btn {
  display:flex; align-items:center; gap:1rem;
  padding:1rem 1.2rem; background:var(--bg-card);
  border:1px solid rgba(192,57,43,0.2); border-radius:var(--radius);
  color:var(--text-primary); font-family:'Noto Sans JP',sans-serif;
  font-size:0.95rem; cursor:pointer; transition:all 0.25s; text-align:left;
  animation:slideUp .6s ease-out both;
}
.home-btn:nth-child(1){animation-delay:.5s} .home-btn:nth-child(2){animation-delay:.6s}
.home-btn:nth-child(3){animation-delay:.7s} .home-btn:nth-child(4){animation-delay:.8s}
.home-btn:nth-child(5){animation-delay:.9s} .home-btn:nth-child(6){animation-delay:1s}
.home-btn:hover,.home-btn:active { background:var(--bg-card-hover); border-color:var(--red-primary); transform:translateX(4px); }
.btn-icon { font-size:1.5rem; width:40px; text-align:center; flex-shrink:0; }
.btn-text { display:flex; flex-direction:column; }
.btn-label { font-weight:500; }
.btn-desc { font-size:0.75rem; color:var(--text-muted); margin-top:2px; font-family:'Crimson Pro',serif; }

/* TOP BAR */
.top-bar {
  display:flex; align-items:center; padding:0.8rem 1rem;
  background:rgba(26,10,10,0.9); backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(192,57,43,0.15);
  position:sticky; top:0; z-index:100;
  padding-top: calc(0.8rem + env(safe-area-inset-top));
}
.back-btn { background:none; border:none; color:var(--red-light); font-size:1.4rem; cursor:pointer; padding:0.3rem; margin-right:0.8rem; line-height:1; }

// ===== FLASHCARDS =====
function initFlashcards() {
  const cats = Object.keys(vocabulary);
  if(!currentCategory || !vocabulary[currentCategory]) currentCategory = cats[0];
  document.getElementById('fc-categories').innerHTML = cats.map(c =>
    '<button class="cat-pill '+(c===currentCategory?'active':'')+'" onclick="selectFCCat(\x27'+c.replace(/'/g,"\\\x27")+'\x27)">'+c+'</button>'
  ).join('');
  loadCards();
}
function selectFCCat(c) { currentCategory=c; currentCardIndex=0; initFlashcards(); }
function loadCards() {
  currentCards = [...vocabulary[currentCategory]];
  for(let i=currentCards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[currentCards[i],currentCards[j]]=[currentCards[j],currentCards[i]];}
  currentCardIndex=0; renderCard();
}
function renderCard() {
  const c=currentCards[currentCardIndex]; if(!c) return;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('fc-kana').textContent=c.kana;
  document.getElementById('fc-reading').textContent=c.romaji;
  document.getElementById('fc-english').textContent=c.english;
  document.getElementById('fc-romaji').textContent=c.romaji;
  document.getElementById('fc-example').textContent=c.example||'';
  document.getElementById('fc-example-en').textContent=c.exEn||'';
  document.getElementById('fc-counter').textContent=(currentCardIndex+1)+' / '+currentCards.length;
  document.getElementById('fc-count').textContent=(currentCardIndex+1)+'/'+currentCards.length;
  document.getElementById('fc-progress').style.width=((currentCardIndex+1)/currentCards.length*100)+'%';
}
function flipCard(){document.getElementById('flashcard').classList.toggle('flipped');}
function nextCard(){if(currentCardIndex<currentCards.length-1){currentCardIndex++;renderCard();}}
function prevCard(){if(currentCardIndex>0){currentCardIndex--;renderCard();}}

function setQuizMode(mode, btn) {
  quizMode=mode;
  document.querySelectorAll('.quiz-mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  startQuiz();
}
function initQuiz() {
  const cats = Object.keys(vocabulary);
  if(!currentCategory || !vocabulary[currentCategory]) currentCategory = cats[0];
  document.getElementById('quiz-categories').innerHTML = cats.map(c =>
    '<button class="cat-pill '+(c===currentCategory?'active':'')+'" onclick="selectQuizCat(\x27'+c.replace(/'/g,"\\\x27")+'\x27)">'+c+'</button>'
  ).join('');
  startQuiz();
}
function selectQuizCat(c) { currentCategory=c; initQuiz(); }
function startQuiz() {
  document.getElementById('quiz-area').style.display='block';
  document.getElementById('quiz-results').style.display='none';
  const all=[...vocabulary[currentCategory]];
  for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  quizQuestions=all.slice(0,Math.min(quizTotal,all.length));
  quizIndex=0; quizCorrect=0; updateQuizScore(); renderQuizQ();
}
function renderQuizQ() {
  if(quizIndex>=quizQuestions.length){showQuizResults();return;}
  const q=quizQuestions[quizIndex];
  const allVocab=Object.values(vocabulary).flat();
  let prompt,display,hint='',options;

  if(quizMode==='en') {
    prompt='What does this mean?';
    display=q.kana; hint=q.romaji;
    const wrong=allVocab.filter(w=>w.english!==q.english).sort(()=>Math.random()-0.5).slice(0,3).map(w=>w.english);
    options=[...wrong,q.english].sort(()=>Math.random()-0.5);
  } else if(quizMode==='kana') {
    prompt='Which is the correct kana?';
    display=q.english; hint='';
    const wrong=allVocab.filter(w=>w.kana!==q.kana).sort(()=>Math.random()-0.5).slice(0,3).map(w=>w.kana);
    options=[...wrong,q.kana].sort(()=>Math.random()-0.5);
  } else {
    prompt='Match the romaji to kana:';
    display=q.romaji; hint='';
    const wrong=allVocab.filter(w=>w.kana!==q.kana).sort(()=>Math.random()-0.5).slice(0,3).map(w=>w.kana);
    options=[...wrong,q.kana].sort(()=>Math.random()-0.5);
  }

  document.getElementById('quiz-prompt').textContent=prompt;
  document.getElementById('quiz-word').textContent=display;
  document.getElementById('quiz-reading').textContent=hint;
  document.getElementById('quiz-feedback').innerHTML='<button class="quiz-next-btn" onclick="nextQuizQ()">Next \u2192</button>';

  const correctAnswer = quizMode==='en' ? q.english : q.kana;
  document.getElementById('quiz-options').innerHTML=options.map(opt => {
    const escaped = opt.replace(/'/g,"\\\x27");
    const correctEscaped = correctAnswer.replace(/'/g,"\\\x27");
    return '<button class="quiz-option" onclick="checkQuiz(this,\x27'+escaped+'\x27,\x27'+correctEscaped+'\x27)">'+opt+'</button>';
  }).join('');
}
function checkQuiz(btn,selected,correct) {
  document.querySelectorAll('.quiz-option').forEach(o=>{o.classList.add('disabled');if(o.textContent===correct)o.classList.add('correct');});
  if(selected===correct){
    quizCorrect++; btn.classList.add('correct');
    document.getElementById('quiz-feedback').innerHTML='<div style="color:var(--green-light)">正解！ Correct!</div><button class="quiz-next-btn visible" onclick="nextQuizQ()">Next \u2192</button>';
  } else {
    btn.classList.add('wrong');
    document.getElementById('quiz-feedback').innerHTML='<div style="color:var(--red-light)">残念\u2026 Answer: '+correct+'</div><button class="quiz-next-btn visible" onclick="nextQuizQ()">Next \u2192</button>';
  }
  updateQuizScore();
}
function nextQuizQ(){quizIndex++;renderQuizQ();}
function updateQuizScore(){document.getElementById('quiz-score-badge').textContent=quizCorrect+' / '+quizIndex;}
function showQuizResults(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('quiz-results').style.display='block';
  document.getElementById('quiz-final-score').textContent=quizCorrect+' / '+quizQuestions.length;
}

// ===== KANA =====
function showKana(type,btn) {
  currentKanaType=type;
  document.querySelectorAll('.kana-toggle-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderKana();
}
function renderKana() {
  let data;
  if(currentKanaType==='hiragana') data=hiragana;
  else if(currentKanaType==='katakana') data=katakana;
  else data=dakuten;
  document.getElementById('kana-grid').innerHTML=data.map(([ch,rom])=>{
    if(!ch) return '<div class="kana-cell empty"></div>';
    return '<div class="kana-cell" onclick="showKanaPopup(\x27'+ch+'\x27,\x27'+rom+'\x27)"><span class="kana-char">'+ch+'</span><span class="kana-rom">'+rom+'</span></div>';
  }).join('');
}
function showKanaPopup(ch,rom) {
  document.getElementById('popup-char').textContent=ch;
  document.getElementById('popup-rom').textContent=rom;
  const pair=kanaPairs[ch];
  const label=currentKanaType==='hiragana'?'Katakana':'Hiragana';
  document.getElementById('popup-pair').textContent=pair?label+': '+pair:'';
  document.getElementById('kana-popup').classList.add('active');
}
function closeKanaPopup(){document.getElementById('kana-popup').classList.remove('active');}

// ===== GRAMMAR =====
function initGrammar() {
  const lvls=Object.keys(grammarData);
  document.getElementById('grammar-levels').innerHTML=lvls.map(l=>
    '<button class="cat-pill '+(l===currentGrammarLevel?'active':'')+'" onclick="selectGramLvl(\x27'+l+'\x27)">'+l+'</button>'
  ).join('');
  renderGrammar();
}
function selectGramLvl(l){currentGrammarLevel=l;initGrammar();}
function renderGrammar(){
  document.getElementById('grammar-list').innerHTML=grammarData[currentGrammarLevel].map(g=>
    '<div class="grammar-card"><div class="grammar-pattern">'+g.pattern+'</div><div class="grammar-meaning">'+g.meaning+'</div><div class="grammar-example-jp">'+g.exJp+'</div><div class="grammar-example-en">'+g.exEn+'</div><div class="grammar-note">'+g.note+'</div></div>'
  ).join('');
}

// ===== PHRASES =====
function initPhrases(){
  const cats=Object.keys(phrasesData);
  document.getElementById('phrase-categories').innerHTML=cats.map(c=>
    '<button class="cat-pill '+(c===currentPhraseCategory?'active':'')+'" onclick="selectPhraseCat(\x27'+c+'\x27)">'+c+'</button>'
  ).join('');
  renderPhrases();
}
function selectPhraseCat(c){currentPhraseCategory=c;initPhrases();}
function renderPhrases(){
  document.getElementById('phrase-list').innerHTML=phrasesData[currentPhraseCategory].map(p=>
    '<div class="phrase-card" onclick="this.classList.toggle(\x27expanded\x27)"><div class="phrase-jp">'+p.jp+'</div><div class="phrase-reading">'+p.reading+'</div><div class="phrase-en">'+p.en+'</div><div class="phrase-context">\ud83d\udca1 '+p.context+'</div></div>'
  ).join('');
}

// ===== SWIPE =====
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  const diff=e.changedTouches[0].clientX-touchStartX;
  if(document.getElementById('flashcards').classList.contains('active')){
    if(diff>60)prevCard(); else if(diff<-60)nextCard();
  }
});

showScreen('home');
</script>
</body>
</html>
