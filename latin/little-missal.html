<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Little Missal" />
  <meta name="theme-color" content="#faf4e8" />
  <title>The Little Missal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

  <style>
    :root {
      --vellum: #faf4e8;
      --vellum-dark: #f4eada;
      --vellum-deep: #ede0c4;
      --ink: #2a241d;
      --ink-soft: #5a4e3f;
      --ink-faint: #857764;
      --gold: #b08a3e;
      --gold-light: #d4b56b;
      --gold-dark: #866627;
      --lapis: #1f2d5c;
      --lapis-soft: #3a4a82;
      --vermillion: #a8342a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--vellum);
      background-image:
        radial-gradient(ellipse at top, rgba(176, 138, 62, 0.04), transparent 60%),
        radial-gradient(ellipse at bottom, rgba(31, 45, 92, 0.035), transparent 65%),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.45  0 0 0 0 0.38  0 0 0 0 0.28  0 0 0 0.055 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      color: var(--ink);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      min-height: 100dvh;
      max-width: 620px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding-top: calc(env(safe-area-inset-top) + 1.25rem);
      padding-bottom: calc(env(safe-area-inset-bottom) + 1rem);
      padding-left: calc(env(safe-area-inset-left) + 1.25rem);
      padding-right: calc(env(safe-area-inset-right) + 1.25rem);
    }

    .header { text-align: center; padding: 0.75rem 0 1.25rem; }

    .chi-rho {
      font-family: 'Cinzel', serif;
      font-size: 2.75rem;
      color: var(--gold);
      line-height: 1;
      margin: 0 0 0.35rem;
      text-shadow: 0 1px 0 rgba(255, 248, 230, 0.6);
      letter-spacing: -0.02em;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      letter-spacing: 0.22em;
      font-size: 1.15rem;
      color: var(--lapis);
      margin: 0 0 0.5rem;
      text-transform: uppercase;
    }

    .date-line {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--ink-soft);
      margin: 0.2rem 0 0.15rem;
    }

    .liturgical-day {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin: 0.4rem 0 0;
      min-height: 0.9em;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      margin: 0.25rem 0 0.5rem;
      color: var(--gold);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      max-width: 5.5rem;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold) 25%, var(--gold) 75%, transparent);
      opacity: 0.7;
    }
    .divider-ornament {
      font-size: 0.9rem;
      color: var(--gold);
      line-height: 1;
      transform: translateY(-1px);
    }

    main { flex: 1; }

    .card {
      background: linear-gradient(180deg, var(--vellum-dark) 0%, var(--vellum) 100%);
      border: 1px solid rgba(176, 138, 62, 0.3);
      border-radius: 3px;
      padding: 1.6rem 1.3rem 1.4rem;
      margin: 1rem 0;
      position: relative;
      box-shadow:
        0 1px 2px rgba(42, 36, 29, 0.08),
        0 4px 14px rgba(42, 36, 29, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .card-label {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin: 0 0 0.4rem;
      text-align: center;
    }

    .card-label-underline {
      display: block;
      width: 2rem;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 1rem;
      opacity: 0.6;
    }

    .theme-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      line-height: 1.55;
      color: var(--ink);
      margin: 0;
    }
    .theme-text::first-letter {
      font-family: 'Cinzel', serif;
      font-size: 3em;
      line-height: 0.82;
      float: left;
      padding: 0.08em 0.12em 0 0;
      color: var(--lapis);
      font-weight: 600;
    }

    .question-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-style: italic;
      font-size: 1.25rem;
      line-height: 1.5;
      color: var(--lapis);
      margin: 0;
      text-align: center;
    }

    .prayer-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      line-height: 1.65;
      color: var(--ink);
      margin: 0;
      text-align: center;
    }
    .prayer-text .amen {
      display: block;
      margin-top: 0.7rem;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--vermillion);
    }

    .gospel-ref {
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin: 1.25rem 0 0.25rem;
    }
    .gospel-ref::before, .gospel-ref::after {
      content: '·';
      margin: 0 0.7rem;
      color: var(--gold);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(176, 138, 62, 0.25);
      gap: 0.5rem;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-dark);
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.65rem 0.95rem;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s ease;
      min-height: 44px;
    }
    .nav-btn:hover:not(:disabled),
    .nav-btn:active:not(:disabled) {
      background: var(--gold);
      color: var(--vellum);
    }
    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .today-btn { flex: 0 0 auto; }

    .state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--ink-soft);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15rem;
    }
    .state-ornament {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 2.8rem;
      color: var(--gold);
      margin-bottom: 1rem;
      font-style: normal;
      opacity: 0.55;
    }

    .fade-in { animation: fadeIn 0.55s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 380px) {
      .theme-text { font-size: 1.22rem; }
      .question-text { font-size: 1.18rem; }
      .prayer-text { font-size: 1.12rem; }
      .nav-btn { padding: 0.6rem 0.7rem; font-size: 0.6rem; letter-spacing: 0.15em; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="chi-rho" aria-hidden="true">☧</div>
      <h1>The Little Missal</h1>
      <p class="date-line" id="dateLine">—</p>
      <p class="liturgical-day" id="liturgicalDay"></p>
    </header>

    <div class="divider" aria-hidden="true">
      <span class="divider-ornament">❦</span>
    </div>

    <main id="mainContent"></main>

    <nav class="nav">
      <button class="nav-btn" id="prevBtn" aria-label="Previous day">← Prev</button>
      <button class="nav-btn today-btn" id="todayBtn">Today</button>
      <button class="nav-btn" id="nextBtn" aria-label="Next day">Next →</button>
    </nav>
  </div>

  <script>
    // ============================================================
    // DAILY ENTRIES — Easter Season, Year C
    // Tuesday, April 21, 2026 → Sunday, May 10, 2026 (Mother's Day)
    // Regenerate this block monthly.
    // ============================================================
    const DAILY_ENTRIES = {
      "2026-04-21": {
        liturgicalDay: "Tuesday · 3rd Week of Easter",
        gospelReference: "John 6:30–35",
        theme: "Jesus says, \u201CI am the Bread of Life.\u201D When we stay close to him, our hearts will never feel empty or alone.",
        question: "What makes your heart feel full and happy? How might Jesus fill you up even more?",
        prayer: "Jesus, thank you for being the Bread of Life. Help me remember that you fill my heart with love. I want to stay close to you today."
      },
      "2026-04-22": {
        liturgicalDay: "Wednesday · 3rd Week of Easter",
        gospelReference: "John 6:35–40",
        theme: "Jesus promises that everyone who looks to him and trusts him will be with him forever. He does not want to lose even one of us.",
        question: "What do you think it means that Jesus wants to keep you close forever?",
        prayer: "Father, thank you for sending Jesus to bring us home to you. Help me trust you every day. Please keep me close to you."
      },
      "2026-04-23": {
        liturgicalDay: "Thursday · 3rd Week of Easter",
        gospelReference: "John 6:44–51",
        theme: "Jesus calls himself the living bread from heaven. When we receive him, he gives us a life that never ends.",
        question: "Jesus gives us life that lasts forever. How does that change the way you feel about today?",
        prayer: "Jesus, you are the living bread. Thank you for giving me a life that lasts forever. Help me love you more each day."
      },
      "2026-04-24": {
        liturgicalDay: "Friday · 3rd Week of Easter",
        gospelReference: "John 6:52–59",
        theme: "Jesus tells us that when we receive his Body and Blood in Holy Communion, he lives inside us and we live in him.",
        question: "What do you think happens inside your heart when you receive Jesus in Holy Communion?",
        prayer: "Jesus, thank you for giving me your very self in Holy Communion. Help me love you with a quiet, grateful heart."
      },
      "2026-04-25": {
        liturgicalDay: "Feast of St. Mark, Evangelist",
        gospelReference: "Mark 16:15–20",
        theme: "Jesus sent his friends out to tell everyone the good news that he loves us. St. Mark wrote one of the Gospels so we could hear it too.",
        question: "If someone asked you, \u201CWho is Jesus?\u201D \u2014 what is one thing you would tell them?",
        prayer: "Jesus, thank you for St. Mark, who told the world about you. Help me be brave like him and share your love with others."
      },
      "2026-04-26": {
        liturgicalDay: "4th Sunday of Easter · Good Shepherd Sunday",
        gospelReference: "John 10:27–30",
        theme: "Jesus is our Good Shepherd. He knows each of us by name, and we learn to know his voice when we listen with our hearts.",
        question: "How do you think Jesus speaks to you? Where do you hear his voice?",
        prayer: "Good Shepherd Jesus, thank you for knowing me and loving me. Help me listen for your voice today. Keep me close to you, like a lamb in your arms."
      },
      "2026-04-27": {
        liturgicalDay: "Monday · 4th Week of Easter",
        gospelReference: "John 10:1–10",
        theme: "Jesus says he is the gate for his sheep. When we follow him, we find safety, freedom, and a life full of joy.",
        question: "What does it feel like to know that Jesus keeps you safe?",
        prayer: "Jesus, thank you for being the gate that keeps me safe. Help me follow you and nobody else. I want to walk with you today."
      },
      "2026-04-28": {
        liturgicalDay: "Tuesday · 4th Week of Easter",
        gospelReference: "John 10:22–30",
        theme: "Jesus calls us his sheep, and he says no one can ever take us out of his hand. He holds us with a strong, loving grip.",
        question: "What does it feel like to know that Jesus is holding onto you?",
        prayer: "Jesus, thank you for holding me in your strong, gentle hand. I am safe because you love me. Please never let me go."
      },
      "2026-04-29": {
        liturgicalDay: "St. Catherine of Siena · Doctor of the Church",
        gospelReference: "Matthew 11:25–30",
        theme: "Jesus thanks the Father for showing his love to little ones. He invites us to come to him when we\u2019re tired, and he gives us rest.",
        question: "When do you feel tired or worried? How might Jesus give you rest?",
        prayer: "Jesus, thank you for loving little hearts like mine. When I feel tired or sad, help me come to you. St. Catherine, pray for me."
      },
      "2026-04-30": {
        liturgicalDay: "Thursday · 4th Week of Easter",
        gospelReference: "John 13:16–20",
        theme: "Jesus tells us that whoever welcomes one of his friends welcomes him too. The way we treat others is the way we treat Jesus.",
        question: "How could you welcome Jesus today by being kind to someone?",
        prayer: "Jesus, help me see you in the people around me. When I am kind to them, I am kind to you. Make my heart gentle and welcoming."
      },
      "2026-05-01": {
        liturgicalDay: "St. Joseph the Worker",
        gospelReference: "Matthew 13:54–58",
        theme: "Jesus grew up in a regular town with a regular carpenter dad. St. Joseph shows us that ordinary work, done with love, is holy.",
        question: "What is one ordinary thing you do every day? How could doing it with love make it special?",
        prayer: "Good St. Joseph, you worked hard and loved Jesus. Help me do my small jobs well today \u2014 with love, the way you did."
      },
      "2026-05-02": {
        liturgicalDay: "St. Athanasius · Bishop and Doctor",
        gospelReference: "John 14:7–14",
        theme: "Jesus tells us, \u201CIf you have seen me, you have seen the Father.\u201D When we look at Jesus, we see exactly what God is like.",
        question: "What is one thing about Jesus that tells you what God is like?",
        prayer: "Jesus, thank you for showing me what the Father is like. When I look at you, I see love. Help me look at you more every day."
      },
      "2026-05-03": {
        liturgicalDay: "5th Sunday of Easter",
        gospelReference: "John 13:31–33a, 34–35",
        theme: "Jesus gives us a new rule: \u201CLove one another as I have loved you.\u201D People will know we belong to Jesus by how we love each other.",
        question: "Who is someone you can love today the way Jesus loves you?",
        prayer: "Jesus, you loved us all the way to the cross. Teach me to love my family and friends the same way. Let my love show people who you are."
      },
      "2026-05-04": {
        liturgicalDay: "Monday · 5th Week of Easter",
        gospelReference: "John 14:21–26",
        theme: "Jesus says that if we love him, the Father and Jesus come to make their home in our hearts. God really wants to live with us!",
        question: "If Jesus lives in your heart, how might that change the way you act today?",
        prayer: "Jesus, please come and make your home in my heart. Bring the Father and the Holy Spirit with you. I want my heart to be a happy home for you."
      },
      "2026-05-05": {
        liturgicalDay: "Tuesday · 5th Week of Easter",
        gospelReference: "John 14:27–31a",
        theme: "Jesus gives us his peace \u2014 not the kind the world gives, but a quiet, strong peace that calms our hearts when we are afraid.",
        question: "When do you feel scared or worried? How might Jesus\u2019 peace help you?",
        prayer: "Jesus, thank you for your peace. When my heart feels shaky, please calm me. Help me trust that you are always with me."
      },
      "2026-05-06": {
        liturgicalDay: "Wednesday · 5th Week of Easter",
        gospelReference: "John 15:1–8",
        theme: "Jesus says he is the vine and we are the branches. If we stay connected to him, we will grow and do beautiful things, like fruit on a healthy plant.",
        question: "What are some ways you can stay connected to Jesus every day?",
        prayer: "Jesus, keep me close to you like a branch on your vine. Help me grow strong in your love and do good things for others."
      },
      "2026-05-07": {
        liturgicalDay: "Thursday · 5th Week of Easter",
        gospelReference: "John 15:9–11",
        theme: "Jesus tells us to stay in his love the same way he stays in the Father\u2019s love. When we do, our joy will be complete.",
        question: "What does it feel like to be loved? How does Jesus\u2019 love feel different?",
        prayer: "Jesus, thank you for loving me just like the Father loves you. Help me stay close in that love today. Fill me with your joy."
      },
      "2026-05-08": {
        liturgicalDay: "Friday · 5th Week of Easter",
        gospelReference: "John 15:12–17",
        theme: "Jesus calls us his friends, not just his helpers. A good friend loves us, tells us the truth, and wants only good for us \u2014 that\u2019s how Jesus loves.",
        question: "What makes someone a really good friend? How is Jesus a friend to you?",
        prayer: "Jesus, thank you for calling me your friend. Help me be a good friend to you and to the people around me. I want to love like you love."
      },
      "2026-05-09": {
        liturgicalDay: "Saturday · 5th Week of Easter",
        gospelReference: "John 15:18–21",
        theme: "Jesus tells us that because we belong to him, not everyone will understand or like us \u2014 but that is okay, because we are his.",
        question: "Has someone ever been unkind because you did the right thing? What did Jesus say about that?",
        prayer: "Jesus, help me be brave when it\u2019s hard to follow you. Remind me that I belong to you, no matter what. Stay close to me."
      },
      "2026-05-10": {
        liturgicalDay: "6th Sunday of Easter · Mother\u2019s Day",
        gospelReference: "John 14:23–29",
        theme: "Jesus promises to send the Holy Spirit to teach us everything. And he leaves us his peace \u2014 a peace that stays, even when the world is noisy.",
        question: "Who are the people who teach you about Jesus? How can you thank them today?",
        prayer: "Jesus, thank you for the Holy Spirit who helps me learn about you. Thank you for my mother and everyone who teaches me to love you. Fill our home with your peace."
      }
    };

    // ---------- State ----------
    let currentDate = new Date();

    // ---------- Date helpers ----------
    const pad = (n) => String(n).padStart(2, '0');
    const dateKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    const dateDisplay = (d) => d.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
    });
    const isSameDay = (a, b) => dateKey(a) === dateKey(b);
    const addDays = (d, n) => {
      const copy = new Date(d);
      copy.setDate(copy.getDate() + n);
      return copy;
    };

    // ---------- Rendering ----------
    const escapeHtml = (s) => (s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));

    const renderContent = (data) => {
      document.getElementById('liturgicalDay').textContent = data.liturgicalDay || '';
      const main = document.getElementById('mainContent');
      const prayerBody = (data.prayer || '').replace(/\s*Amen\.?\s*$/i, '').trim();

      main.innerHTML = `
        <div class="fade-in">
          <section class="card">
            <p class="card-label">Today's Message</p>
            <span class="card-label-underline"></span>
            <p class="theme-text">${escapeHtml(data.theme || '')}</p>
          </section>

          <section class="card">
            <p class="card-label">Something to Wonder</p>
            <span class="card-label-underline"></span>
            <p class="question-text">${escapeHtml(data.question || '')}</p>
          </section>

          <section class="card">
            <p class="card-label">Let's Pray</p>
            <span class="card-label-underline"></span>
            <p class="prayer-text">${escapeHtml(prayerBody)}<span class="amen">Amen</span></p>
          </section>

          ${data.gospelReference ? `<p class="gospel-ref">${escapeHtml(data.gospelReference)}</p>` : ''}
        </div>
      `;
    };

    const renderEmpty = () => {
      document.getElementById('liturgicalDay').textContent = '';
      document.getElementById('mainContent').innerHTML = `
        <div class="state fade-in">
          <div class="state-ornament">❦</div>
          <p>No entry for this day yet.<br>Try a different day, or come back after the next update.</p>
        </div>
      `;
    };

    // ---------- Main flow ----------
    const renderDay = () => {
      document.getElementById('dateLine').textContent = dateDisplay(currentDate);

      const todayBtn = document.getElementById('todayBtn');
      const onToday = isSameDay(currentDate, new Date());
      todayBtn.style.visibility = onToday ? 'hidden' : 'visible';

      const entry = DAILY_ENTRIES[dateKey(currentDate)];
      if (entry) renderContent(entry);
      else renderEmpty();
    };

    // ---------- Nav ----------
    document.getElementById('prevBtn').addEventListener('click', () => {
      currentDate = addDays(currentDate, -1);
      renderDay();
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      currentDate = addDays(currentDate, 1);
      renderDay();
    });
    document.getElementById('todayBtn').addEventListener('click', () => {
      currentDate = new Date();
      renderDay();
    });

    // ---------- Initial load ----------
    renderDay();
  </script>
</body>
</html>
