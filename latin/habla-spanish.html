<title>¡Habla! — Conversational Spanish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  /* Spanish flag: Red #c60b1e, Yellow #ffc400 */
  --primary:#c60b1e;--primary-dark:#a00918;--primary-deeper:#7a0712;--primary-glow:rgba(198,11,30,0.15);
  --accent:#ffc400;--accent-dark:#daa800;--accent-soft:#ffe066;
  --green:#4caf50;--green-dark:#388e3c;--green-deeper:#2e7d32;
  --bg:#1a1012;--bg-card:#2a1a1e;--bg-card-hover:#362228;--bg-surface:#221418;
  --gold:#ffc400;--red:#c60b1e;--red-soft:#e53935;--blue:#49c0f8;--purple:#ce82ff;--orange:#ff9600;
  --text:#f5f0eb;--text-sec:#c4a8a0;--text-mut:#8a6860;--border:rgba(255,255,255,0.08);
  --rad:16px;--rad-sm:12px;--rad-xs:8px;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
  --correct:#4caf50;--correct-dark:#388e3c;
}
/* Light mode */
[data-theme="light"] {
  --bg:#faf5f0;--bg-card:#ffffff;--bg-card-hover:#fff5ee;--bg-surface:#f5ede6;
  --text:#2a1a12;--text-sec:#6a4a3a;--text-mut:#9a7a6a;--border:rgba(0,0,0,0.1);
  --primary:#c60b1e;--primary-dark:#a00918;--primary-deeper:#7a0712;--primary-glow:rgba(198,11,30,0.1);
  --green:#388e3c;--green-dark:#2e7d32;--green-deeper:#1b5e20;
  --correct:#388e3c;--correct-dark:#2e7d32;
  --red:#c60b1e;--red-soft:#e53935;--gold:#d4a000;--accent:#d4a000;--accent-dark:#b88e00;
}
[data-theme="light"] body::before{background:radial-gradient(ellipse at 30% 0%,rgba(198,11,30,0.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 100%,rgba(255,196,0,0.04) 0%,transparent 50%)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(198,11,30,0.05) 0%,transparent 50%),radial-gradient(ellipse at 70% 100%,rgba(255,196,0,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}
.screen{display:none;min-height:100dvh;position:relative;z-index:1;flex-direction:column}.screen.active{display:flex}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg-surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:6px 0 calc(6px + var(--safe-bottom));backdrop-filter:blur(20px)}
.nav-btn{background:none;border:none;color:var(--text-mut);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:700;font-family:inherit;padding:6px 12px;border-radius:12px;cursor:pointer;transition:all 0.2s}
.nav-btn.active{color:var(--primary)}.nav-btn svg{width:24px;height:24px}.nav-btn.active svg{filter:drop-shadow(0 0 6px rgba(198,11,30,0.4))}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:calc(12px + var(--safe-top)) 20px 12px;background:var(--bg-surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.top-bar-stats{display:flex;gap:14px;align-items:center}
.stat-item{display:flex;align-items:center;gap:4px;font-weight:800;font-size:14px}.stat-item .icon{font-size:16px}
.stat-streak{color:var(--orange)}.stat-xp{color:var(--gold)}.stat-hearts{color:var(--red)}
.top-bar-title{font-weight:900;font-size:18px;color:var(--primary);letter-spacing:-0.5px}
.scroll-area{flex:1;overflow-y:auto;padding:16px 16px 100px;-webkit-overflow-scrolling:touch}
.section-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-mut);margin:20px 0 10px}.section-label:first-child{margin-top:0}
/* Streak Banner */
.streak-banner{background:linear-gradient(135deg,#ff9600 0%,#ff6b00 100%);border-radius:var(--rad);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.streak-fire{font-size:40px;animation:fireAnim 1s ease-in-out infinite alternate}
@keyframes fireAnim{0%{transform:scale(1) rotate(-3deg)}100%{transform:scale(1.1) rotate(3deg)}}
.streak-info{flex:1}.streak-count{font-size:24px;font-weight:900;color:#fff}.streak-msg{font-size:13px;color:rgba(255,255,255,0.85);font-weight:600}
.streak-banner.none{background:linear-gradient(135deg,#3a4a52 0%,#2a3a42 100%)}
/* Unit cards */
.unit-card{background:var(--bg-card);border-radius:var(--rad);padding:18px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.unit-card:active{transform:scale(0.98)}.unit-card.completed{border-color:var(--primary-dark)}
.unit-card.completed::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
.unit-card.locked{opacity:0.4;pointer-events:none}
.unit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.unit-icon{font-size:26px}.unit-crown{font-size:16px;color:var(--gold)}
.unit-title{font-size:16px;font-weight:800;margin-bottom:2px}.unit-desc{font-size:12px;color:var(--text-sec);line-height:1.3}
.unit-progress{margin-top:10px}.progress-bar-bg{height:7px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.5s ease}
.progress-text{font-size:11px;color:var(--text-mut);margin-top:3px;text-align:right;font-weight:700}
/* Lesson */
.lesson-header{display:flex;align-items:center;gap:12px;padding:calc(12px + var(--safe-top)) 16px 12px;background:var(--bg-surface);border-bottom:1px solid var(--border)}
.lesson-close{background:none;border:none;color:var(--text-mut);font-size:22px;cursor:pointer;padding:4px;font-family:inherit}
.lesson-progress-bar{flex:1;height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden}
.lesson-progress-fill{height:100%;background:var(--accent);border-radius:5px;transition:width 0.4s ease}
.lesson-hearts{display:flex;align-items:center;gap:3px;color:var(--red);font-weight:800;font-size:14px}
.lesson-content{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 20px 140px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ex-type{font-size:12px;font-weight:700;color:var(--text-mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.ex-prompt{font-size:20px;font-weight:800;text-align:center;margin-bottom:20px;line-height:1.4}
.speaker-btn{background:var(--bg-card);border:2px solid var(--accent);border-radius:50%;width:68px;height:68px;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;margin:0 auto 16px;transition:all 0.2s;color:var(--accent)}
.speaker-btn:active{transform:scale(0.92);background:var(--accent);color:#fff}
.speaker-btn.playing{background:var(--accent);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,196,0,0.4)}50%{box-shadow:0 0 0 12px rgba(255,196,0,0)}}
.speaker-btn.small{width:36px;height:36px;font-size:16px;border-width:1.5px}
.mc-options{display:flex;flex-direction:column;gap:8px;width:100%;max-width:500px}
.mc-option{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--rad-sm);padding:14px 16px;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;transition:all 0.15s;text-align:left;font-family:inherit;display:flex;align-items:center;gap:10px}
.mc-option:active{transform:scale(0.98)}
.mc-option .opt-num{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--text-mut);flex-shrink:0}
.mc-option.selected{border-color:var(--accent);background:rgba(255,196,0,0.08)}.mc-option.selected .opt-num{border-color:var(--accent);color:var(--accent);background:rgba(255,196,0,0.15)}
.mc-option.correct{border-color:var(--correct);background:rgba(76,175,80,0.1)}.mc-option.correct .opt-num{border-color:var(--correct);color:var(--correct);background:rgba(76,175,80,0.2)}
.mc-option.wrong{border-color:var(--red);background:rgba(255,75,75,0.08)}.mc-option.wrong .opt-num{border-color:var(--red);color:var(--red);background:rgba(255,75,75,0.15)}
.mc-option.disabled{pointer-events:none;opacity:0.6}.mc-option.correct.disabled{opacity:1}
.text-input-area{width:100%;max-width:500px}
.text-input{width:100%;background:var(--bg-card);border:2px solid var(--border);border-radius:var(--rad-sm);padding:14px 18px;font-size:17px;font-weight:600;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.2s}
.text-input:focus{border-color:var(--primary)}.text-input.correct{border-color:var(--correct);background:rgba(76,175,80,0.05)}.text-input.wrong{border-color:var(--red);background:rgba(255,75,75,0.05)}
.word-bank-target{min-height:52px;background:var(--bg-card);border:2px dashed var(--border);border-radius:var(--rad-sm);padding:10px 14px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:14px;width:100%;max-width:500px}
.word-bank-pool{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;width:100%;max-width:500px}
.word-chip{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--rad-xs);padding:9px 14px;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;font-family:inherit;user-select:none}
.word-chip:active{transform:scale(0.95)}.word-chip.used{opacity:0.25;pointer-events:none}.word-chip.in-target{background:var(--bg-card-hover);border-color:var(--accent)}
.dialogue-container{width:100%;max-width:500px;margin-bottom:16px}
.dialogue-line{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}.dialogue-line.right{flex-direction:row-reverse}
.dialogue-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.dialogue-avatar.a{background:#2d5a8a}.dialogue-avatar.b{background:#8a2d5a}
.dialogue-bubble{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:10px 14px;max-width:80%;position:relative}
.dialogue-line.right .dialogue-bubble{background:var(--green-deeper);border-color:var(--green-dark)}
.dialogue-es{font-size:14px;font-weight:700;margin-bottom:2px}.dialogue-en{font-size:11px;color:var(--text-mut)}
.scene-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:14px 18px;margin-bottom:14px;width:100%;max-width:500px;text-align:center}
.scene-emoji{font-size:36px;margin-bottom:6px}.scene-title{font-size:14px;font-weight:800;color:var(--green)}.scene-desc{font-size:12px;color:var(--text-sec);margin-top:3px}
.lesson-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:10px 20px calc(10px + var(--safe-bottom));background:var(--bg-surface);border-top:1px solid var(--border)}
.check-btn{width:100%;padding:15px;border:none;border-radius:var(--rad-sm);font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px}
.check-btn.ready{background:var(--primary);color:#fff;box-shadow:0 4px 0 var(--primary-dark)}.check-btn.ready:active{transform:translateY(2px);box-shadow:0 2px 0 var(--primary-dark)}
.check-btn.disabled{background:rgba(255,255,255,0.08);color:var(--text-mut);pointer-events:none}
.check-btn.continue{background:var(--primary);color:#fff;box-shadow:0 4px 0 var(--primary-dark)}.check-btn.wrong-continue{background:var(--red);color:#fff;box-shadow:0 4px 0 #cc3333}
.feedback-bar{display:none;padding:6px 0 2px;text-align:center}.feedback-bar.show{display:block}.feedback-bar.correct{color:var(--correct)}.feedback-bar.wrong{color:var(--red)}
.feedback-text{font-size:14px;font-weight:800}.feedback-detail{font-size:12px;font-weight:600;margin-top:2px;opacity:0.8}
.lesson-complete{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 24px;text-align:center;position:relative;z-index:1}
.lesson-complete.active{display:flex}
.complete-icon{font-size:64px;margin-bottom:14px;animation:bounceIn 0.5s ease}
.complete-title{font-size:26px;font-weight:900;color:var(--primary);margin-bottom:6px}
.complete-subtitle{font-size:15px;color:var(--text-sec);margin-bottom:28px}
.complete-stats{display:flex;gap:24px;margin-bottom:36px}
.complete-stat{text-align:center}.complete-stat-val{font-size:26px;font-weight:900}.complete-stat-label{font-size:11px;color:var(--text-mut);font-weight:700;text-transform:uppercase}
.complete-stat.xp .complete-stat-val{color:var(--gold)}.complete-stat.acc .complete-stat-val{color:var(--green)}
.complete-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--rad-sm);padding:15px 44px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 4px 0 var(--primary-dark);text-transform:uppercase}
.complete-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--primary-dark)}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
/* Vocab tab */
.vocab-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:14px 18px;margin-bottom:8px;transition:all 0.2s}
.vocab-card.learned{border-left:3px solid var(--primary)}
.vocab-top{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.vocab-es{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
.vocab-en{font-size:13px;color:var(--text-sec);font-weight:600}
.vocab-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all 0.2s;flex-shrink:0;background:none;color:var(--text-mut);font-family:inherit}
.vocab-check.done{background:var(--primary);border-color:var(--primary);color:#fff}
.vocab-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.vocab-card.expanded .vocab-detail{display:block}
.vocab-desc{font-size:13px;color:var(--text-sec);line-height:1.5;margin-bottom:6px}
.vocab-ex{font-size:13px;color:var(--text-mut);font-style:italic}
.vocab-practice-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--rad-sm);padding:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;width:100%;margin-bottom:16px;box-shadow:0 3px 0 var(--primary-dark);text-transform:uppercase}
.vocab-practice-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--primary-dark)}
.vocab-progress{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:13px;font-weight:700;color:var(--text-sec)}
.vocab-progress-bar{flex:1;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.vocab-progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.3s}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:12px}
.filter-chip{background:var(--bg-card);border:1.5px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--text-sec);cursor:pointer;font-family:inherit;transition:all 0.15s}
.filter-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
/* Grammar */
.grammar-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:18px;margin-bottom:10px}
.grammar-title{font-size:16px;font-weight:800;color:var(--primary);margin-bottom:5px}
.grammar-rule{font-size:13px;color:var(--text-sec);line-height:1.6;margin-bottom:8px}
.grammar-ex{background:var(--bg-surface);border-radius:var(--rad-xs);padding:10px 14px;font-size:13px;line-height:1.5;margin-top:5px}
.grammar-ex .es{font-weight:700;color:var(--text)}.grammar-ex .en{color:var(--text-mut);font-style:italic}
/* Profile */
.profile-header{text-align:center;padding:16px 0 20px}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin:0 auto 10px;box-shadow:0 0 0 3px var(--bg),0 0 0 5px var(--primary-dark);font-family:'Nunito',sans-serif}
.profile-name{font-size:20px;font-weight:900}.profile-sub{font-size:12px;color:var(--text-mut);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:14px;text-align:center}
.stat-card-val{font-size:22px;font-weight:900}.stat-card-label{font-size:10px;color:var(--text-mut);font-weight:700;text-transform:uppercase;margin-top:2px}
.stat-card.streak .stat-card-val{color:var(--orange)}.stat-card.xp .stat-card-val{color:var(--gold)}.stat-card.lessons .stat-card-val{color:var(--primary)}.stat-card.words .stat-card-val{color:var(--blue)}
.streak-cal-title{font-size:13px;font-weight:800;margin-bottom:10px}
.streak-days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:20px}
.streak-day{aspect-ratio:1;border-radius:8px;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-mut)}
.streak-day.active{background:var(--primary);color:#fff}.streak-day.today{box-shadow:inset 0 0 0 2px var(--primary)}
.reset-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:12px;font-size:13px;font-weight:700;color:var(--red-soft);width:100%;cursor:pointer;font-family:inherit;text-align:center}
.confetti-box{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;animation:confFall 1.5s ease-out forwards}
@keyframes confFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.hidden{display:none!important}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* ===== GAMES TAB ===== */
.game-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:20px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:16px}
.game-card:active{transform:scale(0.98)}
.game-icon{font-size:36px;width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.game-icon.speed{background:rgba(255,75,75,0.15)}.game-icon.match{background:rgba(73,192,248,0.15)}
.game-icon.conj{background:rgba(206,130,255,0.15)}.game-icon.mistakes{background:rgba(255,150,0,0.15)}
.game-info{flex:1}.game-title{font-size:16px;font-weight:800;margin-bottom:2px}.game-desc{font-size:12px;color:var(--text-sec);line-height:1.3}
.game-best{font-size:11px;color:var(--text-mut);margin-top:4px;font-weight:700}

/* Timer bar */
.timer-bar{width:100%;max-width:500px;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin-bottom:16px}
.timer-fill{height:100%;border-radius:4px;transition:width 0.1s linear}
.timer-fill.green{background:var(--green)}.timer-fill.yellow{background:var(--gold)}.timer-fill.red{background:var(--red)}
.timer-text{font-size:28px;font-weight:900;text-align:center;margin-bottom:12px;font-variant-numeric:tabular-nums}
.game-score{font-size:14px;font-weight:800;color:var(--gold);text-align:center;margin-bottom:16px}

/* Memory Match */
.match-grid{display:grid;gap:8px;width:100%;max-width:500px;margin:0 auto}
.match-grid.g4x3{grid-template-columns:repeat(4,1fr)}
.match-grid.g4x4{grid-template-columns:repeat(4,1fr)}
.match-card{aspect-ratio:1;border-radius:var(--rad-sm);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;text-align:center;padding:6px;cursor:pointer;transition:all 0.3s;border:2px solid var(--border);perspective:600px;user-select:none;line-height:1.2}
.match-card.face-down{background:var(--primary-deeper);color:transparent}.match-card.face-down::after{content:'¿?';color:rgba(255,255,255,0.4);font-size:20px;font-weight:900}
.match-card.face-up{background:var(--bg-card);color:var(--text);border-color:var(--blue)}
.match-card.matched{background:rgba(76,175,80,0.15);border-color:var(--correct);color:var(--correct);opacity:0.7;pointer-events:none}
.match-card.wrong{animation:matchShake 0.4s ease;border-color:var(--red)}
@keyframes matchShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.match-moves{font-size:13px;color:var(--text-sec);text-align:center;margin-top:12px;font-weight:700}

/* Conjugation Drill */
.conj-prompt{text-align:center;margin-bottom:20px}
.conj-verb{font-size:28px;font-weight:900;color:var(--purple)}
.conj-pronoun{font-size:20px;font-weight:700;color:var(--text-sec);margin-top:4px}
.conj-tense{font-size:12px;color:var(--text-mut);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.conj-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:500px}
.conj-opt{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--rad-sm);padding:14px;text-align:center;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:inherit;color:var(--text)}
.conj-opt:active{transform:scale(0.96)}
.conj-opt.correct{border-color:var(--correct);background:rgba(76,175,80,0.1);color:var(--correct)}
.conj-opt.wrong{border-color:var(--red);background:rgba(255,75,75,0.08);color:var(--red)}

/* Daily Goal Ring */
.goal-ring-container{text-align:center;margin-bottom:20px}
.goal-ring-svg{width:120px;height:120px}
.goal-ring-text{font-size:11px;color:var(--text-mut);margin-top:6px;font-weight:700}
.goal-inner{font-size:22px;font-weight:900}
.goal-label{font-size:10px;fill:var(--text-mut)}

/* Achievements */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.badge{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:14px 8px;text-align:center;transition:all 0.2s}
.badge.unlocked{border-color:var(--gold);background:rgba(255,200,0,0.05)}
.badge.locked{opacity:0.35}
.badge-icon{font-size:28px;margin-bottom:4px}
.badge-name{font-size:10px;font-weight:800;color:var(--text-sec);line-height:1.2}
.badge.unlocked .badge-name{color:var(--gold)}

/* Mistake Bank */
.mistake-card{background:var(--bg-card);border-left:3px solid var(--red);border-radius:0 var(--rad-sm) var(--rad-sm) 0;padding:12px 16px;margin-bottom:8px}
.mistake-q{font-size:14px;font-weight:700;margin-bottom:4px}
.mistake-wrong{font-size:13px;color:var(--red);text-decoration:line-through}
.mistake-right{font-size:13px;color:var(--green);font-weight:700}
.mistake-count{font-size:11px;color:var(--text-mut);margin-top:2px}

/* Game results overlay */
.game-results{text-align:center;padding:20px}
.game-results-icon{font-size:56px;margin-bottom:12px}
.game-results-title{font-size:24px;font-weight:900;color:var(--green);margin-bottom:4px}
.game-results-sub{font-size:14px;color:var(--text-sec);margin-bottom:20px}
.game-results-stats{display:flex;justify-content:center;gap:24px;margin-bottom:24px}
.game-results-stat{text-align:center}
.game-results-stat-val{font-size:24px;font-weight:900}
.game-results-stat-label{font-size:11px;color:var(--text-mut);text-transform:uppercase;font-weight:700}


/* ===== STORIES ===== */
.story-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:20px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.story-card:active{transform:scale(0.98)}
.story-card.completed{border-color:var(--primary-dark)}.story-card.completed::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
.story-card.locked{opacity:0.4;pointer-events:none}
.story-header{display:flex;align-items:center;gap:14px}
.story-icon{font-size:36px}.story-info{flex:1}
.story-title{font-size:16px;font-weight:800}.story-desc{font-size:12px;color:var(--text-sec);margin-top:2px}
.story-badge{font-size:12px;color:var(--gold);font-weight:800;margin-top:4px}

/* Story narration */
.story-narration{background:rgba(255,255,255,0.03);border-left:3px solid var(--text-mut);padding:12px 16px;border-radius:0 var(--rad-sm) var(--rad-sm) 0;font-size:14px;color:var(--text-sec);line-height:1.6;font-style:italic;margin-bottom:16px;width:100%;max-width:500px}
.story-choices{display:flex;flex-direction:column;gap:8px;width:100%;max-width:500px}
.story-choice{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--rad-sm);padding:14px 18px;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;transition:all 0.15s;text-align:left;font-family:inherit}
.story-choice:active{transform:scale(0.98)}.story-choice:hover{border-color:var(--blue)}
.story-choice.selected{border-color:var(--correct);background:rgba(76,175,80,0.08)}
.story-choice.wrong-choice{border-color:var(--red);background:rgba(255,75,75,0.08)}
.story-reaction{background:var(--bg-surface);border-radius:var(--rad-sm);padding:12px 16px;margin-top:12px;font-size:13px;color:var(--text-sec);line-height:1.5;width:100%;max-width:500px}
.story-reaction .react-es{font-weight:700;color:var(--text)}.story-reaction .react-en{color:var(--text-mut);font-style:italic}

/* Role-Play */
.rp-scene{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:16px;margin-bottom:16px;width:100%;max-width:500px}
.rp-setting{font-size:12px;color:var(--text-mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.rp-context{font-size:14px;color:var(--text-sec);line-height:1.4}
.rp-partner-msg{display:flex;gap:10px;margin-bottom:14px;width:100%;max-width:500px}
.rp-avatar{width:36px;height:36px;border-radius:50%;background:#2d5a8a;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.rp-bubble{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:12px 16px;flex:1}
.rp-bubble-es{font-size:15px;font-weight:700;margin-bottom:2px}.rp-bubble-en{font-size:11px;color:var(--text-mut)}
.rp-your-turn{text-align:center;font-size:12px;color:var(--accent);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

/* Listen & Speak */
.speak-target{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--rad);padding:20px;text-align:center;margin-bottom:20px;width:100%;max-width:500px}
.speak-target-es{font-size:22px;font-weight:800;margin-bottom:4px}
.speak-target-en{font-size:13px;color:var(--text-mut)}
.mic-btn{width:80px;height:80px;border-radius:50%;border:3px solid var(--red);background:rgba(255,75,75,0.1);color:var(--red);font-size:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin:0 auto 16px;transition:all 0.2s}
.mic-btn:active{transform:scale(0.92)}
.mic-btn.recording{background:var(--red);color:#fff;animation:micPulse 1s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,75,75,0.4)}50%{box-shadow:0 0 0 16px rgba(255,75,75,0)}}
.mic-btn.disabled{opacity:0.3;pointer-events:none}
.speak-result{text-align:center;padding:12px;border-radius:var(--rad-sm);margin-bottom:12px;font-size:15px;font-weight:700;width:100%;max-width:500px}
.speak-result.good{background:rgba(76,175,80,0.1);color:var(--correct);border:1px solid var(--correct)}
.speak-result.partial{background:rgba(255,200,0,0.1);color:var(--gold);border:1px solid var(--gold)}
.speak-result.poor{background:rgba(255,75,75,0.08);color:var(--red);border:1px solid var(--red)}
.speak-heard{font-size:13px;color:var(--text-sec);text-align:center;margin-bottom:8px}
.speak-tip{font-size:11px;color:var(--text-mut);text-align:center}

/* Daily Challenge */
.daily-card{background:linear-gradient(135deg,var(--bg-card) 0%,rgba(198,11,30,0.05) 100%);border:2px solid var(--primary-dark);border-radius:var(--rad);padding:20px;margin-bottom:16px;text-align:center}
.daily-card.completed-daily{border-color:var(--gold);background:linear-gradient(135deg,var(--bg-card) 0%,rgba(255,200,0,0.05) 100%)}
.daily-icon{font-size:32px;margin-bottom:6px}.daily-title{font-size:16px;font-weight:900;color:var(--primary)}.daily-desc{font-size:13px;color:var(--text-sec);margin-top:4px}
.daily-card.completed-daily .daily-title{color:var(--gold)}
.daily-reward{font-size:12px;color:var(--gold);font-weight:800;margin-top:8px}


/* Theme toggle */
.theme-toggle{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;cursor:pointer}
.theme-toggle-label{font-size:14px;font-weight:700;color:var(--text)}
.theme-toggle-switch{width:48px;height:26px;border-radius:13px;background:var(--border);position:relative;transition:background 0.3s}
.theme-toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--text-mut);transition:all 0.3s}
.theme-toggle-switch.on{background:var(--primary)}
.theme-toggle-switch.on::after{left:25px;background:#fff}


/* ===== GRAMMAR LESSONS ===== */
.jump-btn{background:var(--bg-card);border:1.5px solid var(--primary);border-radius:var(--rad-sm);padding:10px 16px;font-size:13px;font-weight:800;color:var(--primary);cursor:pointer;font-family:inherit;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;margin-bottom:12px}
.jump-btn:active{transform:scale(0.97);background:var(--primary);color:#fff}
.grammar-lesson-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:18px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.grammar-lesson-card:active{transform:scale(0.98)}
.grammar-lesson-card.gl-completed{border-color:var(--primary-dark)}
.grammar-lesson-card.gl-completed::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
.grammar-lesson-card.gl-locked{opacity:0.4;pointer-events:none}
.gl-header{display:flex;align-items:center;gap:14px}
.gl-icon{font-size:28px;width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gl-icon.tense{background:rgba(198,11,30,0.12)}.gl-icon.grammar{background:rgba(255,196,0,0.12)}.gl-icon.irreg{background:rgba(206,130,255,0.12)}
.gl-info{flex:1}.gl-title{font-size:15px;font-weight:800}.gl-desc{font-size:12px;color:var(--text-sec);margin-top:2px}
.gl-crown{font-size:16px;color:var(--gold)}

/* Grammar explanation screen */
.gram-explain{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:20px;margin-bottom:16px;width:100%;max-width:540px}
.gram-explain h4{font-size:16px;font-weight:900;color:var(--primary);margin-bottom:8px}
.gram-explain p{font-size:14px;color:var(--text-sec);line-height:1.7;margin-bottom:10px}
.gram-explain .gram-highlight{background:rgba(198,11,30,0.08);border-left:3px solid var(--primary);padding:10px 14px;border-radius:0 var(--rad-xs) var(--rad-xs) 0;margin:10px 0;font-size:13px;line-height:1.6}
.gram-explain .gram-highlight strong{color:var(--text)}

/* Conjugation table */
.conj-table-wrap{width:100%;max-width:540px;overflow-x:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.conj-tbl{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:var(--rad-sm);overflow:hidden}
.conj-tbl th{background:var(--primary);color:#fff;padding:10px 14px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;text-align:left}
.conj-tbl td{padding:10px 14px;font-size:14px;border-top:1px solid var(--border);background:var(--bg-card)}
.conj-tbl tr:nth-child(even) td{background:var(--bg-surface)}
.conj-tbl td:first-child{font-weight:700;color:var(--text-sec);width:100px}
.conj-tbl td.verb-form{font-weight:800;color:var(--text)}
.conj-tbl td.irregular{color:var(--accent);font-weight:800}
.conj-tbl .stem-change{color:var(--primary);font-weight:800}

/* Start practice button in grammar lesson */
.start-practice-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--rad-sm);padding:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;width:100%;max-width:540px;box-shadow:0 3px 0 var(--primary-dark);text-transform:uppercase;margin-top:8px}
.start-practice-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--primary-dark)}

/* Section nav pills */
.section-nav{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.section-pill{background:var(--bg-card);border:1.5px solid var(--border);border-radius:20px;padding:8px 16px;font-size:12px;font-weight:700;color:var(--text-sec);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.section-pill.active{background:var(--primary);border-color:var(--primary);color:#fff}


/* Stat popup tooltip */
.stat-popup-overlay{display:none;position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,0.4);align-items:flex-start;justify-content:center;padding-top:calc(70px + env(safe-area-inset-top))}
.stat-popup-overlay.open{display:flex}
.stat-popup{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:20px 24px;width:calc(100% - 48px);max-width:320px;box-shadow:0 12px 40px rgba(0,0,0,0.5);animation:popIn 0.2s ease}
@keyframes popIn{0%{opacity:0;transform:translateY(-8px) scale(0.96)}100%{opacity:1;transform:translateY(0) scale(1)}}
.stat-popup-icon{font-size:36px;margin-bottom:8px}
.stat-popup-title{font-size:17px;font-weight:900;margin-bottom:4px}
.stat-popup-val{font-size:28px;font-weight:900;margin-bottom:6px}
.stat-popup-desc{font-size:13px;color:var(--text-sec);line-height:1.5}
.stat-popup-tip{font-size:12px;color:var(--text-mut);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.stat-item{cursor:pointer}
</style>
</head>

rante nuevo?", "¿Vamos al restaurante nuevo?", "¿Te gustaría ir al restaurante nuevo?"]}, {"type": "build", "prompt": "Build: \"I was thinking of going to that new restaurant\"", "words": ["Estaba", "pensando", "en", "ir", "a", "ese", "restaurante", "nuevo", "viejo", "este"], "answer": "Estaba pensando en ir a ese restaurante nuevo"}, {"type": "fill", "prompt": "¿A qué hora ___? (shall we meet)", "answer": "quedamos"}, {"type": "listen_type", "audio": "¡Me encantaría! ¿A qué hora quedamos?", "prompt": "Type what you hear:", "answer": "¡Me encantaría! ¿A qué hora quedamos?"}, {"type": "mc", "prompt": "'¿Te animas?' means:", "options": ["Are you up for it?", "Are you angry?", "Are you busy?", "Are you leaving?"], "correct": 0}, {"type": "respond", "situation": "Suggest meeting at 8pm.", "answer": "¿Qué te parece a las ocho?", "alts": ["¿A las ocho te parece bien?", "Nos vemos a las ocho", "¿Quedamos a las ocho?"]}, {"type": "mc", "prompt": "'Puedo hacer la reservación' means:", "options": ["I can make the reservation", "I can cancel the reservation", "I have a reservation", "I need a reservation"], "correct": 0}, {"type": "fill", "prompt": "¿___ también a Luis? (Should we invite)", "answer": "Invitamos"}, {"type": "build", "prompt": "Build: \"How about at eight?\"", "words": ["¿Qué", "te", "parece", "a", "las", "ocho?", "dos", "siete", "bien"], "answer": "¿Qué te parece a las ocho?"}]}, {"id": "family", "title": "Talking About Family", "icon": "👨‍👩‍👧‍👦", "desc": "Describe your family, talk about kids, relationships", "dialogue": [{"who": "A", "name": "Vecina", "es": "¡Qué lindos tus hijos! ¿Cuántos años tienen?", "en": "Your kids are so cute! How old are they?"}, {"who": "B", "name": "You", "es": "Gracias. El mayor tiene cinco y la pequeña tiene dos.", "en": "Thanks. The oldest is five and the little one is two."}, {"who": "A", "name": "Vecina", "es": "¿Ya va a la escuela el mayor?", "en": "Is the oldest one in school already?"}, {"who": "B", "name": "You", "es": "Sí,  día", "prompt": "What is being suggested?", "options": ["We should get them together sometime", "We should pick them up someday", "We should go somewhere", "We should talk more"], "correct": 0}]}, {"id": "airport", "title": "At the Airport", "icon": "✈️", "desc": "Check in, navigate security, handle flight issues", "dialogue": [{"who": "A", "name": "Agente", "es": "Buenos días. ¿Me permite su pasaporte y su tarjeta de embarque?", "en": "Good morning. May I see your passport and boarding pass?"}, {"who": "B", "name": "You", "es": "Aquí tiene. Quisiera un asiento de ventanilla, si es posible.", "en": "Here you go. I'd like a window seat, if possible."}, {"who": "A", "name": "Agente", "es": "Déjeme ver... Sí, tengo uno disponible. ¿Va a facturar equipaje?", "en": "Let me check... Yes, I have one available. Are you going to check luggage?"}, {"who": "B", "name": "You", "es": "Sí, una maleta. Y llevo equipaje de mano también.", "en": "Yes, one suitcase. And I have carry-on luggage too."}, {"who": "A", "name": "Agente", "es": "Perfecto. Su puerta de embarque es la B12. El abordaje empieza a las dos.", "en": "Perfect. Your boarding gate is B12. Boarding starts at two."}, {"who": "B", "name": "You", "es": "Gracias. ¿El vuelo sale a tiempo?", "en": "Thanks. Is the flight on time?"}], "exercises": [{"type": "listen_mc", "audio": "¿Me permite su pasaporte y su tarjeta de embarque?", "prompt": "What documents are being requested?", "options": ["Passport and boarding pass", "ID and ticket", "Passport and visa", "License and itinerary"], "correct": 0}, {"type": "respond", "situation": "Ask for a window seat.", "answer": "Quisiera un asiento de ventanilla", "alts": ["¿Puedo tener un asiento de ventanilla?", "Un asiento de ventanilla, por favor", "Me gustaría un asiento de ventanilla"]}, {"type": "build", "prompt": "Build: \"Is the flight on time?\"", "words": ["¿El", "vuelo", "sale", "a", "tiempo?", "llega", "es", "en"], "answer": "¿El vuelo sale a tiempo?"}, {"type": "fill", "prompt": "Su puerta de ___ es la B12. (boarding)", "answer": "embarque"}, {"type": "listen_type", "audio": "El abordaje empieza a las dos", "prompt": "Type what you hear:", "answer": "El abordaje empieza a las dos"}, {"type": "mc", "prompt": "'Facturar equipaje' means:", "options": ["To check luggage", "To buy luggage", "To lose luggage", "To carry luggage"], "correct": 0}, {"type": "respond", "situation": "Say you have one suitcase and a carry-on.", "answer": "Tengo una maleta y equipaje de mano", "alts": ["Una maleta para facturar y equipaje de mano", "Llevo una maleta y equipaje de mano"]}, {"type": "mc", "prompt": "'Asiento de ventanilla' is:", "options": ["Window seat", "Aisle seat", "Middle seat", "Emergency exit seat"], "correct": 0}, {"type": "fill", "prompt": "¿Va a ___ equipaje? (to check)", "answer": "facturar"}, {"type": "build", "prompt": "Build: \"I have carry-on luggage too\"", "words": ["Llevo", "equipaje", "de", "mano", "también", "mi", "maleta", "una"], "answer": "Llevo equipaje de mano también"}]}, {"id": "stories", "title": "Telling Stories", "icon": "📚", "desc": "Narrate past events, set scenes, build suspense", "dialogue": [{"who": "B", "name": "You", "es": "¡No vas a creer lo que me pasó ayer!", "en": "You're not going to believe what happened to me yesterday!"}, {"who": "A", "name": "Luis", "es": "¿Qué pasó? ¡Cuéntame!", "en": "What happened? Tell me!"}, {"who": "B", "name": "You", "es": "Estaba en el supermercado y de repente vi a mi profesor de la universidad.", "en": "I was at the supermarket and suddenly I saw my university professor."}, {"who": "A", "name": "Luis", "es": "¡No me digas! ¿Y qué hiciste?", "en": "No way! And what did you do?"}, {"who": "B", "name": "You", "es": "Me acerqué a saludarlo y resulta que no era él, era otra persona.", "en": "I went up to greet him and it turns out it wasn't him, it was another person."}, {"who": "A", "name": "Luis", "es": "¡Qué vergüenza! ¿Y qué te dijo la persona?", "en": "How embarrassing! And what did the person say to you?"}], "exercises": [{"type": "listen_mc", "audio": "¡No vas a creer lo que me pasó ayer!", "prompt": "The speaker is about to:", "options": ["Tell a surprising story", "Give bad news", "Ask for advice", "Complain about work"], "correct": 0}, {"type": "respond", "situation": "React to a surprising story. Say 'No way! Tell me more!'", "answer": "¡No me digas! ¡Cuéntame más!", "alts": ["¡En serio! ¡Cuéntame!", "¡No puede ser! ¿Qué pasó?", "¡No manches! ¡Cuéntame!"]}, {"type": "build", "prompt": "Build: \"I was at the supermarket and suddenly...\"", "words": ["Estaba", "en", "el", "supermercado", "y", "de", "repente", "fui", "al"], "answer": "Estaba en el supermercado y de repente"}, {"type": "fill", "prompt": "Resulta que no ___ él. (it was)", "answer": "era"}, {"type": "listen_type", "audio": "Me acerqué a saludarlo", "prompt": "Type what you hear:", "answer": "Me acerqué a saludarlo"}, {"type": "mc", "prompt": "'¡Qué vergüenza!' means:", "options": ["How embarrassing!", "How scary!", "How amazing!", "How funny!"], "correct": 0}, {"type": "respond", "situation": "Start a story: 'You won't believe what happened to me!'", "answer": "¡No vas a creer lo que me pasó!", "alts": ["¡No te vas a creer lo que pasó!", "¡No me vas a creer!"]}, {"type": "mc", "prompt": "'Resulta que' is used to:", "options": ["Reveal a plot twist or surprise", "End a story", "Start a story", "Ask a question"], "correct": 0}, {"type": "fill", "prompt": "¿Y qué ___? (did you do)", "answer": "hiciste"}, {"type": "build", "prompt": "Build: \"It turns out it wasn't him\"", "words": ["Resulta", "que", "no", "era", "él", "fue", "es", "ella"], "answer": "Resulta que no era él"}]}, {"id": "party", "title": "At a Social Event", "icon": "🎉", "desc": "Mingle, introduce people, join conversations", "dialogue": [{"who": "A", "name": "Host", "es": "¡Bienvenidos! Pasen, están en su casa. ¿Qué quieren tomar?", "en": "Welcome! Come in, make yourselves at home. What would you like to drink?"}, {"who": "B", "name": "You", "es": "Gracias por invitarnos. Yo quiero una cerveza, por favor.", "en": "Thanks for inviting us. I'll have a beer, please."}, {"who": "A", "name": "Host", "es": "Mira, te presento a mi amiga Laura. Ella también es de Estados Unidos.", "en": "Look, let me introduce you to my friend Laura. She's also from the US."}, {"who": "B", "name": "You", "es": "¡Mucho gusto, Laura! ¿De qué parte de Estados Unidos eres?", "en": "Nice to meet you, Laura! What part of the US are you from?"}, {"who": "A", "name": "Laura", "es": "Soy de Chicago, pero llevo cinco años viviendo aquí. ¿Y tú?", "en": "I'm from Chicago, but I've been living here for five years. And you?"}, {"who": "B", "name": "You", "es": "Nosotros llegamos hace poco. Todavía estamos conociendo la ciudad.", "en": "We arrived recently. We're still getting to know the city."}], "exercises": [{"type": "listen_mc", "audio": "Pasen, están en su casa", "prompt": "The host is saying:", "options": ["Come in, make yourselves at home", "Please leave your shoes", "Come to the kitchen", "Sit at the table"], "correct": 0}, {"type": "respond", "situation": "Thank the host for the invitation.", "answer": "Gracias por invitarnos", "alts": ["Gracias por la invitación", "Muchas gracias por invitarnos"]}, {"type": "build", "prompt": "Build: \"Nice to meet you!\"", "words": ["¡Mucho", "gusto!", "me", "bien", "hola", "gracias"], "answer": "¡Mucho gusto!"}, {"type": "fill", "prompt": "Llevo cinco años ___ aquí. (living)", "answer": "viviendo"}, {"type": "listen_type", "audio": "Todavía estamos conociendo la ciudad", "prompt": "Type what you hear:", "answer": "Todavía estamos conociendo la ciudad"}, {"type": "mc", "prompt": "'Están en su casa' is a common way to say:", "options": ["Make yourself at home", "You're at our house", "This is your house", "Welcome home"], "correct": 0}, {"type": "respond", "situation": "Tell someone you arrived recently and are still exploring.", "answer": "Llegamos hace poco. Todavía estamos conociendo la ciudad.", "alts": ["Somos nuevos aquí", "Acabamos de llegar", "Llegamos hace poco"]}, {"type": "mc", "prompt": "'Te presento a' means:", "options": ["Let me introduce you to", "I'll present to", "I'm showing you", "You present to"], "correct": 0}, {"type": "fill", "prompt": "¿De qué ___ eres? (part/area)", "answer": "parte"}, {"type": "build", "prompt": "Build: \"We arrived recently\"", "words": ["Nosotros", "llegamos", "hace", "poco", "mucho", "ya", "ellos"], "answer": "Nosotros llegamos hace poco"}]}, {"id": "feelings", "title": "Expressing Feelings", "icon": "❤️", "desc": "Talk about emotions, comfort others, share personal stuff", "dialogue": [{"who": "A", "name": "Amiga", "es": "Te noto un poco triste hoy. ¿Estás bien?", "en": "You look a bit sad today. Are you okay?"}, {"who": "B", "name": "You", "es": "La verdad es que estoy un poco estresada con el trabajo.", "en": "The truth is I'm a bit stressed with work."}, {"who": "A", "name": "Amiga", "es": "Lo siento mucho. ¿Quieres hablar de eso?", "en": "I'm really sorry. Do you want to talk about it?"}, {"who": "B", "name": "You", "es": "Es que mi jefe me pide demasiado y no tengo tiempo para nada.", "en": "It's that my boss asks too much of me and I don't have time for anything."}, {"who": "A", "name": "Amiga", "es": "Te entiendo perfectamente. A veces hay que poner límites.", "en": "I understand you perfectly. Sometimes you have to set boundaries."}, {"who": "B", "name": "You", "es": "Tienes razón. Me hace bien hablar contigo. Gracias por escucharme.", "en": "You're right. It feels good talking to you. Thanks for listening."}], "exercises": [{"type": "listen_mc", "audio": "Te noto un poco triste hoy", "prompt": "The friend noticed that you:", "options": ["Look a bit sad today", "Look very happy", "Are tired", "Are angry"], "correct": 0}, {"type": "respond", "situation": "Say you're stressed about work.", "answer": "Estoy un poco estresada con el trabajo", "alts": ["Estoy estresada por el trabajo", "El trabajo me tiene estresada", "Estoy muy estresado con el trabajo"]}, {"type": "build", "prompt": "Build: \"Thanks for listening to me\"", "words": ["Gracias", "por", "escucharme", "hablarme", "a", "mí", "ti"], "answer": "Gracias por escucharme"}, {"type": "fill", "prompt": "A veces hay que poner ___. (boundaries)", "answer": "límites"}, {"type": "listen_type", "audio": "¿Quieres hablar de eso?", "prompt": "Type what you hear:", "answer": "¿Quieres hablar de eso?"}, {"type": "mc", "prompt": "'Me hace bien' means:", "options": ["It does me good", "It makes me well", "It sounds good", "It looks good"], "correct": 0}, {"type": "respond", "situation": "Comfort a friend. Say 'I understand you perfectly.'", "answer": "Te entiendo perfectamente", "alts": ["Te entiendo", "Lo entiendo perfectamente", "Entiendo cómo te sientes"]}, {"type": "mc", "prompt": "'Es que...' is used to:", "options": ["Introduce an explanation", "End a conversation", "Change the topic", "Ask a question"], "correct": 0}, {"type": "fill", "prompt": "La ___ es que estoy estresada. (truth)", "answer": "verdad"}, {"type": "build", "prompt": "Build: \"Do you want to talk about it?\"", "words": ["¿Quieres", "hablar", "de", "eso?", "ir", "con", "ello"], "answer": "¿Quieres hablar de eso?"}]}, {"id": "cooking", "title": "Food & Cooking", "icon": "🧑‍🍳", "desc": "Discuss recipes, food preferences, cooking together", "dialogue": [{"who": "B", "name": "You", "es": "¿Qué vamos a cocinar esta noche?", "en": "What are we going to cook tonight?"}, {"who": "A", "name": "Partner", "es": "No sé, ¿qué se te antoja? Podemos hacer tacos o pasta.", "en": "I don't know, what do you feel like? We can make tacos or pasta."}, {"who": "B", "name": "You", "es": "Me encantan los tacos. ¿Tenemos todos los ingredientes?", "en": "I love tacos. Do we have all the ingredients?"}, {"who": "A", "name": "Partner", "es": "Nos falta cilantro y limones. Hay que ir al super.", "en": "We're missing cilantro and limes. We need to go to the store."}, {"who": "B", "name": "You", "es": "Yo voy. ¿Necesitas algo más?", "en": "I'll go. Do you need anything else?"}, {"who": "A", "name": "Partner", "es": "Trae también aguacates para hacer guacamole. ¡Y tortillas!", "en": "Also bring avocados for guacamole. And tortillas!"}], "exercises": [{"type": "listen_mc", "audio": "¿Qué se te antoja?", "prompt": "They're asking:", "options": ["What do you feel like eating?", "What are you buying?", "What did you cook?", "What's in the fridge?"], "correct": 0}, {"type": "respond", "situation": "Say you love tacos and ask if you have the ingredients.", "answer": "Me encantan los tacos. ¿Tenemos los ingredientes?", "alts": ["Los tacos me encantan. ¿Hay ingredientes?", "Tacos me encantan. ¿Tenemos todo?"]}, {"type": "build", "prompt": "Build: \"We're missing cilantro and limes\"", "words": ["Nos", "falta", "cilantro", "y", "limones", "hay", "tiene", "los"], "answer": "Nos falta cilantro y limones"}, {"type": "fill", "prompt": "Trae también ___ para hacer guacamole. (avocados)", "answer": "aguacates"}, {"type": "listen_type", "audio": "¿Necesitas algo más?", "prompt": "Type what you hear:", "answer": "¿Necesitas algo más?"}, {"type": "mc", "prompt": "'Nos falta' means:", "options": ["We're missing / We need", "We have too much", "We found", "We bought"], "correct": 0}, {"type": "respond", "situation": "Offer to go to the store.", "answer": "Yo voy al super", "alts": ["Yo voy", "Yo voy a la tienda", "Voy yo"]}, {"type": "mc", "prompt": "'Hay que ir al super' means:", "options": ["We need to go to the store", "There's a supermarket", "Let's go shopping", "The store is closed"], "correct": 0}, {"type": "fill", "prompt": "¿Qué vamos a ___ esta noche? (cook)", "answer": "cocinar"}, {"type": "build", "prompt": "Build: \"Do you need anything else?\"", "words": ["¿Necesitas", "algo", "más?", "quieres", "todo", "bien", "ir"], "answer": "¿Necesitas algo más?"}]}, {"id": "advice", "title": "Giving & Getting Advice", "icon": "🤔", "desc": "Ask for recommendations, give suggestions, weigh options", "dialogue": [{"who": "A", "name": "Pedro", "es": "Estoy pensando en cambiar de trabajo. ¿Tú qué harías?", "en": "I'm thinking about changing jobs. What would you do?"}, {"who": "B", "name": "You", "es": "Depende. ¿No estás contento con tu trabajo actual?", "en": "It depends. Aren't you happy with your current job?"}, {"who": "A", "name": "Pedro", "es": "El salario está bien, pero no me siento motivado.", "en": "The salary is fine, but I don't feel motivated."}, {"who": "B", "name": "You", "es": "Yo en tu lugar buscaría algo que te apasione más.", "en": "If I were you, I'd look for something you're more passionate about."}, {"who": "A", "name": "Pedro", "es": "¿Tú crees? Es que me da miedo dejar algo seguro.", "en": "You think so? It's just that I'm afraid of leaving something secure."}, {"who": "B", "name": "You", "es": "Es normal tener miedo. Pero a la larga, la felicidad vale más que la seguridad.", "en": "It's normal to be afraid. But in the long run, happiness is worth more than security."}], "exercises": [{"type": "listen_mc", "audio": "¿Tú qué harías?", "prompt": "Pedro is asking:", "options": ["What would you do?", "What did you do?", "What are you doing?", "What will you do?"], "correct": 0}, {"type": "respond", "situation": "Give advice: 'If I were you, I'd look for something new.'", "answer": "Yo en tu lugar buscaría algo nuevo", "alts": ["Si yo fuera tú, buscaría algo nuevo", "Yo que tú buscaría algo nuevo", "En tu lugar yo buscaría algo diferente"]}, {"type": "build", "prompt": "Build: \"It's normal to be afraid\"", "words": ["Es", "normal", "tener", "miedo", "bueno", "mucho", "malo", "ser"], "answer": "Es normal tener miedo"}, {"type": "fill", "prompt": "Me da ___ dejar algo seguro. (fear/it scares me)", "answer": "miedo"}, {"type": "listen_type", "audio": "No me siento motivado", "prompt": "Type what you hear:", "answer": "No me siento motivado"}, {"type": "mc", "prompt": "'A la lar const VOCAB = {"Essential Verbs": [{"es": "ser", "en": "to be (permanent)", "desc": "Identity, origin, profession, characteristics, time, material. One of the two 'to be' verbs.", "ex": "Soy de Estados Unidos. — I'm from the United States."}, {"es": "estar", "en": "to be (temporary/state)", "desc": "Location, emotions, temporary states, progressive tenses. The other 'to be' verb.", "ex": "Estoy cansada hoy. — I'm tired today."}, {"es": "tener", "en": "to have", "desc": "Possession, age, obligations (tener que), sensations (tener hambre/frío). Incredibly common.", "ex": "Tengo dos hijos. — I have two kids."}, {"es": "hacer", "en": "to do / to make", "desc": "Actions, weather (hace calor), time ago (hace dos días). Very versatile verb.", "ex": "¿Qué haces este fin de semana? — What are you doing this weekend?"}, {"es": "ir", "en": "to go", "desc": "Movement + 'ir a' for near future. 'Vamos' = Let's go! One of the most-used verbs.", "ex": "Vamos al cine esta noche. — Let's go to the movies tonight."}, {"es": "poder", "en": "to be able to / can", "desc": "Ability, permission, possibility. '¿Puedo...?' is the polite way to ask permission.", "ex": "¿Puedo usar tu teléfono? — Can I use your phone?"}, {"es": "querer", "en": "to want / to love", "desc": "Desire or romantic love depending on context. 'Quisiera' = polite 'I would like.'", "ex": "Quiero ir a la playa. — I want to go to the beach."}, {"es": "decir", "en": "to say / to tell", "desc": "Communication. 'Dime' = Tell me. 'Se dice...' = You say... (how to say something).", "ex": "¿Cómo se dice esto en español? — How do you say this in Spanish?"}, {"es": "saber", "en": "to know (facts)", "desc": "Knowledge, facts, abilities (saber + infinitive = to know how to). Different from conocer.", "ex": "No sé dónde está. — I don't know where it is."}, {"es": "conocer", "en": "to know (people/places)", "desc": "Familiarity with people, places, experiences. 'Conozco' = I know/am familiar with.", "ex": "¿Conoces un buen restaurante? — Do you know a good restaurant?"}, {"es": "dar", "en": "to give", "desc": "Giving + many expressions: dar miedo (to scare), darse cuenta (to realize), dar igual (not to mind).", "ex": "Dame un momento. — Give me a moment."}, {"es": "pensar", "en": "to think", "desc": "Thoughts and opinions. 'Pensar en' = to think about. 'Pienso que...' = I think that...", "ex": "Estaba pensando en ti. — I was thinking about you."}, {"es": "creer", "en": "to believe / to think", "desc": "Beliefs and opinions. 'Creo que sí' = I think so. 'No creo' = I don't think so.", "ex": "Creo que tienes razón. — I think you're right."}, {"es": "hablar", "en": "to speak / to talk", "desc": "Speaking and conversation. '¿Hablas español?' is one of the first phrases you learn.", "ex": "Hablamos luego. — We'll talk later."}, {"es": "llegar", "en": "to arrive", "desc": "Arrival. 'Llegar a' = to arrive at. 'Llegar tarde' = to arrive late.", "ex": "Acabo de llegar. — I just arrived."}, {"es": "pasar", "en": "to happen / to pass / to come in", "desc": "Multi-meaning: ¿Qué pasó? (What happened?), pasar el rato (hang out), ¡Pasa! (Come in!).", "ex": "¿Qué te pasó ayer? — What happened to you yesterday?"}, {"es": "poner", "en": "to put / to place", "desc": "Placing things. Reflexive 'ponerse' = to put on (clothes), to become (emotion).", "ex": "Ponlo en la mesa. — Put it on the table."}, {"es": "salir", "en": "to go out / to leave", "desc": "Going out socially or leaving a place. 'Salir con' = to go out with/date someone.", "ex": "¿Quieres salir a cenar? — Do you want to go out for dinner?"}, {"es": "venir", "en": "to come", "desc": "Coming toward the speaker. 'Ven aquí' = Come here. 'Viene de...' = comes from.", "ex": "¿Vienes a la fiesta? — Are you coming to the party?"}, {"es": "tomar", "en": "to take / to drink", "desc": "Taking or drinking. 'Tomar un café' = to have a coffee. 'Tomar el sol' = to sunbathe.", "ex": "Vamos a tomar algo. — Let's go get a drink."}], "Everyday Actions": [{"es": "quedar", star triste' = to be sad. 'Ponerse triste' = to become sad.", "ex": "Me pongo triste cuando llueve. — I get sad when it rains."}, {"es": "listo/a", "en": "ready / smart", "desc": "With estar = ready. With ser = smart/clever. Classic ser vs estar distinction.", "ex": "¿Estás lista? ¡Vámonos! — Are you ready? Let's go!"}, {"es": "rico/a", "en": "delicious / rich", "desc": "Food = delicious. Person = rich. '¡Qué rico!' = How delicious!", "ex": "Esta sopa está riquísima. — This soup is delicious."}], "Reactions & Fillers": [{"es": "¡Qué padre!", "en": "How cool!", "desc": "Mexican Spanish. Equivalent to '¡Qué chévere!' (Colombia) or '¡Qué guay!' (Spain).", "ex": "¿Te ascendieron? ¡Qué padre! — You got promoted? How cool!"}, {"es": "¡No me digas!", "en": "No way! / You don't say!", "desc": "Express surprise. Can be genuine or sarcastic depending on tone.", "ex": "¡No me digas! ¿En serio? — No way! Seriously?"}, {"es": "o sea", "en": "I mean / like", "desc": "The most common Spanish filler. Clarify, rephrase, or buy time.", "ex": "Es caro, o sea, no es para todos. — It's expensive, I mean, not for everyone."}, {"es": "pues", "en": "well / so", "desc": "Universal filler to start any response. Softens what follows.", "ex": "Pues, la verdad no sé. — Well, the truth is I don't know."}, {"es": "es que...", "en": "the thing is...", "desc": "Introduces explanations, excuses, reasons. Essential connector.", "ex": "Es que no pude ir. — The thing is I couldn't go."}, {"es": "a ver", "en": "let's see", "desc": "Buys time naturally. Thinking, checking, or about to explain.", "ex": "A ver... creo que hay dos opciones. — Let's see... I think there are two options."}, {"es": "¡Qué rollo!", "en": "What a hassle!", "desc": "Express annoyance about a situation. Informal but very common.", "ex": "¿Se canceló? ¡Qué rollo! — It was cancelled? What a drag!"}, {"es": "¿en serio?", "en": "seriously? / really?", "desc": "Show surprise or seek confirmation.", "ex": "¿En serio te vas? — Seriously,
