<title>¡Habla! — Conversational Spanish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --green:#58cc02;--green-dark:#46a302;--green-deeper:#2d7a00;--green-glow:rgba(88,204,2,0.15);
  --bg:#131f24;--bg-card:#1b2b33;--bg-card-hover:#223640;--bg-surface:#17252d;
  --gold:#ffc800;--red:#ff4b4b;--red-soft:#ff6b6b;--blue:#49c0f8;--purple:#ce82ff;--orange:#ff9600;
  --text:#f0f4f5;--text-sec:#a0b8c4;--text-mut:#607880;--border:rgba(255,255,255,0.08);
  --rad:16px;--rad-sm:12px;--rad-xs:8px;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(88,204,2,0.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 100%,rgba(73,192,248,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.screen{display:none;min-height:100dvh;position:relative;z-index:1;flex-direction:column}.screen.active{display:flex}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg-surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:6px 0 calc(6px + var(--safe-bottom));backdrop-filter:blur(20px)}
.nav-btn{background:none;border:none;color:var(--text-mut);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:700;font-family:inherit;padding:6px 12px;border-radius:12px;cursor:pointer;transition:all 0.2s}
.nav-btn.active{color:var(--green)}.nav-btn svg{width:24px;height:24px}.nav-btn.active svg{filter:drop-shadow(0 0 6px rgba(88,204,2,0.4))}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:calc(12px + var(--safe-top)) 20px 12px;background:var(--bg-surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.top-bar-stats{display:flex;gap:14px;align-items:center}
.stat-item{display:flex;align-items:center;gap:4px;font-weight:800;font-size:14px}.stat-item .icon{font-size:16px}
.stat-streak{color:var(--orange)}.stat-xp{color:var(--gold)}.stat-hearts{color:var(--red)}
.top-bar-title{font-weight:900;font-size:18px;color:var(--green);letter-spacing:-0.5px}
.scroll-area{flex:1;overflow-y:auto;padding:16px 16px 100px;-webkit-overflow-scrolling:touch}
.section-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-mut);margin:20px 0 10px}.section-label:first-child{margin-top:0}
/* Streak Banner */
.streak-banner{background:linear-gradient(135deg,#ff9600 0%,#ff6b00 100%);border-radius:var(--rad);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.streak-fire{font-size:40px;animation:fireAnim 1s ease-in-out infinite alternate}
@keyframes fireAnim{0%{transform:scale(1) rotate(-3deg)}100%{transform:scale(1.1) rotate(3deg)}}
.streak-info{flex:1}.streak-count{font-size:24px;font-weight:900;color:#fff}.streak-msg{font-size:13px;color:rgba(255,255,255,0.85);font-weight:600}
.streak-banner.none{background:linear-gradient(135deg,#3a4a52 0%,#2a3a42 100%)}
/* Unit cards */
.unit-card{background:var(--bg-card);border-radius:var(--rad);padding:18px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.unit-card:active{transform:scale(0.98)}.unit-card.completed{border-color:var(--green-dark)}
.unit-card.completed::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green)}
.unit-card.locked{opacity:0.4;pointer-events:none}
.unit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.unit-icon{font-size:26px}.unit-crown{font-size:16px;color:var(--gold)}
.unit-title{font-size:16px;font-weight:800;margin-bottom:2px}.unit-desc{font-size:12px;color:var(--text-sec);line-height:1.3}
.unit-progress{margin-top:10px}.progress-bar-bg{height:7px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--green);border-radius:4px;transition:width 0.5s ease}
.progress-text{font-size:11px;color:var(--text-mut);margin-top:3px;text-align:right;font-weight:700}
/* Lesson */
.lesson-header{display:flex;align-items:center;gap:12px;padding:calc(12px + var(--safe-top)) 16px 12px;background:var(--bg-surface);border-bottom:1px solid var(--border)}
.lesson-close{background:none;border:none;color:var(--text-mut);font-size:22px;cursor:pointer;padding:4px;font-family:inherit}
.lesson-progress-bar{flex:1;height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden}
.lesson-progress-fill{height:100%;background:var(--green);border-radius:5px;transition:width 0.4s ease}
.lesson-hearts{display:flex;align-items:center;gap:3px;color:var(--red);font-weight:800;font-size:14px}
.lesson-content{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 20px 140px;overflow-y:auto;-webkit-overflow-scrolling:touch}

rante nuevo?", "¿Vamos al restaurante nuevo?", "¿Te gustaría ir al restaurante nuevo?"]}, {"type": "build", "prompt": "Build: \"I was thinking of going to that new restaurant\"", "words": ["Estaba", "pensando", "en", "ir", "a", "ese", "restaurante", "nuevo", "viejo", "este"], "answer": "Estaba pensando en ir a ese restaurante nuevo"}, {"type": "fill", "prompt": "¿A qué hora ___? (shall we meet)", "answer": "quedamos"}, {"type": "listen_type", "audio": "¡Me encantaría! ¿A qué hora quedamos?", "prompt": "Type what you hear:", "answer": "¡Me encantaría! ¿A qué hora quedamos?"}, {"type": "mc", "prompt": "'¿Te animas?' means:", "options": ["Are you up for it?", "Are you angry?", "Are you busy?", "Are you leaving?"], "correct": 0}, {"type": "respond", "situation": "Suggest meeting at 8pm.", "answer": "¿Qué te parece a las ocho?", "alts": ["¿A las ocho te parece bien?", "Nos vemos a las ocho", "¿Quedamos a las ocho?"]}, {"type": "mc", "prompt": "'Puedo hacer la reservación' means:", "options": ["I can make the reservation", "I can cancel the reservation", "I have a reservation", "I need a reservation"], "correct": 0}, {"type": "fill", "prompt": "¿___ también a Luis? (Should we invite)", "answer": "Invitamos"}, {"type": "build", "prompt": "Build: \"How about at eight?\"", "words": ["¿Qué", "te", "parece", "a", "las", "ocho?", "dos", "siete", "bien"], "answer": "¿Qué te parece a las ocho?"}]}, {"id": "family", "title": "Talking About Family", "icon": "👨‍👩‍👧‍👦", "desc": "Describe your family, talk about kids, relationships", "dialogue": [{"who": "A", "name": "Vecina", "es": "¡Qué lindos tus hijos! ¿Cuántos años tienen?", "en": "Your kids are so cute! How old are they?"}, {"who": "B", "name": "You", "es": "Gracias. El mayor tiene cinco y la pequeña tiene dos.", "en": "Thanks. The oldest is five and the little one is two."}, {"who": "A", "name": "Vecina", "es": "¿Ya va a la escuela el mayor?", "en": "Is the oldest one in school already?"}, {"who": "B", "name": "You", "es": "Sí,  día", "prompt": "What is being suggested?", "options": ["We should get them together sometime", "We should pick them up someday", "We should go somewhere", "We should talk more"], "correct": 0}]}, {"id": "airport", "title": "At the Airport", "icon": "✈️", "desc": "Check in, navigate security, handle flight issues", "dialogue": [{"who": "A", "name": "Agente", "es": "Buenos días. ¿Me permite su pasaporte y su tarjeta de embarque?", "en": "Good morning. May I see your passport and boarding pass?"}, {"who": "B", "name": "You", "es": "Aquí tiene. Quisiera un asiento de ventanilla, si es posible.", "en": "Here you go. I'd like a window seat, if possible."}, {"who": "A", "name": "Agente", "es": "Déjeme ver... Sí, tengo uno disponible. ¿Va a facturar equipaje?", "en": "Let me check... Yes, I have one available. Are you going to check luggage?"}, {"who": "B", "name": "You", "es": "Sí, una maleta. Y llevo equipaje de mano también.", "en": "Yes, one suitcase. And I have carry-on luggage too."}, {"who": "A", "name": "Agente", "es": "Perfecto. Su puerta de embarque es la B12. El abordaje empieza a las dos.", "en": "Perfect. Your boarding gate is B12. Boarding starts at two."}, {"who": "B", "name": "You", "es": "Gracias. ¿El vuelo sale a tiempo?", "en": "Thanks. Is the flight on time?"}], "exercises": [{"type": "listen_mc", "audio": "¿Me permite su pasaporte y su tarjeta de embarque?", "prompt": "What documents are being requested?", "options": ["Passport and boarding pass", "ID and ticket", "Passport and visa", "License and itinerary"], "correct": 0}, {"type": "respond", "situation": "Ask for a window seat.", "answer": "Quisiera un asiento de ventanilla", "alts": ["¿Puedo tener un asiento de ventanilla?", "Un asiento de ventanilla, por favor", "Me gustaría un asiento de ventanilla"]}, {"type": "build", "prompt": "Build: \"Is the flight on time?\"", "words": ["¿El", "vuelo", "sale", "a", "tiempo?", "llega", "es", "en"], "answer": "¿El vuelo sale a tiempo?"}, {"type": "fill", "pr at did the person say to you?"}], "exercises": [{"type": "listen_mc", "audio": "¡No vas a creer lo que me pasó ayer!", "prompt": "The speaker is about to:", "options": ["Tell a surprising story", "Give bad news", "Ask for advice", "Complain about work"], "correct": 0}, {"type": "respond", "situation": "React to a surprising story. Say 'No way! Tell me more!'", "answer": "¡No me digas! ¡Cuéntame más!", "alts": ["¡En serio! ¡Cuéntame!", "¡No puede ser! ¿Qué pasó?", "¡No manches! ¡Cuéntame!"]}, {"type": "build", "prompt": "Build: \"I was at the supermarket and suddenly...\"", "words": ["Estaba", "en", "el", "supermercado", "y", "de", "repente", "fui", "al"], "answer": "Estaba en el supermercado y de repente"}, {"type": "fill", "prompt": "Resulta que no ___ él. (it was)", "answer": "era"}, {"type": "listen_type", "audio": "Me acerqué a saludarlo", "prompt": "Type what you hear:", "answer": "Me acerqué a saludarlo"}, {"type": "mc", "prompt": "'¡Qué vergüenza!' means:", "options": ["How embarrassing!", "How scary!", "How amazing!", "How funny!"], "correct": 0}, {"type": "respond", "situation": "Start a story: 'You won't believe what happened to me!'", "answer": "¡No vas a creer lo que me pasó!", "alts": ["¡No te vas a creer lo que pasó!", "¡No me vas a creer!"]}, {"type": "mc", "prompt": "'Resulta que' is used to:", "options": ["Reveal a plot twist or surprise", "End a story", "Start a story", "Ask a question"], "correct": 0}, {"type": "fill", "prompt": "¿Y qué ___? (did you do)", "answer": "hiciste"}, {"type": "build", "prompt": "Build: \"It turns out it wasn't him\"", "words": ["Resulta", "que", "no", "era", "él", "fue", "es", "ella"], "answer": "Resulta que no era él"}]}, {"id": "party", "title": "At a Social Event", "icon": "🎉", "desc": "Mingle, introduce people, join conversations", "dialogue": [{"who": "A", "name": "Host", "es": "¡Bienvenidos! Pasen, están en su casa. ¿Qué quieren tomar?", "en": "Welcome! Come in, make yourselves at home. What would you like to drink?"}, {"who": "B", "name": "You", "es": "Gracias por invitarnos. Yo quiero una cerveza, por favor.", "en": "Thanks for inviting us. I'll have a beer, please."}, {"who": "A", "name": "Host", "es": "Mira, te presento a mi amiga Laura. Ella también es de Estados Unidos.", "en": "Look, let me introduce you to my friend Laura. She's also from the US."}, {"who": "B", "name": "You", "es": "¡Mucho gusto, Laura! ¿De qué parte de Estados Unidos eres?", "en": "Nice to meet you, Laura! What part of the US are you from?"}, {"who": "A", "name": "Laura", "es": "Soy de Chicago, pero llevo cinco años viviendo aquí. ¿Y tú?", "en": "I'm from Chicago, but I've been living here for five years. And you?"}, {"who": "B", "name": "You", "es": "Nosotros llegamos hace poco. Todavía estamos conociendo la ciudad.", "en": "We arrived recently. We're still getting to know the city."}], "exercises": [{"type": "listen_mc", "audio": "Pasen, están en su casa", "prompt": "The host is saying:", "options": ["Come in, make yourselves at home", "Please leave your shoes", "Come to the kitchen", "Sit at the table"], "correct": 0}, {"type": "respond", "situation": "Thank the host for the invitation.", "answer": "Gracias por invitarnos", "alts": ["Gracias por la invitación", "Muchas gracias por invitarnos"]}, {"type": "build", "prompt": "Build: \"Nice to meet you!\"", "words": ["¡Mucho", "gusto!", "me", "bien", "hola", "gracias"], "answer": "¡Mucho gusto!"}, {"type": "fill", "prompt": "Llevo cinco años ___ aquí. (living)", "answer": "viviendo"}, {"type": "listen_type", "audio": "Todavía estamos conociendo la ciudad", "prompt": "Type what you hear:", "answer": "Todavía estamos conociendo la ciudad"}, {"type": "mc", "prompt": "'Están en su casa' is a common way to say:", "options": ["Make yourself at home", "You're at our house", "This is your house", "Welcome home"], "correct": 0}, {"type": "respond", "situation": "Tell someone you arrived recently and are still exploring.", "answer": "Llegamos hace poco. Todavía estamos conociendo la ciudad.", "alts": ["Somos nuevos aquí", "Acabamos de llegar", "Llegamos hace poco"]}, {"type": "mc", "prompt": "'Te presento a' means:", "options": ["Let me introduce you to", "I'll present to", "I'm showing you", "You present to"], "correct": 0}, {"type": "fill", "prompt": "¿De qué ___ eres? (part/area)", "answer": "parte"}, {"type": "build", "prompt": "Build: \"We arrived recently\"", "words": ["Nosotros", "llegamos", "hace", "poco", "mucho", "ya", "ellos"], "answer": "Nosotros llegamos hace poco"}]}, {"id": "feelings", "title": "Expressing Feelings", "icon": "❤️", "desc": "Talk about emotions, comfort others, share personal stuff", "dialogue": [{"who": "A", "name": "Amiga", "es": "Te noto un poco triste hoy. ¿Estás bien?", "en": "You look a bit sad today. Are you okay?"}, {"who": "B", "name": "You", "es": "La verdad es que estoy un poco estresada con el trabajo.", "en": "The truth is I'm a bit stressed with work."}, {"who": "A", "name": "Amiga", "es": "Lo siento mucho. ¿Quieres hablar de eso?", "en": "I'm really sorry. Do you want to talk about it?"}, {"who": "B", "name": "You", "es": "Es que mi jefe me pide demasiado y no tengo tiempo para nada.", "en": "It's that my boss asks too much of me and I don't have time for anything."}, {"who": "A", "name": "Amiga", "es": "Te entiendo perfectamente. A veces hay que poner límites.", "en": "I understand you perfectly. Sometimes you have to set boundaries."}, {"who": "B", "name": "You", "es": "Tienes razón. Me hace bien hablar contigo. Gracias por escucharme.", "en": "You're right. It feels good talking to you. Thanks for listening."}], "exercises": [{"type": "listen_mc", "audio": "Te noto un poco triste hoy", "prompt": "The friend noticed that you:", "options": ["Look a bit sad today", "Look very happy", "Are tired", "Are angry"], "correct": 0}, {"type": "respond", "situation": "Say you're stressed about work.", "answer": "Estoy un poco estresada con el trabajo", "alts": ["Estoy estresada por el const VOCAB = {"Everyday Verbs": [{"es": "quedar", "en": "to meet up / to remain / to fit", "desc": "One of the most versatile verbs. Use it for making plans, talking about how clothes fit, or what's left over.", "ex": "¿Quedamos a las ocho? — Shall we meet at eight?"}, {"es": "pasar", "en": "to happen / to pass / to spend time", "desc": "Context determines meaning: ¿Qué pasó? (What happened?), pasar el rato (hang out), ¡Pasa! (Come in!)", "ex": "¿Qué te pasó ayer? — What happened to you yesterday?"}, {"es": "quedar(se)", "en": "to stay / to remain", "desc": "Reflexive form means to stay put. 'Me quedé en casa' = I stayed home. Different from non-reflexive quedar.", "ex": "Nos quedamos en casa viendo películas. — We stayed home watching movies."}, {"es": "dejar", "en": "to leave / to let / to stop", "desc": "Dejar de + infinitive = to stop doing something. Dejar = to leave something behind or to allow.", "ex": "Dejé las llaves en la mesa. — I left the keys on the table."}, {"es": "fijar(se)", "en": "to notice / to pay attention", "desc": "'Fíjate que...' is a common conversation starter meaning 'Guess what...' or 'So listen...'", "ex": "Fíjate que me encontré a Juan ayer. — So guess what, I ran into Juan yesterday."}, {"es": "dar(se) cuenta", "en": "to realize", "desc": "Always used as 'darse cuenta de' — to realize something. Very common in conversation.", "ex": "Me di cuenta de que era tarde. — I realized it was late."}, {"es": "echar", "en": "to throw / to pour / to miss", "desc": "'Echar de menos' = to miss someone. 'Echar un vistazo' = take a look. Very versatile.", "ex": "Te echo de menos. — I miss you."}, {"es": "aprovechar", "en": "to take advantage of / to make the most of", "desc": "Positive connotation in Spanish — seize the opportunity, make the most of it.", "ex": "¡Aprovecha el buen tiempo! — Make the most of the nice weather!"}, {"es": "resultar", "en": "to turn out", "desc": "'Resulta que...' is essential for storytelling — introduces a twist or revelation.", "ex": "Resulta que el vuelo se canceló. — It turns out the flight was cancelled."}, {"es": "pillar / agarrar", "en": "to catch / to grab", "desc": "Pillar is more Spain, agarrar more Latin America. Both mean to catch or grab casually.", "ex": "Vamos a pillar un taxi. — Let's grab a taxi."}], "Reactions & Fillers": [{"es": "¡Qué padre!", "en": "How cool!", "desc": "Mexican Spanish. Equivalent to '¡Qué chévere!' (Colombia/Venezuela) or '¡Qué guay!' (Spain).", "ex": "¿Te ascendieron? ¡Qué padre! — You got promoted? How cool!"}, {"es": "¡No me digas!", "en": "No way! / You don't say!", "desc": "Express surprise. Can be genuine or sarcastic depending on tone.", "ex": "Perdió las llaves otra vez. — ¡No me digas! — He lost his keys again. — No way!"}, {"es": "o sea", "en": "I mean / like / that is", "desc": "The most common Spanish filler. Use it to clarify, rephrase, or buy time while thinking.", "ex": "Es caro, o sea, no es para todos. — It's expensive, I mean, it's not for everyone."}, {"es": "pues", "en": "well / so", "desc": "Universal filler to start any response. Softens what follows and sounds very natural.", "ex": "Pues, la verdad no sé qué decirte. — Well, honestly I don't know what to tell you."}, {"es": "es que...", "en": "the thing is... / it's just that...", "desc": "Introduces explanations, excuses, or reasons. Essential conversational connector.", "ex": "Es que no pude ir, tenía mucho trabajo. — The thing is I couldn't go, I had too much work."}, {"es": "a ver", "en": "let's see / let me check", "desc": "Buys time naturally. Use when thinking, checking something, or about to explain.", "ex": "A ver... creo que tenemos dos opciones. — Let's see... I think we have two options."}, {"es": "¡Qué rollo!", "en": "What a hassle! / What a drag!", "desc": "Express annoyance about a situation. Informal but very common.", "ex": "¿Se canceló el vuelo? ¡Qué rollo! — The flight was cancelled? What a drag!"}, {"es": "¿en serio?", "en": "seriously? / really?", "desc": "Show surprise or seek confirmation. More neutral than '¡No me digas!'", "ex": "¿En serio te vas a mudar? — Seriously, you're going to move?"}, {"es": "bueno", "en": "well / okay / alright", "desc": "Multipurpose: start a response, signal agreement, transition between topics, or answer the phone.", "ex": "Bueno, yo creo que tienes razón. — Well, I think you're right."}, {"es": "¡Qué loco!", "en": "That's crazy!", "desc": "React to surprising or unbelievable information. Not offensive, just expressive.", "ex": "Se ganó la lotería. — ¡Qué loco! — He won the lottery. — That's crazy!"}], "Social & Plans": [{"es": "quedar con", "en": "to meet up with", "desc": "The standard way to say you're meeting someone. 'Quedé con Ana' = I'm meeting up with Ana.", "ex": "¿Quedamos mañana para cenar? — Shall we meet up tomorrow for dinner?"}, {"es": "pasarla bien", "en": "to have a good time", "desc": "Latin America: pasarla bien. Spain: pasarlo bien. Essential for talking about fun.", "ex": "La pasamos muy bien en la fiesta. — We had a great time at the party."}, {"es": "animarse", "en": "to be up for it / to dare", "desc": "'¿Te animas?' = Are you game? Are you up for it? Great for casual invitations.", "ex": "Vamos al cine. ¿Te animas? — Let's go to the movies. Are you up for it?"}, {"es": "tener ganas de", "en": "to feel like doing", "desc": "Express desire or inclination. 'No tengo ganas' = I don't feel like it.", "ex": "Tengo ganas de ir a la playa. — I feel like going to the beach."}, {"es": "dar flojera", "en": "to feel too lazy / can't be bothered", "desc": "When something sounds like too much effort. Very relatable expression.", "ex": "Me da flojera cocinar hoy. — I can't be bothered to cook today."}, {"es": "caer bien/mal", "en": "to like/dislike someone's personality", "desc": "Not romantic — describes personal chemistry. 'Me cae muy bien' = I really like them (as a person).", "ex": "Tu amigo me cae super bien. — I really like your friend (as a person)."}, {"es": "llevar + time", "en": "to have been doing for X time", "desc": "'Llevo tres años aquí' = I've been here for three years. Essential time expression.", "ex": "Llevo dos horas esperando. — I've been waiting for two hours."}, {"es": "acabar de", "en": "to have just done something", "desc": "Recent past: 'Acabo de llegar' = I just arrived. Very useful for narrating recent events.", "ex": "Acabo de hablar con ella. — I just spoke with her."}, {"es": "ponerse de acuerdo", "en": "to come to an agreement", "desc": "When coordinating plans or reaching consensus with a group.", "ex": "No nos podemos poner de acuerdo. — We can't agree on anything."}, {"es": "apuntarse", "en": "to sign up / to join in", "desc": "'¿Te apuntas?' = Want to join? 'Me apunto' = Count me in!", "ex": "Vamos a hacer senderismo. ¿Te apuntas? — We're going hiking. Want to join?"}], "Descriptions & Opinions": [{"es": "parecer", "en": "to seem / to think (opinion)", "desc": "'Me parece que...' = I think that... 'Me parece bien' = Sounds good to me. Very versatile.", "ex": "Me parece buena idea. — That seems like a good idea to me."}, {"es": "genial", "en": "great / awesome", "desc": "Universal positive reaction. Works in all Spanish-speaking countries.", "ex": "¡Qué plan tan genial! — What an awesome plan!"}, {"es": "increíble", "en": "incredible / unbelievable", "desc": "Can be positive or negative depending on context. 'Es increíble lo caro que es' = It's unbelievable how expensive it is.", "ex": "La vista es increíble. — The view is incredible."}, {"es": "estar harto/a de", "en": "to be fed up with", "desc": "Stronger than 'cansado de.' Express real frustration or exhaustion with something.", "ex": "Estoy harta del tráfico. — I'm fed up with the traffic."}, {"es": "valer la pena", "en": "to be worth it", "desc": "'¿Vale la pena?' = Is it worth it? Essential for recommendations and decisions.", "ex": "La película vale mucho la pena. — The movie is really worth it."}, {"es": "tener sentido", "en": "to make sense", "desc": "Acknowledge understanding: 'Tiene sentido' = That makes sense. Great in conversations.", "ex": "Ah, ahora tiene sentido. — Ah, now it makes sense."}, {"es": "depender de", "en": "to depend on", "desc": "Hedge your opinion: 'Depende de...' Sounds natural and thoughtful.", "ex": "Depende de lo que quieras hacer. — It depends on what you want to do."}, {"es": "dar igual", "en": "to not mind / it's all the same", "desc": "Express indifference (not rudely): 'Me da igual' = I don't mind either way.", "ex": "¿Pizza o sushi? — Me da igual, lo que tú quieras. — I don't mind, whatever you want."}, {"es": "molar", "en": "to be cool (Spain)", "desc": "Spain slang: 'Mola mucho' = That's really cool. Not used in Latin America.", "ex": "Tu camiseta mola mucho. — Your t-shirt is really cool."}, {"es": "flipar", "en": "to be amazed / shocked (Spain)", "desc": "Spain slang: 'Estoy flipando' = I'm blown away. Shows strong reaction.", "ex": "¡Estoy flipando con esta noticia! — I'm blown away by this news!"}], "Home & Daily Life": [{"es": "madrugar", "en": "to get up very early", "desc": "'No me gusta madrugar' is one of the most relatable sentences in Spanish.", "ex": "Mañana tengo que madrugar para el vuelo. — Tomorrow I have to get up early for the flight."}, {"es": "trasnochar", "en": "to stay up very late", "desc": "The opposite of madrugar. Perfect for talking about late nights.", "ex": "Trasnochamos viendo series. — We stayed up late watching shows."}, {"es": "arreglar(se)", "en": "to fix / to get ready", "desc": "Arreglarse = to get yourself ready/dressed up. Arreglar = to fix something.", "ex": "Dame un momento, me estoy arreglando. — Give me a moment, I'm getting ready."}, {"es": "hacer mandados", "en": "to run errands", "desc": "Latin America: 'hacer mandados.' Spain: 'hacer recados.' Both mean running errands.", "ex": "Tengo que hacer unos mandados después del trabajo. — I have to run some errands after work."}, {"es": "recoger", "en": "to pick up / to clean up / to collect", "desc": "Pick up kids from school, clean up the house, or collect something.", "ex": "Voy a recoger a los niños a las tres. — I'm going to pick up the kids at three."}, {"es": "encargarse de", "en": "to take care of / to handle", "desc": "'Yo me encargo' = I'll handle it. Shows responsibility and initiative.", "ex": "No te preocupes, yo me encargo de todo. — Don't worry, I'll take care of everything."}, {"es": "sobrar", "en": "to be left over / to have extra", "desc": "'Sobra comida' = There's food left over. Useful for everyday situations.", "ex": "¿Sobró algo de la cena? — Was there anything left from dinner?"}, {"es": "hacer falta", "en": "to need / to be necessary", "desc": "Impersonal: 'Hace falta más sal' = More salt is needed. Personal: 'Te hago falta' = You need me.", "ex": "Hace falta comprar leche. — We need to buy milk."}, {"es": "tocar(le) a uno", "en": "to be someone's turn", "desc": "'Te toca' = It's your turn. 'Me toca cocinar' = It's my turn to cook.", "ex": "Hoy te toca lavar los platos. — Today it's your turn to do the dishes."}, {"es": "tardar", "en": "to take time / to be late", "desc": "'No tardo' = I won't be long. '¿Cuánto tarda?' = How long does it take?", "ex": "El autobús tarda veinte minutos. — The bus takes twenty minutes."}]};
const GRAMMAR = [{"title": "Conversation Starters", "rule": "Don't just say 'Hola.' Real conversations start with: '¿Qué tal?' / '¿Cómo te fue?' / '¡Qué gusto verte!' Follow up with something specific: '¿Cómo estuvo tu fin de semana?' sounds much more natural than '¿Cómo estás?'", "ex": [{"es": "¡Hola! ¿Cómo te fue ayer?", "en": "Hi! How did it go yesterday?"}, {"es": "¡Qué gusto! ¿Cómo has estado?", "en": "Great to see you! How have you been?"}]}, {"title": "Buying Time with Fillers", "rule": "Native speakers use fillers constantly. 'Pues...' 'A ver...' 'O sea...' 'Es que...' — these make you sound natural while you think. Use 'Bueno...' to start any response. 'Mira...' or 'Fíjate que...' to get attention before explaining.", "ex": [{"es": "Pues... la verdad es que no sé.", "en": "Well... the truth is I don't know."}, {"es": "Es que no pude ir, tenía mucho trabajo.", "en": "The thing is I couldn't go, I had a lot of work."}]}, {"title": "Softening Requests", "rule": "The conditional tense is your best friend for politeness. 'Quisiera' > 'Quiero'. '¿Podría...?' > '¿Puede...?' Even adding 'por favor' isn't enough without the right verb form.", "ex": [{"es": "Quisiera hacer una reservación.", "en": "I'd like to make a reservation."}, {"es": "¿Podría hablar más despacio?", "en": "Could you speak more slowly?"}]}, {"title": "Agreeing & Disagreeing", "rule": "Agreement: 'Totalmente' / 'Tienes razón' / 'Estoy de acuerdo' / 'Exacto.' Soft disagreement: 'No estoy tan seguro' / 'Puede ser, pero...' / 'Entiendo tu punto, pero...' Strong: '¡Qué va!' / 'Para nada.'", "ex": [{"es": "Entiendo tu punto, pero creo que hay otra forma de verlo.", "en": "I see your point, but I think there's another way to see it."}, {"es": "¿Tú crees? Yo no estoy tan segura.", "en": "You think so? I'm not so sure."}]}, {"title": "Reacting Naturally", "rule": "Show you're engaged: '¡No me digas!' (No way!) / '¿En serio?' (Seriously?) / '¡Qué loco!' (That's crazy!) / '¡Qué padre!' (How cool! — Mexico) / 'Tiene sentido' (Makes sense). These keep conversation flowing.", "ex": [{"es": "— Me ofrecieron el trabajo. — ¡No me digas! ¡Felicidades!", "en": "— They offered me the job. — No way! Congrats!"}, {"es": "— El vuelo se canceló. — ¡Qué rollo! ¿Y ahora qué vas a hacer?", "en": "— The flight was cancelled. — What a hassle! So what will you do?"}]}, {"title": "Making Plans", "rule": "Use 'ir a + infinitive' for near future, not future tense. 'Voy a salir' > 'Saldré.' For suggestions: '¿Qué te parece si...?' / '¿Por qué no...?' / '¿Y si...?' These invite collaboration.", "ex": [{"es": "¿Qué te parece si vamos al cine?", "en": "How about we go to the movies?"}, {"es": "¿Y si pedimos comida a domicilio?", "en": "What if we order delivery?"}]}, {"title": "Storytelling", "rule": "Set the scene with imperfect: 'Estaba lloviendo... había mucha gente...' Advance with preterite: 'De repente llegó...' Use 'resulta que' for plot twists. End with reactions: '¡No lo podía creer!'", "ex": [{"es": "Estábamos en el restaurante cuando de repente se fue la luz.", "en": "We were at the restaurant when suddenly the power went out."}, {"es": "Resulta que el vuelo salía dos horas antes. ¡Casi no llegamos!", "en": "Turns out the flight left two hours earlier. We almost didn't make it!"}]}, {"title": "Polite Closings", "rule": "Don't just say 'Adiós.' Natural closings: 'Bueno, te dejo' (I'll let you go) / 'Nos vemos' (See you) / 'Hablamos luego' (Talk later) / 'Cuídate mucho' (Take care). Phone: 'Te mando mensaje' (I'll text you).", "ex": [{"es": "Bueno, te dejo que tengo que irme. ¡Hablamos!", "en": "Well, I'll let you go, I gotta run. Talk later!"}, {"es": "Cuídate mucho. Te mando mensaje para lo del viernes.", "en": "Take care. I'll text you about Friday."}]}];

// TTS
let spanishVoice=null;
function initVoices(){const v=speechSynthesis.getVoices();spanishVoice=v.find(x=>x.lang==='es-MX')||v.find(x=>x.lang==='es-ES')||v.find(x=>x.lang.startsWith('es'))||null}
speechSynthesis.onvoiceschanged=initVoices;initVoices();
function speak(t,r=0.9){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='es-ES';u.rate=r;if(spanishVoice)u.voice=spanishVoice;speechSynthesis.speak(u);return u}
function speakBtn(b,t,r){b.classList.add('playing');const u=speak(t,r);u.onend=()=>b.classList.remove('playing');u.onerror=()=>b.classList.remove('playing')}

// STATE
const SK='habla_v2';
let state=loadState();
function defaultState(){return{xp:0,streak:0,hearts:5,lessonsCompleted:[],lastActiveDate:null,activeDays:[],learnedVocab:[],todayXP:0,todayDate:null}}
function loadState(){try{const r=localStorage.getItem(SK);if(!r)return defaultState();const s=JSON.parse(r);
const today=new Date().toDateString();if(s.lastActiveDate){const d=Math.floor((new Date(today)-new Date(s.lastActiveDate))/86400000);if(d>1)s.streak=0}
if(s.todayDate!==today){s.todayXP=0;s.todayDate=today}
return s}catch(e){return defaultState()}}
function saveState(){localStorage.setItem(SK,JSON.stringify(state))}
function updateStreak(){const today=new Date().toDateString();if(state.lastActiveDate!==today){state.streak++;state.lastActiveDate=today;if(!state.activeDays.includes(today))state.activeDays.push(today);if(state.activeDays.length>30)state.activeDays=state.activeDays.slice(-30);state.todayDate=today}}
function refreshUI(){
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v};
  s('nav-streak',state.streak);s('nav-xp',state.xp);s('nav-hearts',state.hearts);
  s('prof-streak',state.streak);s('prof-xp',state.xp);s('prof-lessons',state.lessonsCompleted.length);s('prof-words',state.learnedVocab.length);
  const allV=Object.values(VOCAB).flat();s('vocab-count',allV.length);
  s('vocab-learned-ct',state.learnedVocab.length);s('vocab-total-ct',allV.length);
  const pf=document.getElementById('vocab-prog-fill');if(pf)pf.style.width=(allV.length?state.learnedVocab.length/allV.length*100:0)+'%';
}

// NAV
function switchTab(btn){
  const sc=btn.dataset.screen;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+sc).classList.add('active');
  document.getElementById('mainNav').classList.remove('hidden');document.getElementById('lesson-complete').classList.remove('active');
  if(sc==='learn')renderLearn();if(sc==='vocab')renderVocab();if(sc==='grammar')renderGrammar();if(sc==='profile')renderProfile();refreshUI();
}

function renderLearn(){
  const el=document.getElementById('learn-scroll');
  // Streak banner
  const msgs=['Start your streak today!','Nice! Keep it going!','You\'re on fire!','Incredible dedication!','Unstoppable!'];
  const mi=state.streak===0?0:state.streak<3?1:state.streak<7?2:state.streak<30?3:4;
  let h=`<div class="streak-banner ${state.streak===0?'none':''}"><div class="streak-fire">${state.streak>0?'🔥':'\u2744\ufe0f'}</div><div class="streak-info"><div class="streak-count">${state.streak} Day Streak</div><div class="streak-msg">${msgs[mi]}</div></div></div>`;
  h+='<div class="section-label">Conversational Lessons</div>';
  UNITS.forEach((u,i)=>{
    const done=state.lessonsCompleted.includes(u.id);const prev=i===0||state.lessonsCompleted.includes(UNITS[i-1].id);const locked=!prev&&!done;
    h+=`<div class="unit-card ${done?'completed':locked?'locked':''}" onclick="startLesson('${u.id}')">
      <div class="unit-header"><span class="unit-icon">${u.icon}</span>${done?'<span class="unit-crown">\ud83d\udc51</span>':''}</div>
      <div class="unit-title">${u.title}</div><div class="unit-desc">${u.desc}</div>
      <div class="unit-progress"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${done?100:0}%"></div></div>
      <div class="progress-text">${done?'COMPLETE':locked?'\ud83d\udd12 LOCKED':'START'}</div></div></div>`;
  });
  el.innerHTML=h;
}

// LESSON ENGINE
let curUnit=null,lessonEx=[],exIdx=0,lCorrect=0,lTotal=0,lHearts=5,selAnswer=null,answered=false;
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function startLesson(id){
  const u=UNITS.find(x=>x.id===id);if(!u)return;curUnit=u;
  lessonEx=[{type:'dialogue',data:u.dialogue},...u.exercises.sort(()=>Math.random()-0.5)];
  exIdx=0;lCorrect=0;lTotal=u.exercises.length;lHearts=state.hearts;selAnswer=null;answered=false;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-lesson').classList.add('active');document.getElementById('mainNav').classList.add('hidden');
  document.getElementById('lesson-hearts').textContent=lHearts;renderEx();
}
function exitLesson(){speechSynthesis.cancel();document.getElementById('screen-lesson').classList.remove('active');
  document.getElementById('screen-learn').classList.add('active');document.getElementById('mainNav').classList.remove('hidden');renderLearn();refreshUI()}

function renderEx(){
  if(exIdx>=lessonEx.length||lHearts<=0){showComplete();return}
  const ex=lessonEx[exIdx];const pct=exIdx/lessonEx.length*100;
  document.getElementById('lesson-progress').style.width=pct+'%';
  selAnswer=null;answered=false;
  const fb=document.getElementById('feedback-bar');fb.classList.remove('show','correct','wrong');
  const btn=document.getElementById('check-btn');const C=document.getElementById('lesson-content');

  if(ex.type==='dialogue'){
    btn.className='check-btn ready';btn.textContent='CONTINUE';
    let dh=`<div class="scene-card"><div class="scene-emoji">${curUnit.icon}</div><div class="scene-title">${curUnit.title}</div><div class="scene-desc">Listen to the conversation, tap lines to hear them</div></div><div class="dialogue-container">`;
    ex.data.forEach(l=>{
      dh+=`<div class="dialogue-line ${l.who==='B'?'right':''}"><div class="dialogue-avatar ${l.who.toLowerCase()}">${l.who==='A'?'\ud83e\uddd1':'\ud83d\ude4b'}</div>
        <div class="dialogue-bubble" onclick="speak('${esc(l.es)}',0.85)"><div class="dialogue-es">${l.es}</div><div class="dialogue-en">${l.en}</div></div></div>`;
    });
    dh+='</div>';C.innerHTML=dh;setTimeout(()=>speak(ex.data[0].es,0.85),400);answered=true;return;
  }
  btn.className='check-btn disabled';btn.textContent='CHECK';

  if(ex.type==='listen_mc'){
    C.innerHTML=`<div class="ex-type">\ud83c\udf99\ufe0f Listen & Choose</div>
      <button class="speaker-btn" onclick="speakBtn(this,'${esc(ex.audio)}',0.85)">\ud83d\udd0a</button>
      <div class="ex-prompt">${ex.prompt}</div>
      <div class="mc-options">${ex.options.map((o,i)=>`<button class="mc-option" onclick="selMC(this,${i})"><span class="opt-num">${i+1}</span><span>${o}</span></button>`).join('')}</div>`;
    setTimeout(()=>speak(ex.audio,0.85),300);
  } else if(ex.type==='listen_type'){
    C.innerHTML=`<div class="ex-type">\u270d\ufe0f Listen & Write</div>
      <button class="speaker-btn" onclick="speakBtn(this,'${esc(ex.audio)}',0.85)">\ud83d\udd0a</button>
      <div class="ex-prompt">${ex.prompt}</div>
      <div class="text-input-area"><input class="text-input" id="fill-input" type="text" placeholder="Type what you heard..." autocomplete="off" autocapitalize="off" oninput="onFill()"></div>
      <div style="margin-top:10px"><button class="speaker-btn small" onclick="speakBtn(this,'${esc(ex.audio)}',0.6)">\ud83d\udc22</button><div style="font-size:10px;color:var(--text-mut);text-align:center;margin-top:2px">Slow</div></div>`;
    setTimeout(()=>speak(ex.audio,0.85),300);setTimeout(()=>document.getElementById('fill-input')?.focus(),500);
  } else if(ex.type==='respond'){
    C.innerHTML=`<div class="ex-type">\ud83d\udcac Respond in Spanish</div>
      <div class="scene-card"><div class="scene-desc">${ex.situation}</div></div>
      <div class="text-input-area"><input class="text-input" id="fill-input" type="text" placeholder="Type your response..." autocomplete="off" autocapitalize="off" oninput="onFill()"></div>`;
    setTimeout(()=>document.getElementById('fill-input')?.focus(),200);
  } else if(ex.type==='build'){
    const sh=[...ex.words].sort(()=>Math.random()-0.5);
    C.innerHTML=`<div class="ex-type">\ud83e\udde9 Build the Sentence</div><div class="ex-prompt">${ex.prompt}</div>
      <div class="word-bank-target" id="wb-target"></div>
      <div class="word-bank-pool" id="wb-pool">${sh.map((w,i)=>`<button class="word-chip" data-idx="${i}" data-word="${esc(w)}" onclick="chipTap(this)">${w}</button>`).join('')}</div>`;
  } else if(ex.type==='mc'){
    C.innerHTML=`<div class="ex-type">\u2753 Choose the Answer</div><div class="ex-prompt">${ex.prompt}</div>
      <div class="mc-options">${ex.options.map((o,i)=>`<button class="mc-option" onclick="selMC(this,${i})"><span class="opt-num">${i+1}</span><span>${o}</span></button>`).join('')}</div>`;
  } else if(ex.type==='fill'){
    C.innerHTML=`<div class="ex-type">\u270f\ufe0f Fill in the Blank</div><div class="ex-prompt">${ex.prompt}</div>
      <div class="text-input-area"><input class="text-input" id="fill-input" type="text" placeholder="Type your answer..." autocomplete="off" autocapitalize="off" oninput="onFill()"></div>`;
    setTimeout(()=>document.getElementById('fill-input')?.focus(),200);
  }
}

function chipTap(el){
  if(answered)return;const target=document.getElementById('wb-target');const pool=document.getElementById('wb-pool');
  if(el.classList.contains('in-target')){el.classList.remove('in-target');pool.appendChild(el)}
  else{el.classList.add('in-target');target.appendChild(el)}
  const inT=target.querySelectorAll('.word-chip');
  document.getElementById('check-btn').className=inT.length>0?'check-btn ready':'check-btn disabled';
  selAnswer=[...inT].map(c=>c.dataset.word).join(' ');
}
function selMC(el,idx){if(answered)return;document.querySelectorAll('.mc-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');selAnswer=idx;document.getElementById('check-btn').className='check-btn ready'}
function onFill(){const v=document.getElementById('fill-input')?.value.trim();
  document.getElementById('check-btn').className=v?'check-btn ready':'check-btn disabled';selAnswer=v}

function handleCheck(){
  const btn=document.getElementById('check-btn');if(btn.classList.contains('disabled'))return;
  if(answered&&lessonEx[exIdx].type==='dialogue'){exIdx++;renderEx();return}
  if(!answered){
    answered=true;const ex=lessonEx[exIdx];let ok=false;
    if(ex.type==='mc'||ex.type==='listen_mc'){
      ok=selAnswer===ex.correct;
      document.querySelectorAll('.mc-option').forEach((o,i)=>{o.classList.add('disabled');if(i===ex.correct)o.classList.add('correct');if(i===selAnswer&&!ok)o.classList.add('wrong')});
    } else if(ex.type==='fill'){
      const inp=document.getElementById('fill-input');ok=norm(inp.value)===norm(ex.answer);inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
    } else if(ex.type==='listen_type'){
      const inp=document.getElementById('fill-input');ok=norm(inp.value)===norm(ex.answer);inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
    } else if(ex.type==='respond'){
      const inp=document.getElementById('fill-input');const u=norm(inp.value);ok=u===norm(ex.answer)||(ex.alts||[]).some(a=>norm(a)===u);
      inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
    } else if(ex.type==='build'){ok=norm(selAnswer||'')===norm(ex.answer)}
    if(ok){lCorrect++;showFB(true);btn.className='check-btn continue'}
    else{lHearts--;document.getElementById('lesson-hearts').textContent=lHearts;
      let d=null;if(ex.type==='fill'||ex.type==='listen_type')d='Answer: '+ex.answer;
      else if(ex.type==='respond')d='One answer: '+ex.answer;else if(ex.type==='build')d='Answer: '+ex.answer;
      showFB(false,d);btn.className='check-btn wrong-continue'}
    btn.textContent='CONTINUE';
  } else{exIdx++;renderEx()}
}
function showFB(ok,d){const fb=document.getElementById('feedback-bar');fb.classList.add('show',ok?'correct':'wrong');fb.classList.remove(ok?'wrong':'correct');
  document.getElementById('feedback-text').textContent=ok?'¡Correcto! 🎉':'¡Incorrecto! \ud83d\ude14';document.getElementById('feedback-detail').textContent=d||''}
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim()}

function showComplete(){
  speechSynthesis.cancel();document.getElementById('screen-lesson').classList.remove('active');document.getElementById('mainNav').classList.add('hidden');
  const xp=lCorrect*10+(lHearts>0?5:0);const acc=lTotal>0?Math.round(lCorrect/lTotal*100):0;
  state.xp+=xp;state.todayXP=(state.todayXP||0)+xp;state.hearts=Math.max(lHearts,1);
  if(acc>=60&&curUnit&&!state.lessonsCompleted.includes(curUnit.id))state.lessonsCompleted.push(curUnit.id);
  if(curUnit)curUnit.dialogue.forEach(l=>{if(!state.learnedVocab.includes(l.es))state.learnedVocab.push(l.es)});
  updateStreak();saveState();
  if(typeof syncUI!=='undefined'&&syncUI.isConnected())syncUI.save(getAppState());
  document.getElementById('complete-xp').textContent=xp;document.getElementById('complete-acc').textContent=acc+'%';
  const strs=['Keep practicing!','¡Buen trabajo!','¡Muy bien!','¡Perfecto! Flawless!'];
  document.getElementById('complete-subtitle').textContent=acc===100?strs[3]:acc>=80?strs[2]:acc>=60?strs[1]:strs[0];
  document.getElementById('lesson-complete').classList.add('active');if(acc>=60)spawnConfetti();
}
function finishLesson(){document.getElementById('lesson-complete').classList.remove('active');
  document.getElementById('screen-learn').classList.add('active');document.getElementById('mainNav').classList.remove('hidden');
  state.hearts=Math.min(state.hearts+2,5);saveState();renderLearn();refreshUI()}

// VOCAB TAB
let vCat='all';
function renderVocab(){
  const cats=['all',...Object.keys(VOCAB)];
  document.getElementById('vocab-filter').innerHTML=cats.map(c=>
    `<button class="filter-chip ${c===vCat?'active':''}" onclick="vCat='${c.replace(/'/g,"\\'")}';renderVocab()">${c==='all'?'All':c}</button>`).join('');
  let words=[];if(vCat==='all')Object.values(VOCAB).forEach(a=>words.push(...a));else words=VOCAB[vCat]||[];
  document.getElementById('vocab-list').innerHTML=words.map((w,i)=>{
    const learned=state.learnedVocab.includes(w.es);
    return `<div class="vocab-card ${learned?'learned':''}" id="vc-${i}">
      <div class="vocab-top" onclick="document.getElementById('vc-${i}').classList.toggle('expanded')">
        <div><div class="vocab-es">${w.es} <button class="speaker-btn small" style="display:inline-flex;vertical-align:middle;width:28px;height:28px;font-size:13px;border-width:1px;margin-left:4px" onclick="event.stopPropagation();speakBtn(this,'${w.es.replace(/'/g,"\\'")}',0.85)">\ud83d\udd0a</button></div>
        <div class="vocab-en">${w.en}</div></div>
        <button class="vocab-check ${learned?'done':''}" onclick="event.stopPropagation();toggleVocab('${w.es.replace(/'/g,"\\'")}')">${learned?'\u2713':''}</button>
      </div>
      <div class="vocab-detail"><div class="vocab-desc">${w.desc}</div><div class="vocab-ex">${w.ex}</div></div>
    </div>`}).join('');
  refreshUI();
}
function toggleVocab(es){
  const idx=state.learnedVocab.indexOf(es);
  if(idx>=0)state.learnedVocab.splice(idx,1);else state.learnedVocab.push(es);
  saveState();renderVocab();
}

// Vocab Practice Mode
function startVocabPractice(){
  const allW=Object.values(VOCAB).flat();if(allW.length===0)return;
  const shuffled=[...allW].sort(()=>Math.random()-0.5).slice(0,10);
  curUnit={id:'vocab_practice',title:'Vocab Practice',icon:'\ud83c\udfaf',desc:'Practice vocabulary',dialogue:[],
    exercises:shuffled.map(w=>{
      const wrongs=allW.filter(x=>x.en!==w.en).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.en);
      const opts=[...wrongs,w.en].sort(()=>Math.random()-0.5);
      return{type:'listen_mc',audio:w.es,prompt:'What does this mean?',options:opts,correct:opts.indexOf(w.en)};
    })
  };
  lessonEx=[...curUnit.exercises];exIdx=0;lCorrect=0;lTotal=lessonEx.length;lHearts=state.hearts;selAnswer=null;answered=false;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-lesson').classList.add('active');document.getElementById('mainNav').classList.add('hidden');
  document.getElementById('lesson-hearts').textContent=lHearts;renderEx();
}

// GRAMMAR
function renderGrammar(){document.getElementById('grammar-list').innerHTML=GRAMMAR.map(g=>
  `<div class="grammar-card"><div class="grammar-title">${g.title}</div><div class="grammar-rule">${g.rule}</div>
  ${g.ex.map(e=>`<div class="grammar-ex"><div class="es">${e.es}</div><div class="en">${e.en}</div></div>`).join('')}</div>`).join('')}

// PROFILE
function renderProfile(){
  const el=document.getElementById('streak-days');const today=new Date();const dow=today.getDay();
  const dn=['S','M','T','W','T','F','S'];let h='';
  for(let i=0;i<7;i++){const d=new Date(today);d.setDate(d.getDate()-dow+i);const ds=d.toDateString();
    h+=`<div class="streak-day ${state.activeDays.includes(ds)?'active':''} ${ds===today.toDateString()?'today':''}">${dn[i]}</div>`}
  el.innerHTML=h;refreshUI();
}
function resetProgress(){if(confirm('Reset all progress? This cannot be undone.')){localStorage.removeItem(SK);state=defaultState();saveState();renderLearn();renderProfile();refreshUI()}}

// CONFETTI
function spawnConfetti(){const c=document.getElementById('confetti');const cols=['#58cc02','#ffc800','#ff4b4b','#49c0f8','#ce82ff','#ff9600'];
  for(let i=0;i<50;i++){const d=document.createElement('div');d.className='confetti';d.style.left=Math.random()*100+'%';d.style.top='-10px';
    d.style.background=cols[Math.floor(Math.random()*cols.length)];d.style.borderRadius=Math.random()>0.5?'50%':'2px';
    d.style.width=(6+Math.random()*8)+'px';d.style.height=(6+Math.random()*8)+'px';
    d.style.animationDelay=(Math.random()*0.5)+'s';d.style.animationDuration=(1+Math.random())+'s';c.appendChild(d)}
  setTimeout(()=>{c.innerHTML=''},3000)}

// SYNC BRIDGE FUNCTIONS
function getAppState(){return state}
function setAppState(s){state=s;state.learnedVocab=state.learnedVocab||[];state.activeDays=state.activeDays||[];saveState();renderLearn();refreshUI()}

// INIT
renderLearn();refreshUI();
</script>

<script>
const syncUI=(()=>{
  const CFG={
    apiKey:"AIzaSyBYKBKxjiGT5WBULXrGPomS87OqPs41kk4",
    authDomain:"languageapps-da8a8.firebaseapp.com",
    databaseURL:"https://languageapps-da8a8-default-rtdb.firebaseio.com",
    projectId:"languageapps-da8a8",
    storageBucket:"languageapps-da8a8.firebasestorage.app",
    messagingSenderId:"870203725921",
    appId:"1:870203725921:web:04a5ac26b239be5c5e3220"
  };

  let db=null,appId='',pin='',lastSync=null,ready=false;

  function init(id){
    appId=id;
    pin=localStorage.getItem('sync_pin_'+appId)||'';
    lastSync=localStorage.getItem('sync_last_'+appId)||null;
    if(!firebase.apps.length)firebase.initializeApp(CFG);
    db=firebase.database();ready=true;updateFab();
  }

  function updateFab(){
    const f=document.getElementById('sync-fab');
    if(pin){f.classList.add('connected');f.title='Synced: '+pin}
    else{f.classList.remove('connected');f.title='Set up Cloud Sync'}
  }

  function isConnected(){return ready&&pin!==''}

  async function save(obj){
    if(!isConnected())return false;
    try{
      const f=document.getElementById('sync-fab');f.classList.add('syncing');
      await db.ref('users/'+pin+'/'+appId).set({data:obj,updatedAt:new Date().toISOString(),app:appId});
      lastSync=new Date().toISOString();localStorage.setItem('sync_last_'+appId,lastSync);
      f.classList.remove('syncing');return true;
    }catch(e){console.error('Sync save:',e);document.getElementById('sync-fab').classList.remove('syncing');return false}
  }

  async function load(){
    if(!isConnected())return null;
    try{
      const f=document.getElementById('sync-fab');f.classList.add('syncing');
      const snap=await db.ref('users/'+pin+'/'+appId).once('value');
      const val=snap.val();f.classList.remove('syncing');
      if(val&&val.data){lastSync=val.updatedAt||null;localStorage.setItem('sync_last_'+appId,lastSync||'');return val.data}
      return null;
    }catch(e){console.error('Sync load:',e);document.getElementById('sync-fab').classList.remove('syncing');return null}
  }

  function openModal(){document.getElementById('sync-overlay').classList.add('open');renderModal()}
  function closeModal(){document.getElementById('sync-overlay').classList.remove('open')}

  function renderModal(){
    const el=document.getElementById('sync-modal-content');
    if(pin){
      const ls=lastSync?new Date(lastSync).toLocaleString():'Never';
      el.innerHTML=`<h3>☁ Cloud Sync</h3>
        <div class="sync-sub">Connected as:</div>
        <div class="sync-pin-display">${pin}</div>
        <div class="sync-last-sync">Last sync: ${ls}</div>
        <div style="height:16px"></div>
        <div class="sync-btn-row"><button class="sync-btn secondary" onclick="syncUI.closeModal()">Close</button><button class="sync-btn primary" onclick="syncUI.doSync()">↻ Sync Now</button></div>
        <div class="sync-btn-row"><button class="sync-btn primary" style="background:var(--blue)" onclick="syncUI.doPull()">↓ Pull from Cloud</button><button class="sync-btn primary" onclick="syncUI.doPush()">↑ Push to Cloud</button></div>
        <div class="sync-status" id="sync-status"></div>
        <button class="sync-btn danger" onclick="syncUI.disconnect()">Disconnect</button>`;
    } else {
      el.innerHTML=`<h3>☁ Cloud Sync</h3>
        <div class="sync-sub">Sync progress across devices. Pick a PIN you'll remember — use the same PIN on other devices to connect.</div>
        <input type="text" id="sync-pin-input" placeholder="e.g. maria-spanish" autocomplete="off" autocapitalize="off" spellcheck="false">
        <div class="sync-hint">💡 Use something like your-name (e.g. "maria", "tad"). Same PIN on another device = synced progress.</div>
        <div class="sync-btn-row"><button class="sync-btn secondary" onclick="syncUI.closeModal()">Cancel</button><button class="sync-btn primary" onclick="syncUI.connect()">Connect</button></div>
        <div class="sync-status" id="sync-status"></div>`;
      setTimeout(()=>document.getElementById('sync-pin-input')?.focus(),100);
    }
  }

  async function connect(){
    const inp=document.getElementById('sync-pin-input');
    const p=(inp?.value||'').trim().toLowerCase().replace(/[^a-z0-9\-_]/g,'');
    if(p.length<3){showSt('PIN must be at least 3 characters',false);return}
    pin=p;localStorage.setItem('sync_pin_'+appId,pin);updateFab();
    showSt('Connecting...',true);
    const cloud=await load();
    if(cloud){showSt('Found cloud data! Use Pull to load it.',true)}
    else if(typeof getAppState==='function'){await save(getAppState());showSt('Connected & backed up!',true)}
    else showSt('Connected!',true);
    setTimeout(()=>renderModal(),1200);
  }

  function disconnect(){
    if(!confirm('Disconnect sync? Local progress stays.'))return;
    pin='';localStorage.removeItem('sync_pin_'+appId);localStorage.removeItem('sync_last_'+appId);
    updateFab();renderModal();
  }

  async function doPush(){
    if(typeof getAppState!=='function'){showSt('Not configured',false);return}
    showSt('Pushing...',true);const ok=await save(getAppState());showSt(ok?'Pushed ✓':'Failed ✗',ok);
  }

  async function doPull(){
    showSt('Pulling...',true);const d=await load();
    if(d&&typeof setAppState==='function'){setAppState(d);showSt('Pulled ✓',true)}
    else showSt(d?'Not configured':'No cloud data',false);
  }

  async function doSync(){
    showSt('Syncing...',true);const cloud=await load();
    const local=typeof getAppState==='function'?getAppState():null;
    if(!local){showSt('Not configured',false);return}
    if(cloud&&(cloud.xp||0)>(local.xp||0)){
      if(typeof setAppState==='function')setAppState(cloud);showSt('Pulled newer cloud data ✓',true);
    }else{await save(local);showSt('Pushed local progress ✓',true)}
  }

  function showSt(m,ok){const e=document.getElementById('sync-status');if(e){e.textContent=m;e.className='sync-status '+(ok?'ok':'err')}}

  return{init,save,load,isConnected,openModal,closeModal,connect,disconnect,doPush,doPull,doSync};
})();

// Initialize sync
syncUI.init('habla-spanish');
</script>
