<title>¡Habla! — Conversational Spanish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --green:#58cc02;--green-dark:#46a302;--green-deeper:#2d7a00;--green-glow:rgba(88,204,2,0.15);
  --bg:#131f24;--bg-card:#1b2b33;--bg-card-hover:#223640;--bg-surface:#17252d;
  --gold:#ffc800;--red:#ff4b4b;--red-soft:#ff6b6b;--blue:#49c0f8;--purple:#ce82ff;--orange:#ff9600;
  --text:#f0f4f5;--text-sec:#a0b8c4;--text-mut:#607880;--border:rgba(255,255,255,0.08);
  --rad:16px;--rad-sm:12px;--rad-xs:8px;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(88,204,2,0.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 100%,rgba(73,192,248,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.screen{display:none;min-height:100dvh;position:relative;z-index:1;flex-direction:column}.screen.active{display:flex}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg-surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:6px 0 calc(6px + var(--safe-bottom));backdrop-filter:blur(20px)}
.nav-btn{background:none;border:none;color:var(--text-mut);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:700;font-family:inherit;padding:6px 12px;border-radius:12px;cursor:pointer;transition:all 0.2s}
.nav-btn.active{color:var(--green)}.nav-btn svg{width:24px;height:24px}.nav-btn.active svg{filter:drop-shadow(0 0 6px rgba(88,204,2,0.4))}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:calc(12px + var(--safe-top)) 20px 12px;background:var(--bg-surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.top-bar-stats{display:flex;gap:14px;align-items:center}
.stat-item{display:flex;align-items:center;gap:4px;font-weight:800;font-size:14px}.stat-item .icon{font-size:16px}
.stat-streak{color:var(--orange)}.stat-xp{color:var(--gold)}.stat-hearts{color:var(--red)}
.top-bar-title{font-weight:900;font-size:18px;color:var(--green);letter-spacing:-0.5px}
.scroll-area{flex:1;overflow-y:auto;padding:16px 16px 100px;-webkit-overflow-scrolling:touch}
.section-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-mut);margin:20px 0 10px}.section-label:first-child{margin-top:0}
/* Streak Banner */
.streak-banner{background:linear-gradient(135deg,#ff9600 0%,#ff6b00 100%);border-radius:var(--rad);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.streak-fire{font-size:40px;animation:fireAnim 1s ease-in-out infinite alternate}
@keyframes fireAnim{0%{transform:scale(1) rotate(-3deg)}100%{transform:scale(1.1) rotate(3deg)}}
.streak-info{flex:1}.streak-count{font-size:24px;font-weight:900;color:#fff}.streak-msg{font-size:13px;color:rgba(255,255,255,0.85);font-weight:600}
.streak-banner.none{background:linear-gradient(135deg,#3a4a52 0%,#2a3a42 100%)}
/* Unit cards */
.unit-card{background:var(--bg-card);border-radius:var(--rad);padding:18px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.unit-card:active{transform:scale(0.98)}.unit-card.completed{border-color:var(--green-dark)}

.speaker-btn{background:var(--bg-card);border:2px solid var(--green);border-radius:50%;width:68px;height:68px;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;margin:0 auto 16px;transition:all 0.2s;color:var(--green)}

.mc-option:active{transform:scale(0.98)}
.mc-option .opt-num{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--text-mut);flex-shrink:0}
.mc-option.selected{border-color:var(--blue);background:rgba(73,192,248,0.08)}.mc-option.selected .opt-num{border-color:var(--blue);color:var(--blue);background:rgba(73,192,248,0.15)}
.mc-option.correct{border-color:var(--green);background:rgba(88,204,2,0.1)}.mc-option.correct .opt-num{border-color:var(--green);color:var(--green);background:rgba(88,204,2,0.2)}
.mc-option.wrong{border-color:var(--red);background:rgba(255,75,75,0.08)}.mc-option.wrong .opt-num{border-color:var(--red);color:var(--red);background:rgba(255,75,75,0.15)}
.mc-option.disabled{pointer-events:none;opacity:0.6}.mc-option.correct.disabled{opacity:1}
.text-input-area{width:100%;max-width:500px}
.text-input{width:100%;background:var(--bg-card);border:2px solid var(--border);border-radius:var(--rad-sm);padding:14px 18px;font-size:17px;font-weight:600;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.2s}
.text-input:focus{border-color:var(--green)}.text-input.correct{border-color:var(--green);background:rgba(88,204,2,0.05)}.text-input.wrong{border-color:var(--red);background:rgba(255,75,75,0.05)}
.word-bank-target{min-height:52px;background:var(--bg-card);border:2px dashed var(--border);border-radius:var(--rad-sm);padding:10px 14px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:14px;width:100%;max-width:500px}
.word-bank-pool{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;width:100%;max-width:500px}
.word-chip{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--rad-xs);padding:9px 14px;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;font-family:inherit;user-select:none}
.word-chip:active{transform:scale(0.95)}.word-chip.used{opacity:0.25;pointer-events:none}.word-chip.in-target{background:var(--bg-card-hover);border-color:var(--blue)}
.dialogue-container{width:100%;max-width:500px;margin-bottom:16px}
.dialogue-line{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}.dialogue-line.right{flex-direction:row-reverse}
.dialogue-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.dialogue-avatar.a{background:#2d5a8a}.dialogue-avatar.b{background:#8a2d5a}
.dialogue-bubble{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:10px 14px;max-width:80%;position:relative}
.dialogue-line.right .dialogue-bubble{background:var(--green-deeper);border-color:var(--green-dark)}
.dialogue-es{font-size:14px;font-weight:700;margin-bottom:2px}.dialogue-en{font-size:11px;color:var(--text-mut)}
.scene-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:14px 18px;margin-bottom:14px;width:100%;max-width:500px;text-align:center}
.scene-emoji{font-size:36px;margin-bottom:6px}.scene-title{font-size:14px;font-weight:800;color:var(--green)}.scene-desc{font-size:12px;color:var(--text-sec);margin-top:3px}
.lesson-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:10px 20px calc(10px + var(--safe-bottom));background:var(--bg-surface);border-top:1px solid var(--border)}
.check-btn{width:100%;padding:15px;border:none;border-radius:var(--rad-sm);font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px}
.check-btn.ready{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-dark)}.check-btn.ready:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-dark)}
.check-btn.disabled{background:rgba(255,255,255,0.08);color:var(--text-mut);pointer-events:none}
.check-btn.continue{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-dark)}.check-btn.wrong-continue{background:var(--red);color:#fff;box-shadow:0 4px 0 #cc3333}
.feedback-bar{display:none;padding:6px 0 2px;text-align:center}.feedback-bar.show{display:block}.feedback-bar.correct{color:var(--green)}.feedback-bar.wrong{color:var(--red)}
.feedback-text{font-size:14px;font-weight:800}.feedback-detail{font-size:12px;font-weight:600;margin-top:2px;opacity:0.8}
.lesson-complete{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 24px;text-align:center;position:relative;z-index:1}
.lesson-complete.active{display:flex}
.complete-icon{font-size:64px;margin-bottom:14px;animation:bounceIn 0.5s ease}
.complete-title{font-size:26px;font-weight:900;color:var(--green);margin-bottom:6px}
.complete-subtitle{font-size:15px;color:var(--text-sec);margin-bottom:28px}
.complete-stats{display:flex;gap:24px;margin-bottom:36px}
.complete-stat{text-align:center}.complete-stat-val{font-size:26px;font-weight:900}.complete-stat-label{font-size:11px;color:var(--text-mut);font-weight:700;text-transform:uppercase}
.complete-stat.xp .complete-stat-val{color:var(--gold)}.complete-stat.acc .complete-stat-val{color:var(--green)}
.complete-btn{background:var(--green);color:#fff;border:none;border-radius:var(--rad-sm);padding:15px 44px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 4px 0 var(--green-dark);text-transform:uppercase}
.complete-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-dark)}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
/* Vocab tab */
.vocab-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:14px 18px;margin-bottom:8px;transition:all 0.2s}
.vocab-card.learned{border-left:3px solid var(--green)}
.vocab-top{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.vocab-es{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
.vocab-en{font-size:13px;color:var(--text-sec);font-weight:600}
.vocab-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all 0.2s;flex-shrink:0;background:none;color:var(--text-mut);font-family:inherit}
.vocab-check.done{background:var(--green);border-color:var(--green);color:#fff}
.vocab-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.vocab-card.expanded .vocab-detail{display:block}
.vocab-desc{font-size:13px;color:var(--text-sec);line-height:1.5;margin-bottom:6px}
.vocab-ex{font-size:13px;color:var(--text-mut);font-style:italic}
.vocab-practice-btn{background:var(--green);color:#fff;border:none;border-radius:var(--rad-sm);padding:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;width:100%;margin-bottom:16px;box-shadow:0 3px 0 var(--green-dark);text-transform:uppercase}
.vocab-practice-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-dark)}
.vocab-progress{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:13px;font-weight:700;color:var(--text-sec)}
.vocab-progress-bar{flex:1;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.vocab-progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width 0.3s}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:12px}
.filter-chip{background:var(--bg-card);border:1.5px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--text-sec);cursor:pointer;font-family:inherit;transition:all 0.15s}
.filter-chip.active{background:var(--green);border-color:var(--green);color:#fff}
/* Grammar */
.grammar-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:18px;margin-bottom:10px}
.grammar-title{font-size:16px;font-weight:800;color:var(--green);margin-bottom:5px}
.grammar-rule{font-size:13px;color:var(--text-sec);line-height:1.6;margin-bottom:8px}
.grammar-ex{background:var(--bg-surface);border-radius:var(--rad-xs);padding:10px 14px;font-size:13px;line-height:1.5;margin-top:5px}
.grammar-ex .es{font-weight:700;color:var(--text)}.grammar-ex .en{color:var(--text-mut);font-style:italic}
/* Profile */
.profile-header{text-align:center;padding:16px 0 20px}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin:0 auto 10px;box-shadow:0 0 0 3px var(--bg),0 0 0 5px var(--green-dark);font-family:'Nunito',sans-serif}
.profile-name{font-size:20px;font-weight:900}.profile-sub{font-size:12px;color:var(--text-mut);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:14px;text-align:center}
.stat-card-val{font-size:22px;font-weight:900}.stat-card-label{font-size:10px;color:var(--text-mut);font-weight:700;text-transform:uppercase;margin-top:2px}
.stat-card.streak .stat-card-val{color:var(--orange)}.stat-card.xp .stat-card-val{color:var(--gold)}.stat-card.lessons .stat-card-val{color:var(--green)}.stat-card.words .stat-card-val{color:var(--blue)}
.streak-cal-title{font-size:13px;font-weight:800;margin-bottom:10px}
.streak-days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:20px}
.streak-day{aspect-ratio:1;border-radius:8px;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-mut)}
.streak-day.active{background:var(--green);color:#fff}.streak-day.today{box-shadow:inset 0 0 0 2px var(--green)}
.reset-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:12px;font-size:13px;font-weight:700;color:var(--red-soft);width:100%;cursor:pointer;font-family:inherit;text-align:center}
.confetti-box{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;animation:confFall 1.5s ease-out forwards}
@keyframes confFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.hidden{display:none!important}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* ===== GAMES TAB ===== */
.game-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad);padding:20px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:16px}
.game-card:active{transform:scale(0.98)}

.game-icon.speed{background:rgba(255,75,75,0.15)}.game-icon.match{background:rgba(73,192,248,0.15)}

.timer-bar{width:100%;max-width:500px;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin-bottom:16px}

.game-score{font-size:14px;font-weight:800;color:var(--gold);text-align:center;margin-bottom:16px}

.match-grid{display:grid;gap:8px;width:100%;max-width:500px;margin:0 auto}
.match-grid.g4x3{grid-template-columns:repeat(4,1fr)}
.match-grid.g4x4{grid-template-columns:repeat(4,1fr)}
.match-card{aspect-ratio:1;border-radius:var(--rad-sm);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;text-align:center;padding:6px;cursor:pointer;transition:all 0.3s;border:2px solid var(--border);perspective:600px;user-select:none;line-height:1.2}
.match-card.face-down{background:var(--green-deeper);color:transparent}.match-card.face-down::after{content:'¿?';color:rgba(255,255,255,0.4);font-size:20px;font-weight:900}

.match-card.matched{background:rgba(88,204,2,0.15);border-color:var(--green);color:var(--green);opacity:0.7;pointer-events:none}
.match-card.wrong{animation:matchShake 0.4s ease;border-color:var(--red)}
@keyframes matchShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.match-moves{font-size:13px;color:var(--text-sec);text-align:center;margin-top:12px;font-weight:700}

/* Conjugation Drill */
.conj-prompt{text-align:center;margin-bottom:20px}
.conj-verb{font-size:28px;font-weight:900;color:var(--purple)}
.conj-pronoun{font-size:20px;font-weight:700;color:var(--text-sec);margin-top:4px}
.conj-tense{font-size:12px;color:var(--text-mut);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.conj-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:500px}
.conj-opt{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--rad-sm);padding:14px;text-align:center;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:inherit;color:var(--text)}
.conj-opt:active{transform:scale(0.96)}
.conj-opt.correct{border-color:var(--green);background:rgba(88,204,2,0.1);color:var(--green)}
.conj-opt.wrong{border-color:var(--red);background:rgba(255,75,75,0.08);color:var(--red)}

/* Daily Goal Ring */
.goal-ring-container{text-align:center;margin-bottom:20px}
.goal-ring-svg{width:120px;height:120px}
.goal-ring-text{font-size:11px;color:var(--text-mut);margin-top:6px;font-weight:700}
.goal-inner{font-size:22px;font-weight:900}
.goal-label{font-size:10px;fill:var(--text-mut)}

/* Achievements */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.badge{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:14px 8px;text-align:center;transition:all 0.2s}
.badge.unlocked{border-color:var(--gold);background:rgba(255,200,0,0.05)}
.badge.locked{opacity:0.35}
.badge-icon{font-size:28px;margin-bottom:4px}
.badge-name{font-size:10px;font-weight:800;color:var(--text-sec);line-height:1.2}
.badge.unlocked .badge-name{color:var(--gold)}

/* Mistake Bank */
.mistake-card{background:var(--bg-card);border-left:3px solid var(--red);border-radius:0 var(--rad-sm) var(--rad-sm) 0;padding:12px 16px;margin-bottom:8px}
.mistake-q{font-size:14px;font-weight:700;margin-bottom:4px}
.mistake-wrong{font-size:13px;color:var(--red);text-decoration:line-through}
.mistake-right{font-size:13px;color:var(--green);font-weight:700}
.mistake-count{font-size:11px;color:var(--text-mut);margin-top:2px}

/* Game results overlay */
.game-results{text-align:center;padding:20px}
.game-results-icon{font-size:56px;margin-bottom:12px}
.game-results-title{font-size:24px;font-weight:900;color:var(--green);margin-bottom:4px}
.game-results-sub{font-size:14px;color:var(--text-sec);margin-bottom:20px}
.game-results-stats{display:flex;justify-content:center;gap:24px;margin-bottom:24px}
.game-results-stat{text-align:center}
.game-results-stat-val{font-size:24px;font-weight:900}
.game-results-stat-label{font-size:11px;color:var(--text-mut);text-transform:uppercase;font-weight:700}

</style>

 día", "prompt": "What is being suggested?", "options": ["We should get them together sometime", "We should pick them up someday", "We should go somewhere", "We should talk more"], "correct": 0}]}, {"id": "airport", "title": "At the Airport", "icon": "✈️", "desc": "Check in, navigate security, handle flight issues", "dialogue": [{"who": "A", "name": "Agente", "es": "Buenos días. ¿Me permite su pasaporte y su tarjeta de embarque?", "en": "Good morning. May I see your passport and boarding pass?"}, {"who": "B", "name": "You", "es": "Aquí tiene. Quisiera un asiento de ventanilla, si es posible.", "en": "Here you go. I'd like a window seat, if possible."}, {"who": "A", "name": "Agente", "es": "Déjeme ver... Sí, tengo uno disponible. ¿Va a facturar equipaje?", "en": "Let me check... Yes, I have one available. Are you going to check luggage?"}, {"who": "B", "name": "You", "es": "Sí, una maleta. Y llevo equipaje de mano también.", "en": "Yes, one suitcase. And I have carry-on luggage too."}, {"who": "A", "name": "Agente", "es": "Perfecto. Su puerta de embarque es la B12. El abordaje empieza a las dos.", "en": "Perfect. Your boarding gate is B12. Boarding starts at two."}, {"who": "B", "name": "You", "es": "Gracias. ¿El vuelo sale a tiempo?", "en": "Thanks. Is the flight on time?"}], "exercises": [{"type": "listen_mc", "audio": "¿Me permite su pasaporte y su tarjeta de embarque?", "prompt": "What documents are being requested?", "options": ["Passport and boarding pass", "ID and ticket", "Passport and visa", "License and itinerary"], "correct": 0}, {"type": "respond", "situation": "Ask for a window seat.", "answer": "Quisiera un asiento de ventanilla", "alts": ["¿Puedo tener un asiento de ventanilla?", "Un asiento de ventanilla, por favor", "Me gustaría un asiento de ventanilla"]}, {"type": "build", "prompt": "Build: \"Is the flight on time?\"", "words": ["¿El", "vuelo", "sale", "a", "tiempo?", "llega", "es", "en"], "answer": "¿El vuelo sale a tiempo?"}, {"type": "fill", "pr at did the person say to you?"}], "exercises": [{"type": "listen_mc", "audio": "¡No vas a creer lo que me pasó ayer!", "prompt": "The speaker is about to:", "options": ["Tell a surprising story", "Give bad news", "Ask for advice", "Complain about work"], "correct": 0}, {"type": "respond", "situation": "React to a surprising story. Say 'No way! Tell me more!'", "answer": "¡No me digas! ¡Cuéntame más!", "alts": ["¡En serio! ¡Cuéntame!", "¡No puede ser! ¿Qué pasó?", "¡No manches! ¡Cuéntame!"]}, {"type": "build", "prompt": "Build: \"I was at the supermarket and suddenly...\"", "words": ["Estaba", "en", "el", "supermercado", "y", "de", "repente", "fui", "al"], "answer": "Estaba en el supermercado y de repente"}, {"type": "fill", "prompt": "Resulta que no ___ él. (it was)", "answer": "era"}, {"type": "listen_type", "audio": "Me acerqué a saludarlo", "prompt": "Type what you hear:", "answer": "Me acerqué a saludarlo"}, {"type": "mc", "prompt": "'¡Qué vergüenza!' means:", "options": ["How embarrassing!", "How scary!", "How amazing!", "How funny!"], "correct": 0}, {"type": "respond", "situation": "Start a story: 'You won't believe what happened to me!'", "answer": "¡No vas a creer lo que me pasó!", "alts": ["¡No te vas a creer lo que pasó!", "¡No me vas a creer!"]}, {"type": "mc", "prompt": "'Resulta que' is used to:", "options": ["Reveal a plot twist or surprise", "End a story", "Start a story", "Ask a question"], "correct": 0}, {"type": "fill", "prompt": "¿Y qué ___? (did you do)", "answer": "hiciste"}, {"type": "build", "prompt": "Build: \"It turns out it wasn't him\"", "words": ["Resulta", "que", "no", "era", "él", "fue", "es", "ella"], "answer": "Resulta que no era él"}]}, {"id": "party", "title": "At a Social Event", "icon": "🎉", "desc": "Mingle, introduce people, join conversations", "dialogue": [{"who": "A", "name": "Host", "es": "¡Bienvenidos! Pasen, están en su casa. ¿Qué quieren tomar?", "en": "Welcome! Come in, make yourselves at home. What would you like to drink?"}, {"who": "B", "name": "You", "es": "Gracias por invitarnos. Yo quiero una cerveza, por favor.", "en": "Thanks for inviting us. I'll have a beer, please."}, {"who": "A", "name": "Host", "es": "Mira, te presento a mi amiga Laura. Ella también es de Estados Unidos.", "en": "Look, let me introduce you to my friend Laura. She's also from the US."}, {"who": "B", "name": "You", "es": "¡Mucho gusto, Laura! ¿De qué parte de Estados Unidos eres?", "en": "Nice to meet you, Laura! What part of the US are you from?"}, {"who": "A", "name": "Laura", "es": "Soy de Chicago, pero llevo cinco años viviendo aquí. ¿Y tú?", "en": "I'm from Chicago, but I've been living here for five years. And you?"}, {"who": "B", "name": "You", "es": "Nosotros llegamos hace poco. Todavía estamos conociendo la ciudad.", "en": "We arrived recently. We're still getting to know the city."}], "exercises": [{"type": "listen_mc", "audio": "Pasen, están en su casa", "prompt": "The host is saying:", "options": ["Come in, make yourselves at home", "Please leave your shoes", "Come to the kitchen", "Sit at the table"], "correct": 0}, {"type": "respond", "situation": "Thank the host for the invitation.", "answer": "Gracias por invitarnos", "alts": ["Gracias por la invitación", "Muchas gracias por invitarnos"]}, {"type": "build", "prompt": "Build: \"Nice to meet you!\"", "words": ["¡Mucho", "gusto!", "me", "bien", "hola", "gracias"], "answer": "¡Mucho gusto!"}, {"type": "fill", "prompt": "Llevo cinco años ___ aquí. (living)", "answer": "viviendo"}, {"type": "listen_type", "audio": "Todavía estamos conociendo la ciudad", "prompt": "Type what you hear:", "answer": "Todavía estamos conociendo la ciudad"}, {"type": "mc", "prompt": "'Están en su casa' is a common way to say:", "options": ["Make yourself at home", "You're at our house", "This is your house", "Welcome home"], "correct": 0}, {"type": "respond", "situation": "Tell someone you arrived recently and are still exploring.", "answer": "Llegamos hace poco. Todavía estamos conociendo la ciudad.", "alts": ["Somos nuevos aquí", "Acabamos de llegar", "Llegamos hace poco"]}, {"type": "mc", "prompt": "'Te presento a' means:", "options": ["Let me introduce you to", "I'll present to", "I'm showing you", "You present to"], "correct": 0}, {"type": "fill", "prompt": "¿De qué ___ eres? (part/area)", "answer": "parte"}, {"type": "build", "prompt": "Build: \"We arrived recently\"", "words": ["Nosotros", "llegamos", "hace", "poco", "mucho", "ya", "ellos"], "answer": "Nosotros llegamos hace poco"}]}, {"id": "feelings", "title": "Expressing Feelings", "icon": "❤️", "desc": "Talk about emotions, comfort others, share personal stuff", "dialogue": [{"who": "A", "name": "Amiga", "es": "Te noto un poco triste hoy. ¿Estás bien?", "en": "You look a bit sad today. Are you okay?"}, {"who": "B", "name": "You", "es": "La verdad es que estoy un poco estresada con el trabajo.", "en": "The truth is I'm a bit stressed with work."}, {"who": "A", "name": "Amiga", "es": "Lo siento mucho. ¿Quieres hablar de eso?", "en": "I'm really sorry. Do you want to talk about it?"}, {"who": "B", "name": "You", "es": "Es que mi jefe me pide demasiado y no tengo tiempo para nada.", "en": "It's that my boss asks too much of me and I don't have time for anything."}, {"who": "A", "name": "Amiga", "es": "Te entiendo perfectamente. A veces hay que poner límites.", "en": "I understand you perfectly. Sometimes you have to set boundaries."}, {"who": "B", "name": "You", "es": "Tienes razón. Me hace bien hablar contigo. Gracias por escucharme.", "en": "You're right. It feels good talking to you. Thanks for listening."}], "exercises": [{"type": "listen_mc", "audio": "Te noto un poco triste hoy", "prompt": "The friend noticed that you:", "options": ["Look a bit sad today", "Look very happy", "Are tired", "Are angry"], "correct": 0}, {"type": "respond", "situation": "Say you're stressed about work.", "answer": "Estoy un poco estresada con el trabajo", "alts": ["Estoy estresada por el trabajo", "El trabajo me tiene estresada", "Estoy muy estresado con el trabajo"]}, {"type": "build", "prompt": "Build: \"Thanks for listening to me\"", "words": ["Gracias", "por", "escucharme", "hablarme", "a", "mí", "ti"], "answer": "Gracias por escucharme"}, {"type": "fill", "prompt": "A veces hay que poner ___. (boundaries)", "answer": "límites"}, {"type": "listen_type", "audio": "¿Quieres hablar de eso?", "prompt": "Type what you hear:", "answer": "¿Quieres hablar de eso?"}, {"type": "mc", "prompt": "'Me hace bien' means:", "options": ["It does me good", "It makes me well", "It sounds good", "It looks good"], "correct": 0}, {"type": "respond", "situation": "Comfort a friend. Say 'I understand you perfectly.'", "answer": "Te entiendo perfectamente", "alts": ["Te entiendo", "Lo entiendo perfectamente", "Entiendo cómo te sientes"]}, {"type": "mc", "prompt": "'Es que...' is used to:", "options": ["Introduce an explanation", "End a conversation", "Change the topic", "Ask a question"], "correct": 0}, {"type": "fill", "prompt": "La ___ es que estoy estresada. (truth)", "answer": "verdad"}, {"type": "build", "prompt": "Build: \"Do you want to talk about it?\"", "words": ["¿Quieres", "hablar", "de", "eso?", "ir", "con", "ello"], "answer": "¿Quieres hablar de eso?"}]}, {"id": "cooking", "title": "Food & Cooking", "icon": "🧑‍🍳", "desc": "Discuss recipes, food preferences, cooking together", "dialogue": [{"who": "B", "name": "You", "es": "¿Qué vamos a cocinar esta noche?", "en": "What are we going to cook tonight?"}, {"who": "A", "name": "Partner", "es": "No sé, ¿qué se te antoja? Podemos hacer tacos o pasta.", "en": "I don't know, what do you feel like? We can make tacos or pasta."}, {"who": "B", "name": "You", "es": "Me encantan los tacos. ¿Tenemos todos los ingredientes?", "en": "I love tacos. Do we have all the ingredients?"}, {"who": "A", "name": "Partner", "es": "Nos falta cilantro y limones. Hay que ir al super.", "en": "We're missing cilantro and limes. We need to go to the store."}, {"who": "B", "name": "You", "es": "Yo voy. ¿Necesitas algo más?", "en": "I'll go. Do you need anything else?"}, {"who": "A", "name": "Partner", "es": "Trae también aguacates para hacer guacamole. ¡Y tortillas!", "en": "Also bring avocados for guacamole. And tortillas!"}], "exercises": [{"type": "listen_mc", "audio": "¿Qué se te antoja?", "prompt": "They're asking:", "options": ["What do you feel like eating?", "What are you buying?", "What did you cook?", "What's in the fridge?"], "correct": 0}, {"type": "respond", "situation": "Say you love tacos and ask if you have the ingredients.", "answer": "Me encantan los tacos. ¿Tenemos los ingredientes?", "alts": ["Los tacos me encantan. ¿Hay ingredientes?", "Tacos me encantan. ¿Tenemos todo?"]}, {"type": "build", "prompt": "Build: \"We're missing cilantro and limes\"", "words": ["Nos", "falta", "cilantro", "y", "limones", "hay", "tiene", "los"], "answer": "Nos falta cilantro y limones"}, {"type": "fill", "prompt": "Trae también ___ para hacer guacamole. (avocados)", "answer": "aguacates"}, {"type": "listen_type", "audio": "¿Necesitas algo más?", "prompt": "Type what you hear:", "answer": "¿Necesitas algo más?"}, {"type": "mc", "prompt": "'Nos falta' means:", "options": ["We're missing / We need", "We have too much", "We found", "We bought"], "correct": 0}, {"type": "respond", "situation": "Offer to go to the store.", "answer": "Yo voy al super", "alts": ["Yo voy", "Yo voy a la tienda", "Voy yo"]}, {"type": "mc", "prompt": "'Hay que ir al super' means:", "options": ["We need to go to the store", "There's a supermarket", "Let's go shopping", "The store is closed"], "correct": 0}, {"type": "fill", "prompt": "¿Qué vamos a ___ esta noche? (cook)", "answer": "cocinar"}, {"type": "build", "prompt": "Build: \"Do you need anything else?\"", "words": ["¿Necesitas", "algo", "más?", "quieres", "todo", "bien", "ir"], "answer": "¿Necesitas algo más?"}]}, {"id": "advice", "title": "Giving & Getting Advice", "icon": "🤔", "desc": "Ask for recommendations, give suggestions, weigh options", "dialogue": [{"who": "A", "name": "Pedro", "es": "Estoy pensando en cambiar de trabajo. ¿Tú qué harías?", "en": "I'm thinking about changing jobs. What would you do?"}, {"who": "B", "name": "You", "es": "Depende. ¿No estás contento con tu trabajo actual?", "en": "It depends. Aren't you happy with your current job?"}, {"who": "A", "name": "Pedro", "es": "El salario está bien, pero no me siento motivado.", "en": "The salary is fine, but I don't feel motivated."}, {"who": "B", "name": "You", "es": "Yo en tu lugar buscaría algo que te apasione más.", "en": "If I were you, I'd look for something you're more passionate about."}, {"who": "A", "name": "Pedro", "es": "¿Tú crees? Es que me da miedo dejar algo seguro.", "en": "You think so? It's just that I'm afraid of leaving something secure."}, {"who": "B", "name": "You", "es": "Es normal tener miedo. Pero a la larga, la felicidad vale más que la seguridad.", "en": "It's normal to be afraid. But in the long run, happiness is worth more than security."}], "exercises": [{"type": "listen_mc", "audio": "¿Tú qué harías?", "prompt": "Pedro is asking:", "options": ["What would you do?", "What did you do?", "What are you doing?", "What will you do?"], "correct": 0}, {"type": "respond", "situation": "Give advice: 'If I were you, I'd look for something new.'", "answer": "Yo en tu lugar buscaría algo nuevo", "alts": ["Si yo fuera tú, buscaría algo nuevo", "Yo que tú buscaría algo nuevo", "En tu lugar yo buscaría algo diferente"]}, {"type": "build", "prompt": "Build: \"It's normal to be afraid\"", "words": ["Es", "normal", "tener", "miedo", "bueno", "mucho", "malo", "ser"], "answer": "Es normal tener miedo"}, {"type": "fill", "prompt": "Me da ___ dejar algo seguro. (fear/it scares me)", "answer": "miedo"}, {"type": "listen_type", "audio": "No me siento motivado", "prompt": "Type what you hear:", "answer": "No me siento motivado"}, {"type": "mc", "prompt": "'A la larga' means:", "options": ["In the long run", "In a while", "Right away", "A long time ago"], "correct": 0}, {"type": "respond", "situation": "Say 'it depends' and ask a clarifying question.", "answer": "Depende. ¿Qué es lo que no te gusta?", "alts": ["Depende", "Depende de muchas cosas", "Depende. ¿Por qué quieres cambiar?"]}, {"type": "mc", "prompt": "'Yo en tu lugar' means:", "options": ["If I were in your place", "I'm in your place", "I went to your place", "I know your place"], "correct": 0}, {"type": "fill", "prompt": "La felicidad ___ más que la seguridad. (is worth)", "answer": "vale"}, {"type": "build", "prompt": "Build: \"I don't feel motivated\"", "words": ["No", "me", "siento", "motivado", "estoy", "bien", "tengo", "muy"], "answer": "No me siento motivado"}]}];
const VOCAB = {"Everyday Verbs": [{"es": "quedar", "en": "to meet up / to remain / to fit", "desc": "One of the most versatile verbs. Use it for making plans, talking about how clothes fit, or what's left over.", "ex": "¿Quedamos a las ocho? — Shall we meet at eight?"}, {"es": "pasar", "en": "to happen / to pass / to spend time", "desc": "Context determines meaning: ¿Qué pasó? (What happened?), pasar el rato (hang out), ¡Pasa! (Come in!)", "ex": "¿Qué te pasó ayer? — What happened to you yesterday?"}, {"es": "quedar(se)", "en": "to stay / to remain", "desc": "Reflexive form means to stay put. 'Me quedé en casa' = I stayed home. Different from non-reflexive quedar.", "ex": "Nos quedamos en casa viendo películas. — We stayed home watching movies."}, {"es": "dejar", "en": "to leave / to let / to stop", "desc": "Dejar de + infinitive = to stop doing something. Dejar = to leave something behind or to allow.", "ex": "Dejé las llaves en la mesa. — I left the keys on the table."}, {"es": "fijar(se)", "en": "to notice / to pay attention", "desc": "'Fíjate que...' is a common conversation starter meaning 'Guess what...' or 'So listen...'", "ex": "Fíjate que me encontré a Juan ayer. — So guess what, I ran into Juan yesterday."}, {"es": "dar(se) cuenta", "en": "to realize", "desc": "Always used as 'darse cuenta de' — to realize something. Very common in conversation.", "ex": "Me di cuenta de que era tarde. — I realized it was late."}, {"es": "echar", "en": "to throw / to pour / to miss", "desc": "'Echar de menos' = to miss someone. 'Echar un vistazo' = take a look. Very versatile.", "ex": "Te echo de menos. — I miss you."}, {"es": "aprovechar", "en": "to take advantage of / to make the most of", "desc": "Positive connotation in Spanish — seize the opportunity, make the most of it.", "ex": "¡Aprovecha el buen tiempo! — Make the most of the nice weather!"}, {"es": "resultar", "en": "to turn out", "desc": "'Resulta que...' is essential for storytelling — introduces a twist or revelation.", "ex": "Resulta que el vuelo se canceló. — It turns out the flight was cancelled."}, {"es": "pillar / agarrar", "en": "to catch / to grab", "desc": "Pillar is more Spain, agarrar more Latin America. Both mean to catch or grab casually.", "ex": "Vamos a pillar un taxi. — Let's grab a taxi."}], "Reactions & Fillers": [{"es": "¡Qué padre!", "en": "How cool!", "desc": "Mexican Spanish. Equivalent to '¡Qué chévere!' (Colombia/Venezuela) or '¡Qué guay!' (Spain).", "ex": "¿Te ascendieron? ¡Qué padre! — You got promoted? How cool!"}, {"es": "¡No me digas!", "en": "No way! / You don't say!", "desc": "Express surprise. Can be genuine or sarcastic depending on tone.", "ex": "Perdió las llaves otra vez. — ¡No me digas! — He lost his keys again. — No way!"}, {"es": "o sea", "en": "I mean / like / that is", "desc": "The most common Spanish filler. Use it to clarify, rephrase, or buy time while thinking.", "ex": "Es caro, o sea, no es para todos. — It's expensive, I mean, it's not for everyone."}, {"es": "pues", "en": "well / so", "desc": "Universal filler to start any response. Softens what follows and sounds very natural.", "ex": "Pues, la verdad no sé qué decirte. — Well, honestly I don't know what to tell you."}, {"es": "es que...", "en": "the thing is... / it's just that...", "desc": "Introduces explanations, excuses, or reasons. Essential conversational connector.", "ex": "Es que no pude ir, tenía mucho trabajo. — The thing is I couldn't go, I had too much work."}, {"es": "a ver", "en": "let's see / let me check", "desc": "Buys time naturally. Use when thinking, checking something, or about to explain.", "ex": "A ver... creo que tenemos dos opciones. — Let's see... I think we have two options."}, {"es": "¡Qué rollo!", "en": "What a hassle! / What a drag!", "desc": "Express annoyance about a situation. Informal but very common.", "ex": "¿Se canceló el vuelo? ¡Qué rollo! — The flight was cancelled? What a drag!"}, {"es": "¿en serio?", "en": "seriously? / really?", "desc": "Show surprise or seek confirmation. More neutral than '¡No me digas!'", "ex": "¿En serio te vas a mudar? — Seriously, you're going to move?"}, {"es": "bueno", "en": "well / okay / alright", "desc": "Multipurpose: start a response, signal agreement, transition between topics, or answer the phone.", "ex": "Bueno, yo creo que tienes razón. — Well, I think you're right."}, {"es": "¡Qué loco!", "en": "That's crazy!", "desc": "React to surprising or unbelievable information. Not offensive, just expressive.", "ex": "Se ganó la lotería. — ¡Qué loco! — He won the lottery. — That's crazy!"}], "Social & Plans": [{"es": "quedar con", "en": "to meet up with", "desc": "The standard way to say you're meeting someone. 'Quedé con Ana' = I'm meeting up with Ana.", "ex": "¿Quedamos mañana para cenar? — Shall we meet up tomorrow for dinner?"}, {"es": "pasarla bien", "en": "to have a good time", "desc": "Latin America: pasarla bien. Spain: pasarlo bien. Essential for talking about fun.", "ex": "La pasamos muy bien en la fiesta. — We had a great time at the party."}, {"es": "animarse", "en": "to be up for it / to dare", "desc": "'¿Te animas?' = Are you game? Are you up for it? Great for casual invitations.", "ex": "Vamos al cine. ¿Te animas? — Let's go to the movies. Are you up for it?"}, {"es": "tener ganas de", "en": "to feel like doing", "desc": "Express desire or inclination. 'No tengo ganas' = I don't feel like it.", "ex": "Tengo ganas de ir a la playa. — I feel like going to the beach."}, {"es": "dar flojera", "en": "to feel too lazy / can't be bothered", "desc": "When something sounds like too much effort. Very relatable expression.", "ex": "Me da flojera cocinar hoy. — I can't be bothered to cook today."}, {"es": "caer bien/mal", "en": "to like/dislike someone's personality", "desc": "Not romantic — describes personal chemistry. 'Me cae muy bien' = I really like them (as a person).", "ex": "Tu amigo me cae super bien. — I really like your friend (as a person)."}, {"es": "llevar + time", "en": "to have been doing for X time", "desc": "'Llevo tres años aquí' = I've been here for three years. Essential time expression.", "ex": "Llevo dos horas esperando. — I've been waiting for two hours."}, {"es": "acabar de", "en": "to have just done something", "desc": "Recent past: 'Acabo de llegar' = I just arrived. Very useful for narrating recent events.", "ex": "Acabo de hablar con ella. — I just spoke with her."}, {"es": "ponerse de acuerdo", "en": "to come to an agreement", "desc": "When coordinating plans or reaching consensus with a group.", "ex": "No nos podemos poner de acuerdo. — We can't agree on anything."}, {"es": "apuntarse", "en": "to sign up / to join in", "desc": "'¿Te apuntas?' = Want to join? 'Me apunto' = Count me in!", "ex": "Vamos a hacer senderismo. ¿Te apuntas? — We're going hiking. Want to join?"}], "Descriptions & Opinions": [{"es": "parecer", "en": "to seem / to think (opinion)", "desc": "'Me parece que...' = I think that... 'Me parece bien' = Sounds good to me. Very versatile.", "ex": "Me parece buena idea. — That seems like a good idea to me."}, {"es": "genial", "en": "great / awesome", "desc": "Universal positive reaction. Works in all Spanish-speaking countries.", "ex": "¡Qué plan tan genial! — What an awesome plan!"}, {"es": "increíble", "en": "incredible / unbelievable", "desc": "Can be positive or negative depending on context. 'Es increíble lo caro que es' = It's unbelievable how expensive it is.", "ex": "La vista es increíble. — The view is incredible."}, {"es": "estar harto/a de", "en": "to be fed up with", "desc": "Stronger than 'cansado de.' Express real frustration or exhaustion with something.", "ex": "Estoy harta del tráfico. — I'm fed up with the traffic."}, {"es": "valer la pena", "en": "to be worth it", "desc": "'¿Vale la pena?' = Is it worth it? Essential for recommendations and decisions.", "ex": "La película vale mucho la pena. — The movie is really worth it."}, {"es": "tener sentido", "en": "to make sense", "desc": "Acknowledge understanding: 'Tiene sentido' = That makes sense. Great in conversations.", "ex": "Ah, ahora tiene sentido. — Ah, now it makes sense."}, {"es": "depender de", "en": "to depend on", "desc": "Hedge your opinion: 'Depende de...' Sounds natural and thoughtful.", "ex": "Depende de lo que quieras hacer. — It depends on what you want to do."}, {"es": "dar igual", "en": "to not mind / it's all the same", "desc": "Express indifference (not rudely): 'Me da igual' = I don't mind either way.", "ex": "¿Pizza o sushi? — Me da igual, lo que tú quieras. — I don't mind, whatever you want."}, {"es": "molar", "en": "to be cool (Spain)", "desc": "Spain slang: 'Mola mucho' = That's really cool. Not used in Latin America.", "ex": "Tu camiseta mola mucho. — Your t-shirt is really cool."}, {"es": "flipar", "en": "to be amazed / shocked (Spain)", "desc": "Spain slang: 'Estoy flipando' = I'm blown away. Shows strong reaction.", "ex": "¡Estoy flipando con esta noticia! — I'm blown away by this news!"}], "Home & Daily Life": [{"es": "madrugar", "en": "to get up very early", "desc": "'No me gusta madrugar' is one of the most relatable sentences in Spanish.", "ex": "Mañana tengo que madrugar para el vuelo. — Tomorrow I have to get up early for the flight."}, {"es": "trasnochar", "en": "to stay up very late", "desc": "The opposite of madrugar. Perfect for talking about late nights.", "ex": "Trasnochamos viendo series. — We stayed up late watching shows."}, {"es": "arreglar(se)", "en": "to fix / to get ready", "desc": "Arreglarse = to get yourself ready/dressed up. Arreglar = to fix something.", "ex": "Dame un momento, me estoy arreglando. — Give me a moment, I'm getting ready."}, {"es": "hacer mandados", "en": "to run errands", "desc": "Latin America: 'hacer mandados.' Spain: 'hacer recados.' Both mean running errands.", "ex": "Tengo que hacer unos mandados después del trabajo. — I have to run some errands after work."}, {"es": "recoger", "en": "to pick up / to clean up / to collect", "desc": "Pick up kids from school, clean up the house, or collect something.", "ex": "Voy a recoger a los niños a las tres. — I'm going to pick up the kids at three."}, {"es": "encargarse de", "en": "to take care of / to handle", "desc": "'Yo me encargo' = I'll handle it. Shows responsibility and initiative.", "ex": "No te preocupes, yo me encargo de todo. — Don't worry, I'll take care of everything."}, {"es": "sobrar", "en": "to be left over / to have extra", "desc": "'Sobra comida' = There's food left over. Useful for everyday situations.", "ex": "¿Sobró algo de la cena? — Was there anything left from dinner?"}, {"es": "hacer falta", "en": "to need / to be necessary", "desc": "Impersonal: 'Hace falta más sal' = More salt is needed. Personal: 'Te hago falta' = You need me.", "ex": "Hace falta comprar leche. — We need to buy milk."}, {"es": "tocar(le) a uno", "en": "to be someone's turn", "desc": "'Te toca' = It's your turn. 'Me toca cocinar' = It's my turn to cook.", "ex": "Hoy te toca lavar los platos. — Today it's your turn to do the dishes."}, {"es": "tardar", "en": "to take time / to be late", "desc": "'No tardo' = I won't be long. '¿Cuánto tarda?' = How long does it take?", "ex": "El autobús tarda veinte minutos. — The bus takes twenty minutes."}]};

// TTS
let spanishVoice=null;
function initVoices(){const v=speechSynthesis.getVoices();spanishVoice=v.find(x=>x.lang==='es-MX')||v.find(x=>x.lang==='es-ES')||v.find(x=>x.lang.startsWith('es'))||null}
speechSynthesis.onvoiceschanged=initVoices;initVoices();
function speak(t,r=0.9){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='es-ES';u.rate=r;if(spanishVoice)u.voice=spanishVoice;speechSynthesis.speak(u);return u}
function speakBtn(b,t,r){b.classList.add('playing');const u=speak(t,r);u.onend=()=>b.classList.remove('playing');u.onerror=()=>b.classList.remove('playing')}

// STATE
const SK='habla_v2';
let state=loadState();
function defaultState(){return{xp:0,streak:0,hearts:5,lessonsCompleted:[],lastActiveDate:null,activeDays:[],learnedVocab:[],todayXP:0,todayDate:null}}
function loadState(){try{const r=localStorage.getItem(SK);if(!r)return defaultState();const s=JSON.parse(r);
const today=new Date().toDateString();if(s.lastActiveDate){const d=Math.floor((new Date(today)-new Date(s.lastActiveDate))/86400000);if(d>1)s.streak=0}
if(s.todayDate!==today){s.todayXP=0;s.todayDate=today}
return s}catch(e){return defaultState()}}
function saveState(){localStorage.setItem(SK,JSON.stringify(state))}
function updateStreak(){const today=new Date().toDateString();if(state.lastActiveDate!==today){state.streak++;state.lastActiveDate=today;if(!state.activeDays.includes(today))state.activeDays.push(today);if(state.activeDays.length>30)state.activeDays=state.activeDays.slice(-30);state.todayDate=today}}
function refreshUI(){
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v};
  s('nav-streak',state.streak);s('nav-xp',state.xp);s('nav-hearts',state.hearts);
  s('prof-streak',state.streak);s('prof-xp',state.xp);s('prof-lessons',state.lessonsCompleted.length);s('prof-words',state.learnedVocab.length);
  const allV=Object.values(VOCAB).flat();s('vocab-count',allV.length);
  s('vocab-learned-ct',state.learnedVocab.length);s('vocab-total-ct',allV.length);
  const pf=document.getElementById('vocab-prog-fill');if(pf)pf.style.width=(allV.length?state.learnedVocab.length/allV.length*100:0)+'%';
}

  const el=document.getElementById('learn-scroll');

  const msgs=['Start your streak today!','Nice! Keep it going!','You\'re on fire!','Incredible dedication!','Unstoppable!'];
  const mi=state.streak===0?0:state.streak<3?1:state.streak<7?2:state.streak<30?3:4;
  let h=`<div class="streak-banner ${state.streak===0?'none':''}"><div class="streak-fire">${state.streak>0?'🔥':'\u2744\ufe0f'}</div><div class="streak-info"><div class="streak-count">${state.streak} Day Streak</div><div class="streak-msg">${msgs[mi]}</div></div></div>`;
  h+='<div class="section-label">Conversational Lessons</div>';
  UNITS.forEach((u,i)=>{
    const done=state.lessonsCompleted.includes(u.id);const prev=i===0||state.lessonsCompleted.includes(UNITS[i-1].id);const locked=!prev&&!done;
    h+=`<div class="unit-card ${done?'completed':locked?'locked':''}" onclick="startLesson('${u.id}')">
      <div class="unit-header"><span class="unit-icon">${u.icon}</span>${done?'<span class="unit-crown">\ud83d\udc51</span>':''}</div>

      <div class="unit-progress"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${done?100:0}%"></div></div>
      <div class="progress-text">${done?'COMPLETE':locked?'\ud83d\udd12 LOCKED':'START'}</div></div></div>`;
  });
  el.innerHTML=h;
}

// LESSON ENGINE
let curUnit=null,lessonEx=[],exIdx=0,lCorrect=0,lTotal=0,lHearts=5,selAnswer=null,answered=false;
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function startLesson(id){
  const u=UNITS.find(x=>x.id===id);if(!u)return;curUnit=u;
  lessonEx=[{type:'dialogue',data:u.dialogue},...u.exercises.sort(()=>Math.random()-0.5)];
  exIdx=0;lCorrect=0;lTotal=u.exercises.length;lHearts=state.hearts;selAnswer=null;answered=false;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-lesson').classList.add('active');document.getElementById('mainNav').classList.add('hidden');
  document.getElementById('lesson-hearts').textContent=lHearts;renderEx();
}
function exitLesson(){speechSynthesis.cancel();document.getElementById('screen-lesson').classList.remove('active');
  document.getElementById('screen-learn').classList.add('active');document.getElementById('mainNav').classList.remove('hidden');renderLearn();refreshUI()}

function renderEx(){
  if(exIdx>=lessonEx.length||lHearts<=0){showComplete();return}
  const ex=lessonEx[exIdx];const pct=exIdx/lessonEx.length*100;
  document.getElementById('lesson-progress').style.width=pct+'%';
  selAnswer=null;answered=false;
  const fb=document.getElementById('feedback-bar');fb.classList.remove('show','correct','wrong');
  const btn=document.getElementById('check-btn');const C=document.getElementById('lesson-content');

  if(ex.type==='dialogue'){
    btn.className='check-btn ready';btn.textContent='CONTINUE';
    let dh=`<div class="scene-card"><div class="scene-emoji">${curUnit.icon}</div><div class="scene-title">${curUnit.title}</div><div class="scene-desc">Listen to the conversation, tap lines to hear them</div></div><div class="dialogue-container">`;
    ex.data.forEach(l=>{
      dh+=`<div class="dialogue-line ${l.who==='B'?'right':''}"><div class="dialogue-avatar ${l.who.toLowerCase()}">${l.who==='A'?'\ud83e\uddd1':'\ud83d\ude4b'}</div>
        <div class="dialogue-bubble" onclick="speak('${esc(l.es)}',0.85)"><div class="dialogue-es">${l.es}</div><div class="dialogue-en">${l.en}</div></div></div>`;
    });
    dh+='</div>';C.innerHTML=dh;setTimeout(()=>speak(ex.data[0].es,0.85),400);answered=true;return;
  }
  btn.className='check-btn disabled';btn.textContent='CHECK';

  if(ex.type==='listen_mc'){
    C.innerHTML=`<div class="ex-type">\ud83c\udf99\ufe0f Listen & Choose</div>
      <button class="speaker-btn" onclick="speakBtn(this,'${esc(ex.audio)}',0.85)">\ud83d\udd0a</button>
      <div class="ex-prompt">${ex.prompt}</div>
      <div class="mc-options">${ex.options.map((o,i)=>`<button class="mc-option" onclick="selMC(this,${i})"><span class="opt-num">${i+1}</span><span>${o}</span></button>`).join('')}</div>`;
    setTimeout(()=>speak(ex.audio,0.85),300);
  } else if(ex.type==='listen_type'){
    C.innerHTML=`<div class="ex-type">\u270d\ufe0f Listen & Write</div>
      <button class="speaker-btn" onclick="speakBtn(this,'${esc(ex.audio)}',0.85)">\ud83d\udd0a</button>
      <div class="ex-prompt">${ex.prompt}</div>
      <div class="text-input-area"><input class="text-input" id="fill-input" type="text" placeholder="Type what you heard..." autocomplete="off" autocapitalize="off" oninput="onFill()"></div>
      <div style="margin-top:10px"><button class="speaker-btn small" onclick="speakBtn(this,'${esc(ex.audio)}',0.6)">\ud83d\udc22</button><div style="font-size:10px;color:var(--text-mut);text-align:center;margin-top:2px">Slow</div></div>`;
    setTimeout(()=>speak(ex.audio,0.85),300);setTimeout(()=>document.getElementById('fill-input')?.focus(),500);
  } else if(ex.type==='respond'){
    C.innerHTML=`<div class="ex-type">\ud83d\udcac Respond in Spanish</div>
      <div class="scene-card"><div class="scene-desc">${ex.situation}</div></div>
      <div class="text-input-area"><input class="text-input" id="fill-input" type="text" placeholder="Type your response..." autocomplete="off" autocapitalize="off" oninput="onFill()"></div>`;
    setTimeout(()=>document.getElementById('fill-input')?.focus(),200);
  } else if(ex.type==='build'){
    const sh=[...ex.words].sort(()=>Math.random()-0.5);
    C.innerHTML=`<div class="ex-type">\ud83e\udde9 Build the Sentence</div><div class="ex-prompt">${ex.prompt}</div>
      <div class="word-bank-target" id="wb-target"></div>
      <div class="word-bank-pool" id="wb-pool">${sh.map((w,i)=>`<button class="word-chip" data-idx="${i}" data-word="${esc(w)}" onclick="chipTap(this)">${w}</button>`).join('')}</div>`;
  } else if(ex.type==='mc'){
    C.innerHTML=`<div class="ex-type">\u2753 Choose the Answer</div><div class="ex-prompt">${ex.prompt}</div>
      <div class="mc-options">${ex.options.map((o,i)=>`<button class="mc-option" onclick="selMC(this,${i})"><span class="opt-num">${i+1}</span><span>${o}</span></button>`).join('')}</div>`;
  } else if(ex.type==='fill'){
    C.innerHTML=`<div class="ex-type">\u270f\ufe0f Fill in the Blank</div><div class="ex-prompt">${ex.prompt}</div>
      <div class="text-input-area"><input class="text-input" id="fill-input" type="text" placeholder="Type your answer..." autocomplete="off" autocapitalize="off" oninput="onFill()"></div>`;
    setTimeout(()=>document.getElementById('fill-input')?.focus(),200);
  }
}

function chipTap(el){
  if(answered)return;const target=document.getElementById('wb-target');const pool=document.getElementById('wb-pool');
  if(el.classList.contains('in-target')){el.classList.remove('in-target');pool.appendChild(el)}
  else{el.classList.add('in-target');target.appendChild(el)}
  const inT=target.querySelectorAll('.word-chip');
  document.getElementById('check-btn').className=inT.length>0?'check-btn ready':'check-btn disabled';
  selAnswer=[...inT].map(c=>c.dataset.word).join(' ');
}
function selMC(el,idx){if(answered)return;document.querySelectorAll('.mc-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');selAnswer=idx;document.getElementById('check-btn').className='check-btn ready'}
function onFill(){const v=document.getElementById('fill-input')?.value.trim();
  document.getElementById('check-btn').className=v?'check-btn ready':'check-btn disabled';selAnswer=v}

function handleCheck(){
  const btn=document.getElementById('check-btn');if(btn.classList.contains('disabled'))return;
  if(answered&&lessonEx[exIdx].type==='dialogue'){exIdx++;renderEx();return}
  if(!answered){
    answered=true;const ex=lessonEx[exIdx];let ok=false;
    if(ex.type==='mc'||ex.type==='listen_mc'){
      ok=selAnswer===ex.correct;
      document.querySelectorAll('.mc-option').forEach((o,i)=>{o.classList.add('disabled');if(i===ex.correct)o.classList.add('correct');if(i===selAnswer&&!ok)o.classList.add('wrong')});
    } else if(ex.type==='fill'){
      const inp=document.getElementById('fill-input');ok=norm(inp.value)===norm(ex.answer);inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
    } else if(ex.type==='listen_type'){
      const inp=document.getElementById('fill-input');ok=norm(inp.value)===norm(ex.answer);inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
    } else if(ex.type==='respond'){
      const inp=document.getElementById('fill-input');const u=norm(inp.value);ok=u===norm(ex.answer)||(ex.alts||[]).some(a=>norm(a)===u);
      inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
    } else if(ex.type==='build'){ok=norm(selAnswer||'')===norm(ex.answer)}
    if(ok){lCorrect++;showFB(true);btn.className='check-btn continue'}
    else{lHearts--;document.getElementById('lesson-hearts').textContent=lHearts;
      let d=null;if(ex.type==='fill'||ex.type==='listen_type')d='Answer: '+ex.answer;
      else if(ex.type==='respond')d='One answer: '+ex.answer;else if(ex.type==='build')d='Answer: '+ex.answer;
      showFB(false,d);btn.className='check-btn wrong-continue'}
    btn.textContent='CONTINUE';
  } else{exIdx++;renderEx()}
}
function showFB(ok,d){const fb=document.getElementById('feedback-bar');fb.classList.add('show',ok?'correct':'wrong');fb.classList.remove(ok?'wrong':'correct');
  document.getElementById('feedback-text').textContent=ok?'¡Correcto! 🎉':'¡Incorrecto! \ud83d\ude14';document.getElementById('feedback-detail').textContent=d||''}
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim()}

function showComplete(){
  speechSynthesis.cancel();document.getElementById('screen-lesson').classList.remove('active');document.getElementById('mainNav').classList.add('hidden');
  const xp=lCorrect*10+(lHearts>0?5:0);const acc=lTotal>0?Math.round(lCorrect/lTotal*100):0;
  state.xp+=xp;state.todayXP=(state.todayXP||0)+xp;state.hearts=Math.max(lHearts,1);
  if(acc>=60&&curUnit&&!state.lessonsCompleted.includes(curUnit.id))state.lessonsCompleted.push(curUnit.id);
  if(curUnit)curUnit.dialogue.forEach(l=>{if(!state.learnedVocab.includes(l.es))state.learnedVocab.push(l.es)});
  updateStreak();saveState();
  if(typeof syncUI!=='undefined'&&syncUI.isConnected())syncUI.save(getAppState());
  document.getElementById('complete-xp').textContent=xp;document.getElementById('complete-acc').textContent=acc+'%';
  const strs=['Keep practicing!','¡Buen trabajo!','¡Muy bien!','¡Perfecto! Flawless!'];
  document.getElementById('complete-subtitle').textContent=acc===100?strs[3]:acc>=80?strs[2]:acc>=60?strs[1]:strs[0];
  document.getElementById('lesson-complete').classList.add('active');if(acc>=60)spawnConfetti();
}
function finishLesson(){document.getElementById('lesson-complete').classList.remove('active');
  document.getElementById('screen-learn').classList.add('active');document.getElementById('mainNav').classList.remove('hidden');
  state.hearts=Math.min(state.hearts+2,5);saveState();renderLearn();refreshUI()}

// VOCAB TAB
let vCat='all';
function renderVocab(){
  const cats=['all',...Object.keys(VOCAB)];
  document.getElementById('vocab-filter').innerHTML=cats.map(c=>
    `<button class="filter-chip ${c===vCat?'active':''}" onclick="vCat='${c.replace(/'/g,"\\'")}';renderVocab()">${c==='all'?'All':c}</button>`).join('');
  let words=[];if(vCat==='all')Object.values(VOCAB).forEach(a=>words.push(...a));else words=VOCAB[vCat]||[];
  document.getElementById('vocab-list').innerHTML=words.map((w,i)=>{

      <div class="vocab-top" onclick="document.getElementById('vc-${i}').classList.toggle('expanded')">
        <div><div class="vocab-es">${w.es} <button class="speaker-btn small" style="display:inline-flex;vertical-align:middle;width:28px;height:28px;font-size:13px;border-width:1px;margin-left:4px" onclick="event.stopPropagation();speakBtn(this,'${w.es.replace(/'/g,"\\'")}',0.85)">\ud83d\udd0a</button></div>
        <div class="vocab-en">${w.en}</div></div>
        <button class="vocab-check ${learned?'done':''}" onclick="event.stopPropagation();toggleVocab('${w.es.replace(/'/g,"\\'")}')">${learned?'\u2713':''}</button>
      </div>
      <div class="vocab-detail"><div class="vocab-desc">${w.desc}</div><div class="vocab-ex">${w.ex}</div></div>
    </div>`}).join('');
  refreshUI();
}
function toggleVocab(es){
  const idx=state.learnedVocab.indexOf(es);
  if(idx>=0)state.learnedVocab.splice(idx,1);else state.learnedVocab.push(es);
  saveState();renderVocab();
}

// Vocab Practice Mode
function startVocabPractice(){
  const allW=Object.values(VOCAB).flat();if(allW.length===0)return;
  const shuffled=[...allW].sort(()=>Math.random()-0.5).slice(0,10);
  curUnit={id:'vocab_practice',title:'Vocab Practice',icon:'\ud83c\udfaf',desc:'Practice vocabulary',dialogue:[],

// ============================================================
// SPACED REPETITION
// ============================================================
function getSRScore(word){const sr=state.spacedRep||{};return sr[word]||{score:0,lastSeen:0,interval:1}}
function updateSR(word,correct){
  if(!state.spacedRep)state.spacedRep={};
  const s=state.spacedRep[word]||{score:0,lastSeen:0,interval:1};
  if(correct){s.score=Math.min(s.score+1,5);s.interval=Math.min(s.interval*2,30)}
  else{s.score=Math.max(s.score-1,0);s.interval=1}
  s.lastSeen=Date.now();state.spacedRep[word]=s;
}
function getWeakWords(n){
  const allW=Object.values(VOCAB).flat();
  return allW.sort((a,b)=>{
    const sa=getSRScore(a.es),sb=getSRScore(b.es);
    const na=sa.score-(Date.now()-sa.lastSeen)/86400000;
    const nb=sb.score-(Date.now()-sb.lastSeen)/86400000;
    return na-nb;
  }).slice(0,n);
}

// ============================================================
function addMistake(q,wrong,right){
  if(!state.mistakes)state.mistakes=[];
  const existing=state.mistakes.find(m=>m.q===q);
  if(existing){existing.count++;existing.wrong=wrong}
  else state.mistakes.push({q,wrong,right,count:1});
  if(state.mistakes.length>50)state.mistakes=state.mistakes.slice(-50);
}

// ============================================================
// SPEED ROUND
// ============================================================
function startSpeedRound(){
  enterGame();
  let timeLeft=60,score=0,total=0;
  const allQ=[];
  // Build question pool from vocab + unit exercises
  Object.values(VOCAB).forEach(arr=>arr.forEach(w=>{
    const wrongs=Object.values(VOCAB).flat().filter(x=>x.en!==w.en).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.en);
    allQ.push({q:w.es,correct:w.en,opts:[...wrongs,w.en].sort(()=>Math.random()-0.5)});
  }));
  let pool=[...allQ].sort(()=>Math.random()-0.5);let qi=0;

  function render(){
    if(qi>=pool.length){pool=[...allQ].sort(()=>Math.random()-0.5);qi=0}
    const q=pool[qi];
    const pct=timeLeft/60*100;const tcls=pct>50?'green':pct>20?'yellow':'red';
    document.getElementById('game-header-info').textContent='⚡ Speed Round';
    document.getElementById('game-header-score').textContent='✓ '+score;
    document.getElementById('game-content').innerHTML=`
      <div class="timer-text" style="color:${pct>20?'var(--text)':'var(--red)'}">${timeLeft}s</div>
      <div class="timer-bar"><div class="timer-fill ${tcls}" style="width:${pct}%"></div></div>
      <div class="game-score">Score: ${score} / ${total}</div>
      <div class="ex-prompt" style="font-size:24px">${q.q}</div>
      <div class="mc-options">${q.opts.map((o,i)=>
        `<button class="mc-option" onclick="speedAnswer(this,'${o.replace(/'/g,"\\'")}','${q.correct.replace(/'/g,"\\'")}')"><span class="opt-num">${i+1}</span><span>${o}</span></button>`
      ).join('')}</div>`;
  }

  window.speedAnswer=function(el,sel,correct){
    total++;
    document.querySelectorAll('.mc-option').forEach(o=>o.classList.add('disabled'));
    if(sel===correct){score++;el.classList.add('correct');updateSR(pool[qi].q,true)}
    else{el.classList.add('wrong');
      document.querySelectorAll('.mc-option').forEach(o=>{if(o.textContent.slice(1)===correct)o.classList.add('correct')});
      addMistake(pool[qi].q,sel,correct);updateSR(pool[qi].q,false);
    }
    qi++;setTimeout(render,400);
  };

  render();
  gameTimer=setInterval(()=>{
    timeLeft--;
    const pct=timeLeft/60*100;const tcls=pct>50?'green':pct>20?'yellow':'red';
    const timerEl=document.querySelector('.timer-text');if(timerEl){timerEl.textContent=timeLeft+'s';timerEl.style.color=pct>20?'var(--text)':'var(--red)'}
    const barEl=document.querySelector('.timer-fill');if(barEl){barEl.style.width=pct+'%';barEl.className='timer-fill '+tcls}
    if(timeLeft<=0){
      clearInterval(gameTimer);
      const xp=score*5;state.xp+=xp;state.todayXP=(state.todayXP||0)+xp;
      if(!state.bestSpeed||score>state.bestSpeed)state.bestSpeed=score;
      updateStreak();saveState();if(typeof syncUI!=='undefined'&&syncUI.isConnected())syncUI.save(getAppState());
      document.getElementById('game-content').innerHTML=`<div class="game-results"><div class="game-results-icon">⚡</div>
        <div class="game-results-title">Time's Up!</div><div class="game-results-sub">Speed Round Complete</div>
        <div class="game-results-stats"><div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--green)">${score}</div><div class="game-results-stat-label">Correct</div></div>
        <div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--gold)">${xp}</div><div class="game-results-stat-label">XP</div></div>
        <div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--text-sec)">${total>0?Math.round(score/total*100):0}%</div><div class="game-results-stat-label">Accuracy</div></div></div>
        <button class="complete-btn" onclick="exitGame()">CONTINUE</button></div>`;
      if(score>=5)spawnConfetti();
    }
  },1000);
}

// MEMORY MATCH
// ============================================================
function startMemoryMatch(){
  enterGame();
  const words=getWeakWords(6);
  const pairs=[];
  words.forEach(w=>{pairs.push({id:w.es+'_es',text:w.es,match:w.es,lang:'es'});pairs.push({id:w.es+'_en',text:w.en,match:w.es,lang:'en'})});
  const cards=[...pairs].sort(()=>Math.random()-0.5);
  let flipped=[],matched=new Set(),moves=0,startTime=Date.now();

  document.getElementById('game-header-info').textContent='🧠 Memory Match';
  document.getElementById('game-header-score').textContent='';

  function render(){
    document.getElementById('game-content').innerHTML=`
      <div class="match-grid g4x3">${cards.map((c,i)=>
        `<div class="match-card ${matched.has(c.match)?'matched':flipped.includes(i)?'face-up':'face-down'}" onclick="matchFlip(${i})" data-idx="${i}">${matched.has(c.match)||flipped.includes(i)?c.text:''}</div>`
      ).join('')}</div>
      <div class="match-moves">Moves: ${moves} | Pairs: ${matched.size}/${words.length}</div>`;
  }

  window.matchFlip=function(idx){
    if(flipped.length>=2||flipped.includes(idx)||matched.has(cards[idx].match))return;
    flipped.push(idx);moves++;render();
    if(flipped.length===2){
      const a=cards[flipped[0]],b=cards[flipped[1]];
      if(a.match===b.match&&a.lang!==b.lang){
        matched.add(a.match);updateSR(a.match,true);
        setTimeout(()=>{flipped=[];render();
          if(matched.size===words.length){
            const elapsed=Math.round((Date.now()-startTime)/1000);
            const xp=words.length*5+Math.max(0,60-elapsed);
            state.xp+=xp;state.todayXP=(state.todayXP||0)+xp;
            if(!state.bestMatchTime||elapsed<state.bestMatchTime)state.bestMatchTime=elapsed;
            updateStreak();saveState();if(typeof syncUI!=='undefined'&&syncUI.isConnected())syncUI.save(getAppState());
            document.getElementById('game-content').innerHTML=`<div class="game-results"><div class="game-results-icon">🧠</div>
              <div class="game-results-title">All Matched!</div><div class="game-results-sub">Memory Match Complete</div>
              <div class="game-results-stats"><div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--green)">${elapsed}s</div><div class="game-results-stat-label">Time</div></div>
              <div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--gold)">${xp}</div><div class="game-results-stat-label">XP</div></div>
              <div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--text-sec)">${moves}</div><div class="game-results-stat-label">Moves</div></div></div>
              <button class="complete-btn" onclick="exitGame()">CONTINUE</button></div>`;
            spawnConfetti();
          }
        },300);
      } else {
        setTimeout(()=>{
          document.querySelectorAll('.match-card').forEach(c=>{if(flipped.includes(parseInt(c.dataset.idx)))c.classList.add('wrong')});
          setTimeout(()=>{flipped=[];render()},600);
        },500);
      }
    }
  };
  render();
}
