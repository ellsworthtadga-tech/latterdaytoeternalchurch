e place and the concept. 'Ir al trabajo' = to go to work.", "ex": "Salgo del trabajo a las cinco. — I leave work at five."}, {"es": "escuela", "en": "school", "desc": "School in general. 'Colegio' also used. 'Ir a la escuela' = to go to school.", "ex": "Los niños están en la escuela. — The kids are at school."}, {"es": "cerca", "en": "near / close", "desc": "Nearby. 'Cerca de' = near to. '¿Hay uno cerca?' = Is there one nearby?", "ex": "El supermercado está cerca. — The supermarket is nearby."}, {"es": "lejos", "en": "far", "desc": "Far away. 'Lejos de' = far from. '¿Está lejos?' = Is it far?", "ex": "No está lejos, son diez minutos. — It's not far, it's ten minutes."}, {"es": "derecho", "en": "straight ahead", "desc": "Direction: go straight. Also 'right' (as in rights/law).", "ex": "Sigue derecho dos cuadras. — Go straight two blocks."}, {"es": "izquierda", "en": "left", "desc": "Left direction. 'A la izquierda' = to/on the left.", "ex": "Gira a la izquierda en la esquina. — Turn left at the corner."}, {"es": "derecha", "en": "right", "desc": "Right direction. 'A la derecha' = to/on the right.", "ex": "El baño está a la derecha. — The bathroom is on the right."}], "Food & Drink": [{"es": "comida", "en": "food / meal / lunch", "desc": "Food in general or specifically lunch in Mexico. 'La hora de la comida' = lunchtime.", "ex": "La comida estuvo deliciosa. — The food was delicious."}, {"es": "agua", "en": "water", "desc": "Water. Feminine despite 'el agua' (uses 'el' for pronunciation). 'Agua con gas' = sparkling.", "ex": "¿Me traes un vaso de agua? — Can you bring me a glass of water?"}, {"es": "café", "en": "coffee", "desc": "Coffee or café. 'Tomar un café' = to have a coffee (socially).", "ex": "¿Vamos por un café? — Shall we go get a coffee?"}, {"es": "carne", "en": "meat", "desc": "Meat in general. 'Carne de res' = beef. 'Carne de cerdo' = pork.", "ex": "No como mucha carne. — I don't eat much meat."}, {"es": "pollo", "en": "chicken", "desc": "Chicken (the meat). 'Pollo asado' = roast chicken.", "ex": "Voy a preparar pollo para la cena. — I'm going to make chicken for dinner."}, {"es": "arroz", "en": "rice", "desc": "Rice. Staple food across Latin America. 'Arroz con pollo' = classic dish.", "ex": "¿Quieres arroz o papas? — Do you want rice or potatoes?"}, {"es": "pan", "en": "bread", "desc": "Bread. 'Panadería' = bakery. 'Pan dulce' = sweet bread (pastries).", "ex": "Voy a comprar pan. — I'm going to buy bread."}, {"es": "cerveza", "en": "beer", "desc": "Beer. '¿Una cerveza?' is a universal invitation in Spanish-speaking countries.", "ex": "¿Quieres una cerveza? — Do you want a beer?"}, {"es": "desayuno", "en": "breakfast", "desc": "Breakfast. 'Desayunar' = to have breakfast. First meal of the day.", "ex": "¿Qué quieres de desayuno? — What do you want for breakfast?"}, {"es": "cena", "en": "dinner", "desc": "Evening meal. 'Cenar' = to have dinner. 'Ir a cenar' = to go out for dinner.", "ex": "¿A qué hora es la cena? — What time is dinner?"}], "Social & Plans": [{"es": "quedar con", "en": "to meet up with", "desc": "Standard way to say meeting someone. 'Quedé con Ana' = I'm meeting Ana.", "ex": "¿Quedamos mañana? — Shall we meet up tomorrow?"}, {"es": "pasarla bien", "en": "to have a good time", "desc": "Latin America: pasarla bien. Spain: pasarlo bien.", "ex": "La pasamos increíble. — We had an amazing time."}, {"es": "animarse", "en": "to be up for it", "desc": "'¿Te animas?' = Are you game? Great for casual invitations.", "ex": "¿Te animas a ir? — Are you up for going?"}, {"es": "tener ganas de", "en": "to feel like", "desc": "Express desire. 'No tengo ganas' = I don't feel like it.", "ex": "Tengo ganas de pizza. — I feel like pizza."}, {"es": "caer bien/mal", "en": "to like/dislike someone", "desc": "Personal chemistry, not romantic. 'Me cae bien' = I like them as a person.", "ex": "Tu amigo me cae super bien. — I really like your friend."}, {"es": "llevar + time", "en": "to have been doing for X time", "desc": "'Llevo tres años aquí' = I've been here for three years.", "ex": "Llevo dos horas esperando. — I've been waiting for two hours."}, {"es": "acabar de", "en": "to have just done", "desc": "Recent past: 'Acabo de llegar' = I just arrived.", "ex": "Acabo de hablar con ella. — I just spoke with her."}, {"es": "apuntarse", "en": "to sign up / join in", "desc": "'¿Te apuntas?' = Want to join? 'Me apunto' = Count me in!", "ex": "¿Te apuntas al plan? — Want to join the plan?"}, {"es": "invitar", "en": "to invite / to treat", "desc": "Invite socially or pay for someone. 'Yo invito' = My treat / I'm paying.", "ex": "Te invito a cenar. — I'll treat you to dinner."}, {"es": "celebrar", "en": "to celebrate", "desc": "Parties, milestones, achievements. 'Hay que celebrar' = We have to celebrate!", "ex": "¡Hay que celebrar! — We have to celebrate!"}], "Home & Daily Life": [{"es": "madrugar", "en": "to get up very early", "desc": "One of the most relatable words. 'No me gusta madrugar' = universal truth.", "ex": "Tengo que madrugar mañana. — I have to get up early tomorrow."}, {"es": "trasnochar", "en": "to stay up very late", "desc": "Opposite of madrugar. Late nights watching shows, talking, etc.", "ex": "Trasnochamos viendo series. — We stayed up late watching shows."}, {"es": "arreglarse", "en": "to get ready", "desc": "Getting yourself dressed up/ready. 'Dame un momento, me estoy arreglando.'", "ex": "¿Ya te arreglaste? Nos tenemos que ir. — Are you ready? We have to go."}, {"es": "recoger", "en": "to pick up / clean up", "desc": "Pick up kids, clean up the house, collect something.", "ex": "Voy a recoger a los niños. — I'm going to pick up the kids."}, {"es": "cocinar", "en": "to cook", "desc": "Cooking. '¿Qué vamos a cocinar?' = What are we going to cook?", "ex": "Hoy me toca cocinar a mí. — Today it's my turn to cook."}, {"es": "limpiar", "en": "to clean", "desc": "Cleaning house or objects. 'Hacer la limpieza' = to do the cleaning.", "ex": "Hay que limpiar la cocina. — We need to clean the kitchen."}, {"es": "descansar", "en": "to rest", "desc": "Resting or relaxing. 'Necesito descansar' = I need to rest.", "ex": "Los domingos me gusta descansar. — On Sundays I like to rest."}, {"es": "encargarse de", "en": "to take care of / handle", "desc": "'Yo me encargo' = I'll handle it. Shows initiative.", "ex": "Yo me encargo de la cena. — I'll take care of dinner."}, {"es": "hacer falta", "en": "to need / to be missing", "desc": "'Hace falta leche' = We need milk. 'Me haces falta' = I miss you / I need you.", "ex": "Hace falta comprar más pan. — We need to buy more bread."}, {"es": "tardar", "en": "to take time / be slow", "desc": "'No tardo' = I won't be long. '¿Cuánto tarda?' = How long does it take?", "ex": "El autobús tarda veinte minutos. — The bus takes twenty minutes."}], "Feelings & Health": [{"es": "feliz", "en": "happy", "desc": "General happiness. 'Ser feliz' = to be a happy person. 'Estar feliz' = to feel happy now.", "ex": "Me siento muy feliz hoy. — I feel very happy today."}, {"es": "enojado/a", "en": "angry / upset", "desc": "Anger. 'Estar enojado con' = to be angry with. 'Enojarse' = to get angry.", "ex": "Está enojada conmigo. — She's angry with me."}, {"es": "preocupado/a", "en": "worried", "desc": "Worry or concern. 'No te preocupes' = Don't worry. Very common phrase.", "ex": "Estoy preocupada por el examen. — I'm worried about the exam."}, {"es": "enfermo/a", "en": "sick / ill", "desc": "Being sick. 'Estar enfermo' = to be sick. 'Enfermarse' = to get sick.", "ex": "Mi hijo está enfermo. — My son is sick."}, {"es": "dolor", "en": "pain / ache", "desc": "Pain. 'Me duele la cabeza' = My head hurts. 'Dolor de estómago' = stomachache.", "ex": "Tengo dolor de garganta. — I have a sore throat."}, {"es": "miedo", "en": "fear", "desc": "Fear. 'Tener miedo' = to be afraid. 'Dar miedo' = to be scary.", "ex": "Me da miedo volar. — Flying scares me."}, {"es": "suerte", "en": "luck", "desc": "Luck. '¡Buena suerte!' = Good luck! 'Tener suerte' = to be lucky.", "ex": "¡Qué suerte! — How lucky!"}, {"es": "tranquilo/a", "en": "calm / don't worry", "desc": "Calm or reassuring. 'Tranquilo/a' alone = Don't worry / Relax.", "ex": "Tranquila, todo va a salir bien. — Don't worry, everything will be fine."}, {"es": "cuidar(se)", "en": "to take care (of yourself)", "desc": "Care. '¡Cuídate!' = Take care! 'Cuidar a los niños' = to take care of the kids.", "ex": "Cuídate mucho. — Take good care of yourself."}, {"es": "mejorar", "en": "to improve / get better", "desc": "Getting better health-wise or improving skills. 'Mejorarse' = to get well.", "ex": "Espero que te mejores pronto. — I hope you get better soon."}], "Numbers & Money": [{"es": "dinero", "en": "money", "desc": "Money in general. \"No tengo dinero\" = I don't have money. 'Ganar dinero' = to earn money.", "ex": "¿Cuánto dinero necesitas? — How much money do you need?"}, {"es": "precio", "en": "price", "desc": "Cost of something. 'Buen precio' = good price. '¿Qué precio tiene?' = What's the price?", "ex": "El precio es muy alto. — The price is very high."}, {"es": "barato/a", "en": "cheap / inexpensive", "desc": "Low price. Not necessarily low quality. 'Más barato' = cheaper.", "ex": "Este restaurante es muy barato. — This restaurant is very cheap."}, {"es": "caro/a", "en": "expensive", "desc": "High price. 'Carísimo' = super expensive. Very useful for shopping.", "ex": "¡Qué caro! No lo puedo creer. — How expensive! I can't believe it."}, {"es": "cuenta", "en": "bill / check / account", "desc": "Restaurant bill, bank account, or social media account. Multi-meaning.", "ex": "La cuenta, por favor. — The check, please."}, {"es": "pagar", "en": "to pay", "desc": "Paying. '¿Cómo quiere pagar?' = How would you like to pay? 'Yo pago' = I'll pay.", "ex": "¿Puedo pagar con tarjeta? — Can I pay with a card?"}, {"es": "gratis", "en": "free (no cost)", "desc": "No charge. 'Es gratis' = It's free. 'Entrada gratis' = free admission.", "ex": "El Wi-Fi es gratis. — The Wi-Fi is free."}, {"es": "gastar", "en": "to spend (money)", "desc": "Spending money. 'Gastar mucho' = to spend a lot. Related to expenses.", "ex": "Gasté demasiado este mes. — I spent too much this month."}], "Weather & Nature": [{"es": "tiempo", "en": "weather / time", "desc": "Both weather AND time. Context makes it clear. '¿Qué tiempo hace?' = What's the weather like?", "ex": "Hace buen tiempo hoy. — The weather is nice today."}, {"es": "calor", "en": "heat / hot", "desc": "'Hacer calor' = to be hot (weather). 'Tener calor' = to feel hot (person).", "ex": "Hace mucho calor hoy. — It's very hot today."}, {"es": "frío", "en": "cold", "desc": "'Hacer frío' = to be cold (weather). 'Tener frío' = to feel cold (person).", "ex": "Tengo frío, ¿me pasas una cobija? — I'm cold, can you pass me a blanket?"}, {"es": "lluvia", "en": "rain", "desc": "Rain. 'Llover' = to rain. 'Está lloviendo' = It's raining.", "ex": "Parece que va a llover. — It looks like it's going to rain."}, {"es": "sol", "en": "sun", "desc": "Sun. 'Hace sol' = It's sunny. 'Tomar el sol' = to sunbathe.", "ex": "¡Qué rico el sol! — The sun feels so nice!"}, {"es": "bonito/a", "en": "beautiful (weather/day)", "desc": "Nice or beautiful. 'Un día bonito' = A beautiful day.", "ex": "Está muy bonito el día. — It's a beautiful day."}], "Body & Health": [{"es": "cabeza", "en": "head", "desc": "Head. 'Dolor de cabeza' = headache. 'Romperse la cabeza' = to rack your brains.", "ex": "Me duele la cabeza. — My head hurts."}, {"es": "estómago", "en": "stomach", "desc": "Stomach. 'Dolor de estómago' = stomachache. Very practical word.", "ex": "Me duele el estómago. — My stomach hurts."}, {"es": "espalda", "en": "back (body)", "desc": "Back of body. 'Dolor de espalda' = backache. Common complaint.", "ex": "Tengo dolor de espalda. — I have back pain."}, {"es": "garganta", "en": "throat", "desc": "Throat. 'Dolor de garganta' = sore throat.", "ex": "Me arde la garganta. — My throat is burning."}, {"es": "fiebre", "en": "fever", "desc": "Fever. 'Tener fiebre' = to have a fever. Important health vocab.", "ex": "El niño tiene fiebre. — The child has a fever."}, {"es": "medicina", "en": "medicine", "desc": "Medicine. 'Tomar medicina' = to take medicine. 'Farmacia' = pharmacy.", "ex": "¿Ya tomaste tu medicina? — Did you take your medicine?"}, {"es": "cita", "en": "appointment", "desc": "Appointment (medical or meeting). Also means 'date' (romantic).", "ex": "Tengo cita con el doctor a las tres. — I have a doctor's appointment at three."}, {"es": "descansar", "en": "to rest", "desc": "Resting and recovering. 'El doctor dijo que descanse.' = The doctor said to rest.", "ex": "Necesitas descansar más. — You need to rest more."}], "Technology & Communication": [{"es": "teléfono", "en": "phone", "desc": "Phone (device). 'Teléfono celular' = cell phone. 'Llamar por teléfono' = to call.", "ex": "Se me perdió el teléfono. — I lost my phone."}, {"es": "mensaje", "en": "message / text", "desc": "Message. 'Mandar un mensaje' = to send a message/text. Very daily word.", "ex": "Te mando un mensaje luego. — I'll text you later."}, {"es": "foto", "en": "photo", "desc": "Photo. 'Sacar/tomar una foto' = to take a photo.", "ex": "¿Nos tomamos una foto? — Shall we take a photo?"}, {"es": "internet", "en": "internet", "desc": "Internet. 'No tengo internet' = I don't have internet. 'WiFi' used universally too.", "ex": "¿Cuál es la contraseña del WiFi? — What's the WiFi password?"}, {"es": "buscar", "en": "to search / look up", "desc": "Searching online or in general. 'Búscalo en Google' = Google it.", "ex": "Voy a buscarlo en internet. — I'm going to look it up online."}, {"es": "compartir", "en": "to share", "desc": "Sharing things, food, content. Very common in social media context too.", "ex": "¿Puedo compartir esto contigo? — Can I share this with you?"}, {"es": "funcionar", "en": "to work / function", "desc": "For machines and plans. 'No funciona' = It doesn't work. Very practical.", "ex": "Mi teléfono no funciona. — My phone isn't working."}, {"es": "cargar", "en": "to charge / to load", "desc": "Charging a phone or loading something. 'Cargar el teléfono' = to charge the phone.", "ex": "Necesito cargar mi teléfono. — I need to charge my phone."}], "Opinions & Describing": [{"es": "parecer", "en": "to seem / to think", "desc": "'Me parece que...' = I think... 'Me parece bien' = Sounds good. Very versatile.", "ex": "Me parece buena idea. — Sounds like a good idea to me."}, {"es": "genial", "en": "great / awesome", "desc": "Universal positive reaction. Works everywhere in the Spanish-speaking world.", "ex": "¡Qué plan tan genial! — What an awesome plan!"}, {"es": "increíble", "en": "incredible / unbelievable", "desc": "Positive or negative depending on context. Strong reaction word.", "ex": "La vista es increíble. — The view is incredible."}, {"es": "valer la pena", "en": "to be worth it", "desc": "'¿Vale la pena?' = Is it worth it? Essential for recommendations.", "ex": "La película vale mucho la pena. — The movie is really worth it."}, {"es": "tener sentido", "en": "to make sense", "desc": "'Tiene sentido' = Makes sense. Great conversational acknowledgment.", "ex": "Ah, ahora tiene sentido. — Ah, now it makes sense."}, {"es": "depender de", "en": "to depend on", "desc": "Hedging opinions naturally. 'Depende de...' = It depends on...", "ex": "Depende del clima. — It depends on the weather."}, {"es": "dar igual", "en": "to not mind", "desc": "Indifference (not rudely). 'Me da igual' = I don't mind either way.", "ex": "Me da igual, lo que tú quieras. — I don't mind, whatever you want."}, {"es": "preferir", "en": "to prefer", "desc": "Preference. 'Prefiero...' = I prefer. Stem-changing: prefiero, prefieres.", "ex": "Prefiero quedarme en casa. — I prefer to stay home."}], "Connecting Words": [{"es": "porque", "en": "because", "desc": "Giving reasons. Different from 'por qué' (why?) — accent matters!", "ex": "No fui porque estaba enferma. — I didn't go because I was sick."}, {"es": "pero", "en": "but", "desc": "Contrast or exception. The most common way to say 'but.' Simple and essential.", "ex": "Quiero ir, pero no puedo. — I want to go, but I can't."}, {"es": "también", "en": "also / too", "desc": "Adding information. 'Yo también' = Me too. 'A mí también' = Me too (with gustar-type verbs).", "ex": "Yo también quiero ir. — I also want to go."}, {"es": "tampoco", "en": "neither / not either", "desc": "Negative 'also.' 'Yo tampoco' = Me neither. Matches 'también' but negative.", "ex": "Yo tampoco entiendo. — I don't understand either."}, {"es": "entonces", "en": "then / so", "desc": "Consequence or sequence. '¿Entonces qué hacemos?' = So what do we do?", "ex": "Entonces, ¿vienes o no? — So, are you coming or not?"}, {"es": "sin embargo", "en": "however / nevertheless", "desc": "Formal contrast. More sophisticated than 'pero.' Good for expressing nuance.", "ex": "Es caro; sin embargo, vale la pena. — It's expensive; however, it's worth it."}, {"es": "además", "en": "besides / also / furthermore", "desc": "Adding another point. 'Además de eso' = Besides that. Strengthens arguments.", "ex": "Además, no tengo tiempo. — Besides, I don't have time."}, {"es": "aunque", "en": "although / even though", "desc": "Concession. 'Aunque llueva' = Even if it rains. Works with indicative or subjunctive.", "ex": "Voy a ir aunque llueva. — I'm going to go even if it rains."}, {"es": "por eso", "en": "that's why / for that reason", "desc": "Cause and effect. Explains why something happened or will happen.", "ex": "Estaba lloviendo, por eso no fui. — It was raining, that's why I didn't go."}, {"es": "así que", "en": "so / therefore", "desc": "Drawing a conclusion. 'Así que...' introduces the result.", "ex": "No hay leche, así que voy al super. — There's no milk, so I'm going to the store."}], "Polite Phrases": [{"es": "por favor", "en": "please", "desc": "The magic word. Always appreciated. 'Porfa' = casual abbreviation.", "ex": "Un café, por favor. — A coffee, please."}, {"es": "gracias", "en": "thank you", "desc": "Thanks. 'Muchas gracias' = Thank you very much. 'Mil gracias' = A thousand thanks.", "ex": "¡Muchas gracias por todo! — Thank you so much for everything!"}, {"es": "de nada", "en": "you're welcome", "desc": "Standard response to thanks. Also: 'No hay de qué' or 'Con gusto' (with pleasure).", "ex": "De nada, fue un placer. — You're welcome, it was a pleasure."}, {"es": "perdón", "en": "sorry / excuse me", "desc": "Apology or getting attention. 'Perdona' (tú) vs 'perdone' (usted).", "ex": "Perdón, ¿me puede repetir? — Sorry, can you repeat that?"}, {"es": "con permiso", "en": "excuse me (passing by)", "desc": "When moving through a crowd or space. Different from 'disculpe' (getting attention).", "ex": "Con permiso, necesito pasar. — Excuse me, I need to get through."}, {"es": "disculpe", "en": "excuse me (attention)", "desc": "Getting someone's attention politely. Formal. 'Disculpa' = informal.", "ex": "Disculpe, ¿sabe dónde queda...? — Excuse me, do you know where...?"}, {"es": "buen provecho", "en": "enjoy your meal", "desc": "Said before eating or to someone who is eating. Like 'bon appétit.' Very common courtesy.", "ex": "¡Buen provecho! — Enjoy your meal!"}, {"es": "salud", "en": "cheers / bless you", "desc": "When toasting drinks OR when someone sneezes. Double duty!", "ex": "¡Salud! — Cheers!"}, {"es": "cuídate", "en": "take care", "desc": "Common way to say goodbye with warmth. 'Cuídense' for plural.", "ex": "Bueno, cuídate mucho. — Well, take care."}, {"es": "nos vemos", "en": "see you", "desc": "Casual goodbye. More natural than 'adiós' in most situations.", "ex": "¡Nos vemos mañana! — See you tomorrow!"}]};
const GRAMMAR = [{"title": "Conversation Starters", "rule": "Don't just say 'Hola.' Real conversations start with: '¿Qué tal?' / '¿Cómo te fue?' / '¡Qué gusto verte!' Follow up with something specific: '¿Cómo estuvo tu fin de semana?' sounds much more natural than '¿Cómo estás?'", "ex": [{"es": "¡Hola! ¿Cómo te fue ayer?", "en": "Hi! How did it go yesterday?"}, {"es": "¡Qué gusto! ¿Cómo has estado?", "en": "Great to see you! How have you been?"}]}, {"title": "Buying Time with Fillers", "rule": "Native speakers use fillers constantly. 'Pues...' 'A ver...' 'O sea...' 'Es que...' — these make you sound natural while you think. Use 'Bueno...' to start any response. 'Mira...' or 'Fíjate que...' to get attention before explaining.", "ex": [{"es": "Pues... la verdad es que no sé.", "en": "Well... the truth is I don't know."}, {"es": "Es que no pude ir, tenía mucho trabajo.", "en": "The thing is I couldn't go, I had a lot of work."}]}, {"title": "Softening Requests", "rule": "The conditional tense is your best friend for politeness. 'Quisiera' > 'Quiero'. '¿Podría...?' > '¿Puede...?' Even adding 'por favor' isn't enough without the right verb form.", "ex": [{"es": "Quisiera hacer una reservación.", "en": "I'd like to make a reservation."}, {"es": "¿Podría hablar más despacio?", "en": "Could you speak more slowly?"}]}, {"title": "Agreeing & Disagreeing", "rule": "Agreement: 'Totalmente' / 'Tienes razón' / 'Estoy de acuerdo' / 'Exacto.' Soft disagreement: 'No estoy tan seguro' / 'Puede ser, pero...' / 'Entiendo tu punto, pero...' Strong: '¡Qué va!' / 'Para nada.'", "ex": [{"es": "Entiendo tu punto, pero creo que hay otra forma de verlo.", "en": "I see your point, but I think there's another way to see it."}, {"es": "¿Tú crees? Yo no estoy tan segura.", "en": "You think so? I'm not so sure."}]}, {"title": "Reacting Naturally", "rule": "Show you're engaged: '¡No me digas!' (No way!) / '¿En serio?' (Seriously?) / '¡Qué loco!' (That's crazy!) / '¡Qué padre!' (How cool! — Mexico) / 'Tiene sentido' (Makes sense). These keep conversation flowing.", "ex": [{"es": "— Me ofrecieron el trabajo. — ¡No me digas! ¡Felicidades!", "en": "— They offered me the job. — No way! Congrats!"}, {"es": "— El vuelo se canceló. — ¡Qué rollo! ¿Y ahora qué vas a hacer?", "en": "— The flight was cancelled. — What a hassle! So what will you do?"}]}, {"title": "Making Plans", "rule": "Use 'ir a + infinitive' for near future, not future tense. 'Voy a salir' > 'Saldré.' For suggestions: '¿Qué te parece si...?' / '¿Por qué no...?' / '¿Y si...?' These invite collaboration.", "ex": [{"es": "¿Qué te parece si vamos al cine?", "en": "How about we go to the movies?"}, {"es": "¿Y si pedimos comida a domicilio?", "en": "What if we order delivery?"}]}, {"title": "Storytelling", "rule": "Set the scene with imperfect: 'Estaba lloviendo... había mucha gente...' Advance with preterite: 'De repente llegó...' Use 'resulta que' for plot twists. End with reactions: '¡No lo podía creer!'", "ex": [{"es": "Estábamos en el restaurante cuando de repente se fue la luz.", "en": "We were at the restaurant when suddenly the power went out."}, {"es": "Resulta que el vuelo salía dos horas antes. ¡Casi no llegamos!", "en": "Turns out the flight left two hours earlier. We almost didn't make it!"}]}, {"title": "Polite Closings", "rule": "Don't just say 'Adiós.' Natural closings: 'Bueno, te dejo' (I'll let you go) / 'Nos vemos' (See you) / 'Hablamos luego' (Talk later) / 'Cuídate mucho' (Take care). Phone: 'Te mando mensaje' (I'll text you).", "ex": [{"es": "Bueno, te dejo que tengo que irme. ¡Hablamos!", "en": "Well, I'll let you go, I gotta run. Talk later!"}, {"es": "Cuídate mucho. Te mando mensaje para lo del viernes.", "en": "Take care. I'll text you about Friday."}]}];

// TTS
let spanishVoice=null;
function initVoices(){const v=speechSynthesis.getVoices();spanishVoice=v.find(x=>x.lang==='es-MX')||v.find(x=>x.lang==='es-ES')||v.find(x=>x.lang.startsWith('es'))||null}
speechSynthesis.onvoiceschanged=initVoices;initVoices();
function speak(t,r=0.9){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='es-ES';u.rate=r;if(spanishVoice)u.voice=spanishVoice;speechSynthesis.speak(u);return u}
function speakBtn(b,t,r){b.classList.add('playing');const u=speak(t,r);u.onend=()=>b.classList.remove('playing');u.onerror=()=>b.classList.remove('playing')}

// STATE
const SK='habla_v2';
let state=loadState();
function defaultState(){return{xp:0,streak:0,hearts:5,lessonsCompleted:[],lastActiveDate:null,activeDays:[],learnedVocab:[],todayXP:0,todayDate:null}}
function loadState(){try{const r=localStorage.getItem(SK);if(!r)return defaultState();const s=JSON.parse(r);
const today=new Date().toDateString();if(s.lastActiveDate){const d=Math.floor((new Date(today)-new Date(s.lastActiveDate))/86400000);if(d>1)s.streak=0}
if(s.todayDate!==today){s.todayXP=0;s.todayDate=today}
return s}catch(e){return defaultState()}}
function saveState(){localStorage.setItem(SK,JSON.stringify(state))}
function updateStreak(){const today=new Date().toDateString();if(state.lastActiveDate!==today){state.streak++;state.lastActiveDate=today;if(!state.activeDays.includes(today))state.activeDays.push(today);if(state.activeDays.length>30)state.activeDays=state.activeDays.slice(-30);state.todayDate=today}}
function refreshUI(){
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v};
  s('nav-streak',state.streak);s('nav-xp',state.xp);s('nav-hearts',state.hearts);
  s('prof-streak',state.streak);s('prof-xp',state.xp);s('prof-lessons',state.lessonsCompleted.length);s('prof-words',state.learnedVocab.length);
  const allV=Object.values(VOCAB).flat();s('vocab-count',allV.length);
  s('vocab-learned-ct',state.learnedVocab.length);s('vocab-total-ct',allV.length);
  const pf=document.getElementById('vocab-prog-fill');if(pf)pf.style.width=(allV.length?state.learnedVocab.length/allV.length*100:0)+'%';
}

// NAV
function switchTab(btn){
  const sc=btn.dataset.screen;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+sc).classList.add('active');
  document.getElementById('mainNav').classList.remove('hidden');document.getElementById('lesson-complete').classList.remove('active');
  if(sc==='learn')renderLearn();if(sc==='vocab')renderVocab();if(sc==='grammar')renderGrammar();if(sc==='profile')renderProfile();refreshUI();
}

// LEARN
function renderLearn(){
  const el=document.getElementById('learn-scroll');
  // Streak banner
  const msgs=['Start your streak today!','Nice! Keep it going!','You\'re on fire!','Incredible dedication!','Unstoppable!'];
  const mi=state.streak===0?0:state.streak<3?1:state.streak<7?2:state.streak<30?3:4;
  let h=`<div class="streak-banner ${state.streak===0?'none':''}"><div class="streak-fire">${state.streak>0?'🔥':'\u2744\ufe0f'}</div><div class="streak-info"><div class="streak-count">${state.streak} Day Streak</div><div class="streak-msg">${msgs[mi]}</div></div></div>`;
  h+='<div class="section-label">Conversational Lessons</div>';
  UNITS.forEach((u,i)=>{
    const done=state.lessonsCompleted.includes(u.id);const prev=i===0||state.lessonsCompleted.includes(UNITS[i-1].id);const locked=!prev&&!done;
    h+=`<div class="unit-card ${done?'completed':locked?'locked':''}" onclick="startLesson('${u.id}')">
      <div class="unit-header"><span class="unit-icon">${u.icon}</span>${done?'<span class="unit-crown">\ud83d\udc51</span>':''}</div>
      <div class="unit-title">${u.title}</div><div class="unit-desc">${u.desc}</div>
      <div class="unit-progress"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${done?100:0}%"></div></div>
      <div class="progress-text">${done?'COMPLETE':locked?'\ud83d\udd12 LOCKED':'START'}</div></div></div>`;
  });
  el.innerHTML=h;
}

// LESSON ENGINE
let curUnit=null,lessonEx=[],exIdx=0,lCorrect=0,lTotal=0,lHearts=5,selAnswer=null,answered=false;
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function startLesson(id){
  const u=UNITS.find(x=>x.id===id);if(!u)return;curUnit=u;
  lessonEx=[{type:'dialogue',data:u.dialogue},...u.exercises.sort(()=>Math.random()-0.5)];
  exIdx=0;lCorrect=0;lTotal=u.exercises.length;lHearts=state.hearts;selAnswer=null;answered=false;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-lesson').classList.add('active');document.getElementById('mainNav').classList.add('hidden');
  document.getElementById('lesson-hearts').textContent=lHearts;renderEx();
}
function exitLesson(){speechSynthesis.cancel();document.getElementById('screen-lesson').classList.remove('active');
  document.getElementById('screen-learn').classList.add('active');document.getElementById('mainNav').classList.remove('hidden');renderLearn();refreshUI()}

function renderEx(){
  if(exIdx>=lessonEx.length||lHearts<=0){showComplete();return}
  const ex=lessonEx[exIdx];const pct=exIdx/lessonEx.length*100;
  document.getElementById('lesson-progress').style.width=pct+'%';
  selAnswer=null;answered=false;
  const fb=document.getElementById('feedback-bar');fb.classList.remove('show','correct','wrong');
  const btn=document.getElementById('check-btn');const C=document.getElementById('lesson-content');

  if(ex.type==='dialogue'){
    btn.className='check-btn ready';btn.textContent='CONTINUE';
    let dh=`<div class="scene-card"><div class="scene-emoji">${curUnit.icon}</div><div class="scene-title">${curUnit.title}</div><div class="scene-desc">Listen to the conversation, tap lines to hear them</div></div><div class="dialogue-container">`;
    ex.data.forEach(l=>{
      dh+=`<div class="dialogue-line ${l.who==='B'?'right':''}"><div class="dialogue-avatar ${l.who.toLowerCase()}">${l.who==='A'?'\ud83e\uddd1':'\ud83d\ude4b'}</div>
        <div class="dialogue-bubble" onclick="speak('${esc(l.es)}',0.85)"><div class="dialogue-es">${l.es}</div><div class="dialogue-en">${l.en}</div></div></div>`;
    });
    dh+='</div>';C.innerHTML=dh;setTimeout(()=>speak(ex.data[0].es,0.85),400);answered=true;return;
  }
  btn.className='check-btn disabled';btn.textContent='CHECK';

  if(ex.type==='listen_mc'){
    C.innerHTML=`<div class="ex-type">\ud83c\udf99\ufe0f Listen & Choose</div>
      <button class="speaker-btn" onclick="speakBtn(this,'${esc(ex.audio)}',0.85)">\ud83d\udd0a</button>
      <div class="ex-prompt">${ex.prompt}</div>
      <div class="mc-options">${ex.options.map((o,i)=>`<button class="mc-option" onclick="selMC(this,${i})"><span class="opt-num">${i+1}</span><span>${o}</span></button>`).join('')}</div>`;
    setTimeout(()=>speak(ex.audio,0.85),300);
  } else if(ex.type==='listen_type'){
    C.innerHTML=`<div class="ex-type">\u270d\ufe0f Listen & Write</div>
      <button class="speaker-btn" onclick="speakBtn(this,'${esc(ex.audio)}',0.85)">\ud83d\udd0a</button>
      <div class="ex-prompt">${ex.prompt}</div>
      <div class="text-input-area"><input class="text-input" id="fill-input" type="text" placeholder="Type what you heard..." autocomplete="off" autocapitalize="off" oninput="onFill()"></div>
      <div style="margin-top:10px"><button class="speaker-btn small" onclick="speakBtn(this,'${esc(ex.audio)}',0.6)">\ud83d\udc22</button><div style="font-size:10px;color:var(--text-mut);text-align:center;margin-top:2px">Slow</div></div>`;
    setTimeout(()=>speak(ex.audio,0.85),300);setTimeout(()=>document.getElementById('fill-input')?.focus(),500);
  } else if(ex.type==='respond'){
    C.innerHTML=`<div class="ex-type">\ud83d\udcac Respond in Spanish</div>
      <div class="scene-card"><div class="scene-desc">${ex.situation}</div></div>
      <div class="text-input-area"><input class="text-input" id="fill-input" type="text" placeholder="Type your response..." autocomplete="off" autocapitalize="off" oninput="onFill()"></div>`;
    setTimeout(()=>document.getElementById('fill-input')?.focus(),200);
  } else if(ex.type==='build'){
    const sh=[...ex.words].sort(()=>Math.random()-0.5);
    C.innerHTML=`<div class="ex-type">\ud83e\udde9 Build the Sentence</div><div class="ex-prompt">${ex.prompt}</div>
      <div class="word-bank-target" id="wb-target"></div>
      <div class="word-bank-pool" id="wb-pool">${sh.map((w,i)=>`<button class="word-chip" data-idx="${i}" data-word="${esc(w)}" onclick="chipTap(this)">${w}</button>`).join('')}</div>`;
  } else if(ex.type==='mc'){
    C.innerHTML=`<div class="ex-type">\u2753 Choose the Answer</div><div class="ex-prompt">${ex.prompt}</div>
      <div class="mc-options">${ex.options.map((o,i)=>`<button class="mc-option" onclick="selMC(this,${i})"><span class="opt-num">${i+1}</span><span>${o}</span></button>`).join('')}</div>`;
  } else if(ex.type==='fill'){
    C.innerHTML=`<div class="ex-type">\u270f\ufe0f Fill in the Blank</div><div class="ex-prompt">${ex.prompt}</div>
      <div class="text-input-area"><input class="text-input" id="fill-input" type="text" placeholder="Type your answer..." autocomplete="off" autocapitalize="off" oninput="onFill()"></div>`;
    setTimeout(()=>document.getElementById('fill-input')?.focus(),200);
  }
}

function chipTap(el){
  if(answered)return;const target=document.getElementById('wb-target');const pool=document.getElementById('wb-pool');
  if(el.classList.contains('in-target')){el.classList.remove('in-target');pool.appendChild(el)}
  else{el.classList.add('in-target');target.appendChild(el)}
  const inT=target.querySelectorAll('.word-chip');
  document.getElementById('check-btn').className=inT.length>0?'check-btn ready':'check-btn disabled';
  selAnswer=[...inT].map(c=>c.dataset.word).join(' ');
}
function selMC(el,idx){if(answered)return;document.querySelectorAll('.mc-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');selAnswer=idx;document.getElementById('check-btn').className='check-btn ready'}
function onFill(){const v=document.getElementById('fill-input')?.value.trim();
  document.getElementById('check-btn').className=v?'check-btn ready':'check-btn disabled';selAnswer=v}

function handleCheck(){
  const btn=document.getElementById('check-btn');if(btn.classList.contains('disabled'))return;
  if(answered&&lessonEx[exIdx].type==='dialogue'){exIdx++;renderEx();return}
  if(!answered){
    answered=true;const ex=lessonEx[exIdx];let ok=false;
    if(ex.type==='mc'||ex.type==='listen_mc'){
      ok=selAnswer===ex.correct;
      document.querySelectorAll('.mc-option').forEach((o,i)=>{o.classList.add('disabled');if(i===ex.correct)o.classList.add('correct');if(i===selAnswer&&!ok)o.classList.add('wrong')});
    } else if(ex.type==='fill'){
      const inp=document.getElementById('fill-input');ok=norm(inp.value)===norm(ex.answer);inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
    } else if(ex.type==='listen_type'){
      const inp=document.getElementById('fill-input');ok=norm(inp.value)===norm(ex.answer);inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
    } else if(ex.type==='respond'){
      const inp=document.getElementById('fill-input');const u=norm(inp.value);ok=u===norm(ex.answer)||(ex.alts||[]).some(a=>norm(a)===u);
      inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
    } else if(ex.type==='build'){ok=norm(selAnswer||'')===norm(ex.answer)}
    if(ok){lCorrect++;showFB(true);btn.className='check-btn continue'}
    else{lHearts--;document.getElementById('lesson-hearts').textContent=lHearts;
      let d=null;if(ex.type==='fill'||ex.type==='listen_type')d='Answer: '+ex.answer;
      else if(ex.type==='respond')d='One answer: '+ex.answer;else if(ex.type==='build')d='Answer: '+ex.answer;
      showFB(false,d);btn.className='check-btn wrong-continue'}
    btn.textContent='CONTINUE';
  } else{exIdx++;renderEx()}
}
function showFB(ok,d){const fb=document.getElementById('feedback-bar');fb.classList.add('show',ok?'correct':'wrong');fb.classList.remove(ok?'wrong':'correct');
  document.getElementById('feedback-text').textContent=ok?'¡Correcto! 🎉':'¡Incorrecto! \ud83d\ude14';document.getElementById('feedback-detail').textContent=d||''}
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim()}

function showComplete(){
  speechSynthesis.cancel();document.getElementById('screen-lesson').classList.remove('active');document.getElementById('mainNav').classList.add('hidden');
  const xp=lCorrect*10+(lHearts>0?5:0);const acc=lTotal>0?Math.round(lCorrect/lTotal*100):0;
  state.xp+=xp;state.todayXP=(state.todayXP||0)+xp;state.hearts=Math.max(lHearts,1);
  if(acc>=60&&curUnit&&!state.lessonsCompleted.includes(curUnit.id))state.lessonsCompleted.push(curUnit.id);
  if(curUnit)curUnit.dialogue.forEach(l=>{if(!state.learnedVocab.includes(l.es))state.learnedVocab.push(l.es)});
  updateStreak();saveState();
  if(typeof syncUI!=='undefined'&&syncUI.isConnected())syncUI.save(getAppState());
  document.getElementById('complete-xp').textContent=xp;document.getElementById('complete-acc').textContent=acc+'%';
  const strs=['Keep practicing!','¡Buen trabajo!','¡Muy bien!','¡Perfecto! Flawless!'];
  document.getElementById('complete-subtitle').textContent=acc===100?strs[3]:acc>=80?strs[2]:acc>=60?strs[1]:strs[0];
  document.getElementById('lesson-complete').classList.add('active');if(acc>=60)spawnConfetti();
}
function finishLesson(){document.getElementById('lesson-complete').classList.remove('active');
  document.getElementById('screen-learn').classList.add('active');document.getElementById('mainNav').classList.remove('hidden');
  state.hearts=Math.min(state.hearts+2,5);saveState();renderLearn();refreshUI()}

// VOCAB TAB
let vCat='all';
function renderVocab(){
  const cats=['all',...Object.keys(VOCAB)];
  document.getElementById('vocab-filter').innerHTML=cats.map(c=>
    `<button class="filter-chip ${c===vCat?'active':''}" onclick="vCat='${c.replace(/'/g,"\\'")}';renderVocab()">${c==='all'?'All':c}</button>`).join('');
  let words=[];if(vCat==='all')Object.values(VOCAB).forEach(a=>words.push(...a));else words=VOCAB[vCat]||[];
  document.getElementById('vocab-list').innerHTML=words.map((w,i)=>{
    const learned=state.learnedVocab.includes(w.es);
    return `<div class="vocab-card ${learned?'learned':''}" id="vc-${i}">
      <div class="vocab-top" onclick="document.getElementById('vc-${i}').classList.toggle('expanded')">
        <div><div class="vocab-es">${w.es} <button class="speaker-btn small" style="display:inline-flex;vertical-align:middle;width:28px;height:28px;font-size:13px;border-width:1px;margin-left:4px" onclick="event.stopPropagation();speakBtn(this,'${w.es.replace(/'/g,"\\'")}',0.85)">\ud83d\udd0a</button></div>
        <div class="vocab-en">${w.en}</div></div>
        <button class="vocab-check ${learned?'done':''}" onclick="event.stopPropagation();toggleVocab('${w.es.replace(/'/g,"\\'")}')">${learned?'\u2713':''}</button>
      </div>
      <div class="vocab-detail"><div class="vocab-desc">${w.desc}</div><div class="vocab-ex">${w.ex}</div></div>
    </div>`}).join('');
  refreshUI();
}
function toggleVocab(es){
  const idx=state.learnedVocab.indexOf(es);
  if(idx>=0)state.learnedVocab.splice(idx,1);else{state.learnedVocab.push(es);playSound('ding')}
  saveState();renderVocab();
}

// Vocab Practice Mode
function startVocabPractice(){
  const allW=Object.values(VOCAB).flat();if(allW.length===0)return;
  const shuffled=[...allW].sort(()=>Math.random()-0.5).slice(0,10);
  curUnit={id:'vocab_practice',title:'Vocab Practice',icon:'🎯',desc:'Practice vocabulary',dialogue:[],
    exercises:shuffled.map(w=>{
      const wrongs=allW.filter(x=>x.en!==w.en).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.en);
      const opts=[...wrongs,w.en].sort(()=>Math.random()-0.5);
      return{type:'listen_mc',audio:w.es,prompt:'What does this mean?',options:opts,correct:opts.indexOf(w.en)};
    })
  };
  lessonEx=[...curUnit.exercises];exIdx=0;lCorrect=0;lTotal=lessonEx.length;lHearts=state.hearts;selAnswer=null;answered=false;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-lesson').classList.add('active');document.getElementById('mainNav').classList.add('hidden');
  document.getElementById('lesson-hearts').textContent=lHearts;renderEx();
}

// PROFILE
function renderProfile(){
  const el=document.getElementById('streak-days');const today=new Date();const dow=today.getDay();
  const dn=['S','M','T','W','T','F','S'];let h='';
  for(let i=0;i<7;i++){const d=new Date(today);d.setDate(d.getDate()-dow+i);const ds=d.toDateString();
    h+=`<div class="streak-day ${state.activeDays.includes(ds)?'active':''} ${ds===today.toDateString()?'today':''}">${dn[i]}</div>`}
  el.innerHTML=h;refreshUI();
}
function resetProgress(){if(confirm('Reset all progress? This cannot be undone.')){localStorage.removeItem(SK);state=defaultState();saveState();renderLearn();renderProfile();refreshUI()}}

// CONFETTI
function spawnConfetti(){const c=document.getElementById('confetti');const cols=['#c60b1e','#ffc400','#ffc400','#c60b1e','#ff9600','#ffdd57'];
  for(let i=0;i<50;i++){const d=document.createElement('div');d.className='confetti';d.style.left=Math.random()*100+'%';d.style.top='-10px';
    d.style.background=cols[Math.floor(Math.random()*cols.length)];d.style.borderRadius=Math.random()>0.5?'50%':'2px';
    d.style.width=(6+Math.random()*8)+'px';d.style.height=(6+Math.random()*8)+'px';
    d.style.animationDelay=(Math.random()*0.5)+'s';d.style.animationDuration=(1+Math.random())+'s';c.appendChild(d)}
  setTimeout(()=>{c.innerHTML=''},3000)}

// ============================================================
// SPACED REPETITION
// ============================================================
function getSRScore(word){const sr=state.spacedRep||{};return sr[word]||{score:0,lastSeen:0,interval:1}}
function updateSR(word,correct){
  if(!state.spacedRep)state.spacedRep={};
  const s=state.spacedRep[word]||{score:0,lastSeen:0,interval:1};
  if(correct){s.score=Math.min(s.score+1,5);s.interval=Math.min(s.interval*2,30)}
  else{s.score=Math.max(s.score-1,0);s.interval=1}
  s.lastSeen=Date.now();state.spacedRep[word]=s;
}
function getWeakWords(n){
  const allW=Object.values(VOCAB).flat();
  return allW.sort((a,b)=>{
    const sa=getSRScore(a.es),sb=getSRScore(b.es);
    const na=sa.score-(Date.now()-sa.lastSeen)/86400000;
    const nb=sb.score-(Date.now()-sb.lastSeen)/86400000;
    return na-nb;
  }).slice(0,n);
}

// ============================================================
// MISTAKE BANK
// ============================================================
function addMistake(q,wrong,right){
  if(!state.mistakes)state.mistakes=[];
  const existing=state.mistakes.find(m=>m.q===q);
  if(existing){existing.count++;existing.wrong=wrong}
  else state.mistakes.push({q,wrong,right,count:1});
  if(state.mistakes.length>50)state.mistakes=state.mistakes.slice(-50);
}

// DAILY GOAL
// ============================================================
const DAILY_GOAL=50;
function getDailyXP(){
  const today=new Date().toDateString();
  if(state.todayDate!==today){state.todayXP=0;state.todayDate=today;saveState()}
  return state.todayXP||0;
}
function renderGoalRing(){
  const xp=getDailyXP();const pct=Math.min(xp/DAILY_GOAL,1);const done=pct>=1;
  const r=52,c=2*Math.PI*r,offset=c*(1-pct);
  const color=done?'var(--green)':pct>0.5?'var(--gold)':'var(--text-mut)';
  return `<div class="goal-ring-container"><svg class="goal-ring-svg" viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 0.5s"/>
    <text x="60" y="55" text-anchor="middle" class="goal-inner" fill="${color}">${xp}</text>
    <text x="60" y="72" text-anchor="middle" class="goal-label">/ ${DAILY_GOAL} XP</text>
  </svg><div class="goal-ring-text">${done?'🎉 Daily goal reached!':'Daily Goal'}</div></div>`;
}

function startSpeedRound(){

  Object.values(VOCAB).forEach(arr=>arr.forEach(w=>{
    const wrongs=Object.values(VOCAB).flat().filter(x=>x.en!==w.en).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.en);
    allQ.push({q:w.es,correct:w.en,opts:[...wrongs,w.en].sort(()=>Math.random()-0.5)});
  }));
  let pool=[...allQ].sort(()=>Math.random()-0.5);let qi=0;

  function render(){
    if(qi>=pool.length){pool=[...allQ].sort(()=>Math.random()-0.5);qi=0}
    const q=pool[qi];
    const pct=timeLeft/60*100;const tcls=pct>50?'green':pct>20?'yellow':'red';
    document.getElementById('game-header-info').textContent='⚡ Speed Round';
    document.getElementById('game-header-score').textContent='✓ '+score;

        `<button class="mc-option" onclick="speedAnswer(this,'${o.replace(/'/g,"\\'")}','${q.correct.replace(/'/g,"\\'")}')"><span class="opt-num">${i+1}</span><span>${o}</span></button>`
      ).join('')}</div>`;
  }

  window.speedAnswer=function(el,sel,correct){
    total++;
    document.querySelectorAll('.mc-option').forEach(o=>o.classList.add('disabled'));
    if(sel===correct){score++;el.classList.add('correct');updateSR(pool[qi].q,true)}
    else{el.classList.add('wrong');
      document.querySelectorAll('.mc-option').forEach(o=>{if(o.textContent.slice(1)===correct)o.classList.add('correct')});
      addMistake(pool[qi].q,sel,correct);updateSR(pool[qi].q,false);
    }
    qi++;setTimeout(render,400);
  };

  render();
  gameTimer=setInterval(()=>{
    timeLeft--;
    const pct=timeLeft/60*100;const tcls=pct>50?'green':pct>20?'yellow':'red';
    const timerEl=document.querySelector('.timer-text');if(timerEl){timerEl.textContent=timeLeft+'s';timerEl.style.color=pct>20?'var(--text)':'var(--red)'}
    const barEl=document.querySelector('.timer-fill');if(barEl){barEl.style.width=pct+'%';barEl.className='timer-fill '+tcls}

function startMemoryMatch(){
  enterGame();
  const words=getWeakWords(6);
  const pairs=[];
  words.forEach(w=>{pairs.push({id:w.es+'_es',text:w.es,match:w.es,lang:'es'});pairs.push({id:w.es+'_en',text:w.en,match:w.es,lang:'en'})});
  const cards=[...pairs].sort(()=>Math.random()-0.5);
  let flipped=[],matched=new Set(),moves=0,startTime=Date.now();

  document.getElementById('game-header-info').textContent='🧠 Memory Match';
  document.getElementById('game-header-score').textContent='';

  function render(){
    document.getElementById('game-content').innerHTML=`
      <div class="match-grid g4x3">${cards.map((c,i)=>
        `<div class="match-card ${matched.has(c.match)?'matched':flipped.includes(i)?'face-up':'face-down'}" onclick="matchFlip(${i})" data-idx="${i}">${matched.has(c.match)||flipped.includes(i)?c.text:''}</div>`
      ).join('')}</div>
      <div class="match-moves">Moves: ${moves} | Pairs: ${matched.size}/${words.length}</div>`;
  }

  window.matchFlip=function(idx){
    if(flipped.length>=2||flipped.includes(idx)||matched.has(cards[idx].match))return;
    flipped.push(idx);moves++;render();
    if(flipped.length===2){
      const a=cards[flipped[0]],b=cards[flipped[1]];
      if(a.match===b.match&&a.lang!==b.lang){
        matched.add(a.match);updateSR(a.match,true);
        setTimeout(()=>{flipped=[];render();
          if(matched.size===words.length){
            const elapsed=Math.round((Date.now()-startTime)/1000);
            const xp=words.length*5+Math.max(0,60-elapsed);
            state.xp+=xp;state.todayXP=(state.todayXP||0)+xp;
            if(!state.bestMatchTime||elapsed<state.bestMatchTime)state.bestMatchTime=elapsed;
            updateStreak();saveState();if(typeof syncUI!=='undefined'&&syncUI.isConnected())syncUI.save(getAppState());
            document.getElementById('game-content').innerHTML=`<div class="game-results"><div class="game-results-icon">🧠</div>
              <div class="game-results-title">All Matched!</div><div class="game-results-sub">Memory Match Complete</div>
              <div class="game-results-stats"><div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--green)">${elapsed}s</div><div class="game-results-stat-label">Time</div></div>
              <div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--gold)">${xp}</div><div class="game-results-stat-label">XP</div></div>
              <div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--text-sec)">${moves}</div><div class="game-results-stat-label">Moves</div></div></div>
              <button class="complete-btn" onclick="exitGame()">CONTINUE</button></div>`;
            spawnConfetti();
          }
        },300);
      } else {
        setTimeout(()=>{
          document.querySelectorAll('.match-card').forEach(c=>{if(flipped.includes(parseInt(c.dataset.idx)))c.classList.add('wrong')});
          setTimeout(()=>{flipped=[];render()},600);
        },500);
      }
    }
  };
  render();
}

function startConjDrill(){
  enterGame();

  function nextQ(){
    const cd=CONJ_DATA[Math.floor(Math.random()*CONJ_DATA.length)];
    const pronoun=pronouns[Math.floor(Math.random()*pronouns.length)];
    const correct=cd.forms[pronoun];
    // Generate wrong options from same verb different pronouns + other verbs
    const wrongs=new Set();
    Object.values(cd.forms).forEach(f=>{if(f!==correct)wrongs.add(f)});
    CONJ_DATA.forEach(d=>{if(d.verb!==cd.verb||d.tense!==cd.tense)Object.values(d.forms).forEach(f=>wrongs.add(f))});
    const wrongArr=[...wrongs].filter(w=>w!==correct).sort(()=>Math.random()-0.5).slice(0,3);
    const opts=[...wrongArr,correct].sort(()=>Math.random()-0.5);

    else{el.classList.add('wrong');addMistake(window._conjQ.pronoun+' '+window._conjQ.verb+' ('+window._conjQ.tense+')',sel,correct)}
    setTimeout(render,400);
  };

  render();
  gameTimer=setInterval(()=>{
    timeLeft--;
    const pct=timeLeft/60*100;const tcls=pct>50?'green':pct>20?'yellow':'red';
    const timerEl=document.querySelector('.timer-text');if(timerEl){timerEl.textContent=timeLeft+'s';timerEl.style.color=pct>20?'var(--text)':'var(--red)'}
    const barEl=document.querySelector('.timer-fill');if(barEl){barEl.style.width=pct+'%';barEl.className='timer-fill '+tcls}
    if(timeLeft<=0){
      clearInterval(gameTimer);
      const xp=score*5;state.xp+=xp;state.todayXP=(state.todayXP||0)+xp;
      if(!state.bestConj||score>state.bestConj)state.bestConj=score;
      updateStreak();saveState();if(typeof syncUI!=='undefined'&&syncUI.isConnected())syncUI.save(getAppState());

    document.getElementById('game-feedback').classList.remove('show','correct','wrong');
    window._mistakeAnswered=false;
    setTimeout(()=>document.getElementById('fill-input')?.focus(),200);

  window.onMistakeFill=function(){
    const v=document.getElementById('fill-input')?.value.trim();

  window.gameCheck=function(){
    const btn=document.getElementById('game-check-btn');if(btn.classList.contains('disabled'))return;
    if(!window._mistakeAnswered){
      window._mistakeAnswered=true;
      const inp=document.getElementById('fill-input');

      inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
      if(ok){score++;updateSR(questions[qi].q,true)}else{updateSR(questions[qi].q,false)}
      const fb=document.getElementById('game-feedback');fb.classList.add('show',ok?'correct':'wrong');fb.classList.remove(ok?'wrong':'correct');

      btn.textContent='CONTINUE';btn.className='check-btn '+(ok?'continue':'wrong-continue');
    } else {qi++;render()}
  };
  render();
}

// Patch handleCheck to track mistakes
const _origHandleCheck=handleCheck;
handleCheck=function(){
  const btn=document.getElementById('check-btn');if(btn.classList.contains('disabled'))return;
  if(answered&&lessonEx[exIdx].type==='dialogue'){exIdx++;renderEx();return}
  if(!answered){
    answered=true;const ex=lessonEx[exIdx];let ok=false;let userAns='';
    if(ex.type==='mc'||ex.type==='listen_mc'){
      ok=selAnswer===ex.correct;userAns=ex.options[selAnswer]||'';
      document.querySelectorAll('.mc-option').forEach((o,i)=>{o.classList.add('disabled');if(i===ex.correct)o.classList.add('correct');if(i===selAnswer&&!ok)o.classList.add('wrong')});
      if(!ok)addMistake(ex.prompt||ex.audio||'Question',userAns,ex.options[ex.correct]);
    } else if(ex.type==='fill'){
      const inp=document.getElementById('fill-input');ok=norm(inp.value)===norm(ex.answer);userAns=inp.value;
      inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
      if(!ok)addMistake(ex.prompt,userAns,ex.answer);
    } else if(ex.type==='listen_type'){
      const inp=document.getElementById('fill-input');ok=norm(inp.value)===norm(ex.answer);userAns=inp.value;
      inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
      if(!ok)addMistake('Listen: '+ex.audio,userAns,ex.answer);
    } else if(ex.type==='respond'){
      const inp=document.getElementById('fill-input');const u=norm(inp.value);ok=u===norm(ex.answer)||(ex.alts||[]).some(a=>norm(a)===u);userAns=inp.value;
      inp.classList.add(ok?'correct':'wrong');inp.readOnly=true;
      if(!ok)addMistake(ex.situation,userAns,ex.answer);
    } else if(ex.type==='build'){ok=norm(selAnswer||'')===norm(ex.answer);if(!ok)addMistake(ex.prompt,selAnswer||'',ex.answer)}
    if(ok){lCorrect++;showFB(true);btn.className='check-btn continue'}
    else{lHearts--;document.getElementById('lesson-hearts').textContent=lHearts;
      let d=null;if(ex.type==='fill'||ex.type==='listen_type')d='Answer: '+ex.answer;
      else if(ex.type==='respond')d='One answer: '+ex.answer;else if(ex.type==='build')d='Answer: '+ex.answer;
      showFB(false,d);btn.className='check-btn wrong-continue'}
    btn.textContent='CONTINUE';saveState();
  } else{exIdx++;renderEx()}
};

const SFX={
  correct:'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGFOYQAAAAAkAAAA',
  wrong:'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGFOYQAAAAAkAAAA',
};
function playSound(name){
  // Use Web Audio API for short sounds
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    gain.gain.value=0.15;
    if(name==='correct'){osc.frequency.value=880;osc.type='sine';gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.15);osc.start();osc.stop(ctx.currentTime+0.15)}
    else if(name==='wrong'){osc.frequency.value=220;osc.type='sawtooth';gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.25);osc.start();osc.stop(ctx.currentTime+0.25)}
    else if(name==='ding'){osc.frequency.value=1200;osc.type='sine';gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.1);osc.start();osc.stop(ctx.currentTime+0.1)}
    else if(name==='complete'){osc.frequency.value=523;osc.type='sine';gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.4);osc.start();
      setTimeout(()=>{const o2=ctx.createOscillator();const g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);g2.gain.value=0.15;o2.frequency.value=659;o2.type='sine';g2.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.3);o2.start();o2.stop(ctx.currentTime+0.3)},150);
      setTimeout(()=>{const o3=ctx.createOscillator();const g3=ctx.createGain();o3.connect(g3);g3.connect(ctx.destination);g3.gain.value=0.15;o3.frequency.value=784;o3.type='sine';g3.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.4);o3.start();o3.stop(ctx.currentTime+0.4)},300);
    }
    else if(name==='tick'){osc.frequency.value=600;osc.type='sine';gain.gain.value=0.05;gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.05);osc.start();osc.stop(ctx.currentTime+0.05)}
    else if(name==='whoosh'){const buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const s=ctx.createBufferSource();s.buffer=buf;const g=ctx.createGain();g.gain.value=0.1;s.connect(g);g.connect(ctx.destination);s.start()}
  }catch(e){}
}

// ============================================================
function getDailyChallenge(){
  // Seed based on date so everyone gets the same one
  const today=new Date();const seed=today.getFullYear()*10000+today.getMonth()*100+today.getDate();
  const challenges=[
    {type:'speed',title:'Speed Demon',desc:'Score 15+ in Speed Round',icon:'⚡',check:()=>(state.bestSpeed||0)>=15,xpBonus:25},
    {type:'conj',title:'Verb Master',desc:'Score 12+ in Conjugation Drill',icon:'🎯',check:()=>(state.bestConj||0)>=12,xpBonus:25},
    {type:'match',title:'Quick Memory',desc:'Complete Memory Match under 90s',icon:'🧠',check:()=>(state.bestMatchTime||999)<90,xpBonus:25},
    {type:'vocab',title:'Word Learner',desc:'Mark 5 vocab words as learned today',icon:'📝',check:()=>{const t=new Date().toDateString();return(state.vocabLearnedToday||[]).filter(d=>d===t).length>=5},xpBonus:20},
    {type:'lesson',title:'Lesson Streak',desc:'Complete any 2 lessons today',icon:'📚',check:()=>(state.todayLessons||0)>=2,xpBonus:30},
    {type:'perfect',title:'Perfectionist',desc:'Get 100% on any lesson',icon:'💯',check:()=>state.todayPerfect===true,xpBonus:35},
    {type:'speak',title:'Speak Up',desc:'Complete a Listen & Speak session',icon:'🎙️',check:()=>state.todaySpoke===true,xpBonus:20},
  ];
  return challenges[seed%challenges.length];
}

function renderDailyChallenge(){
  const ch=getDailyChallenge();
  const today=new Date().toDateString();
  const done=state.dailyChallengeDate===today&&state.dailyChallengeComplete;
  return `<div class="daily-card ${done?'completed-daily':''}" onclick="${done?'':'startDailyChallenge()'}">
    <div class="daily-icon">${done?'✅':ch.icon}</div>
    <div class="daily-title">${done?'Challenge Complete!':'Daily Challenge'}</div>
    <div class="daily-desc">${ch.desc}</div>
    <div class="daily-reward">${done?'Bonus XP Earned! 🎉':'🎁 +'+ch.xpBonus+' bonus XP'}</div></div>`;
}

function checkDailyChallenge(){
  const ch=getDailyChallenge();const today=new Date().toDateString();
  if(state.dailyChallengeDate===today&&state.dailyChallengeComplete)return;
  if(ch.check()){
    state.dailyChallengeDate=today;state.dailyChallengeComplete=true;
    state.xp+=ch.xpBonus;state.todayXP=(state.todayXP||0)+ch.xpBonus;
    saveState();playSound('complete');
  }
}

function startDailyChallenge(){
  const ch=getDailyChallenge();
  if(ch.type==='speed')startSpeedRound();
  else if(ch.type==='conj')startConjDrill();
  else if(ch.type==='match')startMemoryMatch();
  else if(ch.type==='speak')startListenSpeak();
  else{/* For lesson/vocab/perfect types, just navigate */
    if(ch.type==='lesson'||ch.type==='perfect'){document.querySelector('[data-screen="learn"]').click()}
    else if(ch.type==='vocab'){document.querySelector('[data-screen="vocab"]').click()}
  }
}

let storyState={storyIdx:0,sceneIdx:0,score:0,total:0};

function startStory(id){
  const story=STORIES.find(s=>s.id===id);if(!story)return;
  enterGame();storyState={storyIdx:STORIES.indexOf(story),sceneIdx:0,score:0,total:story.scenes.length};
  document.getElementById('game-header-info').textContent='📖 '+story.title;
  document.getElementById('game-header-score').textContent='';
  document.getElementById('game-bottom').style.display='none';
  renderStoryScene();
}

function renderStoryScene(){
  const story=STORIES[storyState.storyIdx];
  if(storyState.sceneIdx>=story.scenes.length){
    // Story complete
    const xp=storyState.score*8+5;state.xp+=xp;state.todayXP=(state.todayXP||0)+xp;
    if(!state.storiesCompleted)state.storiesCompleted=[];
    if(!state.storiesCompleted.includes(story.id))state.storiesCompleted.push(story.id);
    updateStreak();saveState();checkDailyChallenge();playSound('complete');
    if(typeof syncUI!=='undefined'&&syncUI.isConnected())syncUI.save(getAppState());
    document.getElementById('game-content').innerHTML=`<div class="game-results"><div class="game-results-icon">📖</div>
      <div class="game-results-title">Story Complete!</div><div class="game-results-sub">${story.title}</div>
      <div class="game-results-stats"><div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--green)">${storyState.score}/${storyState.total}</div><div class="game-results-stat-label">Correct</div></div>
      <div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--gold)">${xp}</div><div class="game-results-stat-label">XP</div></div></div>
      <button class="complete-btn" onclick="exitGame()">CONTINUE</button></div>`;
    spawnConfetti();return;
  }
  const scene=story.scenes[storyState.sceneIdx];

function renderRPTurn(){

window.rpChoose=function(idx){

function startListenSpeak(){
  enterGame();
  speakState.phrases=[...SPEAK_PHRASES].sort(()=>Math.random()-0.5).slice(0,10);
  speakState.idx=0;speakState.score=0;speakState.total=speakState.phrases.length;

    return;
  }

}

function renderSpeakExercise(){
  if(speakState.idx>=speakState.total){
    const xp=speakState.score*8+5;state.xp+=xp;state.todayXP=(state.todayXP||0)+xp;
    state.todaySpoke=true;updateStreak();saveState();checkDailyChallenge();playSound('complete');
    if(typeof syncUI!=='undefined'&&syncUI.isConnected())syncUI.save(getAppState());
    document.getElementById('game-content').innerHTML=`<div class="game-results"><div class="game-results-icon">🎙️</div>
      <div class="game-results-title">Speaking Practice Complete!</div><div class="game-results-sub">Great pronunciation work!</div>
      <div class="game-results-stats"><div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--green)">${speakState.score}/${speakState.total}</div><div class="game-results-stat-label">Good</div></div>
      <div class="game-results-stat"><div class="game-results-stat-val" style="color:var(--gold)">${xp}</div><div class="game-results-stat-label">XP</div></div></div>
      <button class="complete-btn" onclick="exitGame()">CONTINUE</button></div>`;
    if(speakState.score>=speakState.total*0.7)spawnConfetti();return;
  }
  const p=speakState.phrases[speakState.idx];
  document.getElementById('game-header-score').textContent=`${speakState.idx+1}/${speakState.total}`;
  document.getElementById('game-content').innerHTML=`
    <div class="ex-type">🎙️ Listen, then repeat</div>
    <button class="speaker-btn" onclick="speakBtn(this,'${esc(p.es)}',0.8)">🔊</button>
    <div class="speak-target"><div class="speak-target-es">${p.es}</div><div class="speak-target-en">${p.en}</div></div>
    <button class="mic-btn" id="mic-btn" onclick="startRecording()">🎤</button>
    <div class="speak-tip">Tap the microphone and say the phrase</div>
    <div id="speak-result-area"></div>`;
  setTimeout(()=>speak(p.es,0.8),300);
}

function startRecording(){
  if(!SpeechRecog)return;
  const mic=document.getElementById('mic-btn');
  if(mic.classList.contains('recording'))return;
  mic.classList.add('recording');
  const recog=new SpeechRecog();
  recog.lang='es-ES';recog.continuous=false;recog.interimResults=false;recog.maxAlternatives=3;
  recog.onresult=function(e){
    mic.classList.remove('recording');
    const results=[...e.results[0]].map(r=>r.transcript.toLowerCase());
    const target=speakState.phrases[speakState.idx].es.toLowerCase();
    const targetNorm=norm(target);
    // Score: check similarity
    let bestScore=0;let bestHeard='';
    results.forEach(r=>{
      const rNorm=norm(r);
      // Simple word overlap scoring
      const tWords=targetNorm.split(' ');const rWords=rNorm.split(' ');
      let matches=0;tWords.forEach(tw=>{if(rWords.includes(tw))matches++});
      const score=tWords.length>0?matches/tWords.length:0;
      if(score>bestScore){bestScore=score;bestHeard=r}
    });
    showSpeakResult(bestHeard,bestScore);
  };
  recog.onerror=function(e){
    mic.classList.remove('recording');
    document.getElementById('speak-result-area').innerHTML=`<div class="speak-result poor">Couldn't hear you. Try again!</div>
      <button class="mic-btn" onclick="startRecording()" style="margin-top:12px">🎤</button>`;
  };
  recog.onend=function(){mic.classList.remove('recording')};
  recog.start();
}

function showSpeakResult(heard,score){
  let cls,msg;
  if(score>=0.8){cls='good';msg='Great pronunciation! 🎉';speakState.score++;playSound('correct')}
  else if(score>=0.5){cls='partial';msg='Pretty close! Keep practicing.';speakState.score++;playSound('ding')}
  else{cls='poor';msg='Try again — listen carefully first.';playSound('wrong')}
  const area=document.getElementById('speak-result-area');
  area.innerHTML=`<div class="speak-heard">You said: "${heard||'(nothing detected)'}"</div>
    <div class="speak-result ${cls}">${msg} (${Math.round(score*100)}% match)</div>
    <button class="complete-btn" style="margin-top:16px;padding:12px 32px;font-size:14px" onclick="speakState.idx++;renderSpeakExercise()">Next →</button>`;
}

// GRAMMAR LESSON ENGINE
// ============================================================
let gramLessonState = {lessonIdx:0, phase:'explain', exIdx:0, correct:0, total:0};

function startGrammarLesson(id) {
  const gl = GRAMMAR_LESSONS.find(g => g.id === id);
  if (!gl) return;
  gramLessonState = {lessonIdx: GRAMMAR_LESSONS.indexOf(gl), phase:'explain', exIdx:0, correct:0, total:gl.exercises.length};

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-lesson').classList.add('active');
  document.getElementById('mainNav').classList.add('hidden');
  lHearts = state.hearts;
  document.getElementById('lesson-hearts').textContent = lHearts;
  document.getElementById('lesson-progress').style.width = '0%';

  renderGramExplain();
}

function renderGramExplain() {
  const gl = GRAMMAR_LESSONS[gramLessonState.lessonIdx];
  const C = document.getElementById('lesson-content');
  let h = gl.explanation;

  // Add conjugation tables
  gl.tables.forEach(t => {
    h += '<div class="conj-table-wrap"><div style="font-size:13px;font-weight:800;color:var(--text-sec);margin-bottom:6px">' + t.title + '</div>';
    h += '<table class="conj-tbl"><tr>';
    t.cols.forEach(c => { h += '<th>' + c + '</th>'; });
    h += '</tr>';
    t.rows.forEach(r => {
      h += '<tr>';
      r.forEach((cell, i) => {
        const cls = i > 0 ? (cell.includes('⚡') ? 'irregular' : 'verb-form') : '';
        h += '<td class="' + cls + '">' + cell.replace(' ⚡','') + '</td>';
      });
      h += '</tr>';
    });
    h += '</table></div>';
  });

  h += '<button class="start-practice-btn" onclick="startGramPractice()">📝 Start Practice (' + gl.exercises.length + ' questions)</button>';

  C.innerHTML = h;

  // Set up the check button for scrolling
  const btn = document.getElementById('check-btn');
  btn.className = 'check-btn ready';
  btn.textContent = 'START PRACTICE →';
  btn.onclick = function() { startGramPractice(); };
  document.getElementById('feedback-bar').classList.remove('show','correct','wrong');
}

function startGramPractice() {
  gramLessonState.phase = 'practice';
  gramLessonState.exIdx = 0;
  gramLessonState.correct = 0;
  answered = false;
  selAnswer = null;

  // Reuse the lesson engine
  const gl = GRAMMAR_LESSONS[gramLessonState.lessonIdx];
  curUnit = {id: gl.id, title: gl.title, icon: gl.icon, desc: gl.desc, dialogue: [], exercises: gl.exercises};
  lessonEx = [...gl.exercises];
  exIdx = 0;
  lCorrect = 0;
  lTotal = gl.exercises.length;

  // Restore check button
  const btn = document.getElementById('check-btn');
  btn.onclick = function() { handleCheck(); };

  renderEx();
}

renderLearn = function() {
  _prevRenderLearn();

      document.getElementById('grammar-section-anchor').scrollIntoView({behavior:'smooth'});

  // Add grammar section at bottom

  h += '<div class="section-label" style="margin-top:32px;padding-top:16px;border-top:1px solid var(--border)">📖 Grammar Lessons</div>';

  h += '<div class="section-nav">';

  h += '<button class="section-pill" onclick="filterGrammar(\'tense\',this)">Tenses</button>';
  h += '<button class="section-pill" onclick="filterGrammar(\'grammar\',this)">Grammar</button>';
  h += '<button class="section-pill" onclick="filterGrammar(\'irreg\',this)">Irregular</button>';
  h += '</div>';

  h += '<div id="grammar-lesson-list">';
  GRAMMAR_LESSONS.forEach((gl, i) => {
    const done = (state.grammarCompleted || []).includes(gl.id);
    h += '<div class="grammar-lesson-card ' + (done ? 'gl-completed' : '') + '" data-gl-type="' + gl.iconCls + '" onclick="startGrammarLesson(\'' + gl.id + '\')">';
    h += '<div class="gl-header"><div class="gl-icon ' + gl.iconCls + '">' + gl.icon + '</div>';
    h += '<div class="gl-info"><div class="gl-title">' + gl.title + '</div><div class="gl-desc">' + gl.desc + '</div></div>';
    h += (done ? '<div class="gl-crown">👑</div>' : '') + '</div></div>';
  });
  h += '</div>';

  el.innerHTML += h;
};

// Grammar filter
window.filterGrammar = function(type, btn) {
  document.querySelectorAll('.section-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.grammar-lesson-card').forEach(c => {
    if (type === 'all') c.style.display = '';
    else c.style.display = c.dataset.glType === type ? '' : 'none';
  });
};

// Patch showComplete to track grammar lesson completion
const _prevShowComplete2 = showComplete;
showComplete = function() {
  // Check if this was a grammar lesson
  if (curUnit && GRAMMAR_LESSONS.find(g => g.id === curUnit.id)) {
    const acc = lTotal > 0 ? Math.round(lCorrect / lTotal * 100) : 0;
    if (acc >= 60) {
      if (!state.grammarCompleted) state.grammarCompleted = [];
      if (!state.grammarCompleted.includes(curUnit.id)) state.grammarCompleted.push(curUnit.id);
    }
  }
  _prevShowComplete2();
};

.gram-explain .gram-highlight strong{color:var(--text)}

/* Conjugation table */
.conj-table-wrap{width:100%;max-width:540px;overflow-x:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.conj-tbl{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:var(--rad-sm);overflow:hidden}
.conj-tbl th{background:var(--primary);color:#fff;padding:10px 14px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;text-align:left}
.conj-tbl td{padding:10px 14px;font-size:14px;border-top:1px solid var(--border);background:var(--bg-card)}
.conj-tbl tr:nth-child(even) td{background:var(--bg-surface)}
.conj-tbl td:first-child{font-weight:700;color:var(--text-sec);width:100px}
.conj-tbl td.verb-form{font-weight:800;color:var(--text)}
.conj-tbl td.irregular{color:var(--accent);font-weight:800}
.conj-tbl .stem-change{color:var(--primary);font-weight:800}

/* Start practice button in grammar lesson */
.start-practice-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--rad-sm);padding:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;width:100%;max-width:540px;box-shadow:0 3px 0 var(--primary-dark);text-transform:uppercase;margin-top:8px}
.start-practice-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--primary-dark)}

/* Section nav pills */
.section-nav{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.section-pill{background:var(--bg-card);border:1.5px solid var(--border);border-radius:20px;padding:8px 16px;font-size:12px;font-weight:700;color:var(--text-sec);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.section-pill.active{background:var(--primary);border-color:var(--primary);color:#fff}

</style>


<div class="sync-overlay" id="sync-overlay" onclick="if(event.target===this)syncUI.closeModal()">
  <div class="sync-modal" id="sync-modal-content"></div>
</div>

<script>
const syncUI=(()=>{
  const DB_URL='https://languageapps-da8a8-default-rtdb.firebaseio.com';
  let appId='',pin='',lastSync=null,ready=false;

  function init(id){
    appId=id;
    pin=localStorage.getItem('sync_pin_'+appId)||'';
    lastSync=localStorage.getItem('sync_last_'+appId)||null;
    ready=true;updateFab();
  }

  function updateFab(){
    const f=document.getElementById('sync-fab');if(!f)return;
    if(pin){f.classList.add('connected');f.title='Synced: '+pin}
    else{f.classList.remove('connected');f.title='Set up Cloud Sync'}
  }

  function isConnected(){return ready&&pin!==''}

  async function save(obj){
    if(!isConnected())return false;
    try{
      const f=document.getElementById('sync-fab');f.classList.add('syncing');
      const payload={data:obj,updatedAt:new Date().toISOString(),app:appId};
      const res=await fetch(DB_URL+'/users/'+encodeURIComponent(pin)+'/'+encodeURIComponent(appId)+'.json',{
        method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)
      });
      if(!res.ok)throw new Error('HTTP '+res.status);
      lastSync=new Date().toISOString();localStorage.setItem('sync_last_'+appId,lastSync);
      f.classList.remove('syncing');return true;
    }catch(e){console.error('Sync save:',e);document.getElementById('sync-fab').classList.remove('syncing');return false}
  }

  async function load(){
    if(!isConnected())return null;
    try{
      const f=document.getElementById('sync-fab');f.classList.add('syncing');
      const res=await fetch(DB_URL+'/users/'+encodeURIComponent(pin)+'/'+encodeURIComponent(appId)+'.json');
      if(!res.ok)throw new Error('HTTP '+res.status);
      const val=await res.json();f.classList.remove('syncing');
      if(val&&val.data){lastSync=val.updatedAt||null;localStorage.setItem('sync_last_'+appId,lastSync||'');return val.data}
      return null;
    }catch(e){console.error('Sync load:',e);document.getElementById('sync-fab').classList.remove('syncing');return null}
  }

  function openModal(){document.getElementById('sync-overlay').classList.add('open');renderModal()}
  function closeModal(){document.getElementById('sync-overlay').classList.remove('open')}

  function renderModal(){
    const el=document.getElementById('sync-modal-content');
    if(pin){
      const ls=lastSync?new Date(lastSync).toLocaleString():'Never';
      el.innerHTML=`<h3>☁ Cloud Sync</h3>
        <div class="sync-sub">Connected as:</div>
        <div class="sync-pin-display">${pin}</div>
        <div class="sync-last-sync">Last sync: ${ls}</div>
        <div style="height:16px"></div>
        <div class="sync-btn-row"><button class="sync-btn secondary" onclick="syncUI.closeModal()">Close</button><button class="sync-btn primary" onclick="syncUI.doSync()">↻ Sync Now</button></div>
        <div class="sync-btn-row"><button class="sync-btn primary" style="background:var(--blue)" onclick="syncUI.doPull()">↓ Pull from Cloud</button><button class="sync-btn primary" onclick="syncUI.doPush()">↑ Push to Cloud</button></div>
        <div class="sync-status" id="sync-status"></div>
        <button class="sync-btn danger" onclick="syncUI.disconnect()">Disconnect</button>`;
    } else {
      el.innerHTML=`<h3>☁ Cloud Sync</h3>
        <div class="sync-sub">Sync progress across devices. Pick a PIN you'll remember — use the same PIN on other devices to connect.</div>
        <input type="text" id="sync-pin-input" placeholder="e.g. maria-spanish" autocomplete="off" autocapitalize="off" spellcheck="false">
        <div class="sync-hint">💡 Use something like your-name (e.g. "maria", "tad"). Same PIN on another device = synced progress.</div>
        <div class="sync-btn-row"><button class="sync-btn secondary" onclick="syncUI.closeModal()">Cancel</button><button class="sync-btn primary" onclick="syncUI.connect()">Connect</button></div>
        <div class="sync-status" id="sync-status"></div>`;
      setTimeout(()=>document.getElementById('sync-pin-input')?.focus(),100);
    }
  }

  async function connect(){
    const inp=document.getElementById('sync-pin-input');
    const p=(inp?.value||'').trim().toLowerCase().replace(/[^a-z0-9\-_]/g,'');
    if(p.length<3){showSt('PIN must be at least 3 characters',false);return}
    pin=p;localStorage.setItem('sync_pin_'+appId,pin);updateFab();
    showSt('Connecting...',true);
    const cloud=await load();
    if(cloud){showSt('Found cloud data! Use Pull to load it.',true)}
    else if(typeof getAppState==='function'){await save(getAppState());showSt('Connected & backed up!',true)}
    else showSt('Connected!',true);
    setTimeout(()=>renderModal(),1200);
  }

  function disconnect(){
    if(!confirm('Disconnect sync? Local progress stays.'))return;
    pin='';localStorage.removeItem('sync_pin_'+appId);localStorage.removeItem('sync_last_'+appId);
    updateFab();renderModal();
  }

  async function doPush(){
    if(typeof getAppState!=='function'){showSt('Not configured',false);return}
    showSt('Pushing...',true);const ok=await save(getAppState());showSt(ok?'Pushed ✓':'Failed ✗',ok);
  }

  async function doPull(){
    showSt('Pulling...',true);const d=await load();
    if(d&&typeof setAppState==='function'){setAppState(d);showSt('Pulled ✓',true)}
    else showSt(d?'Not configured':'No cloud data',false);
  }

  async function doSync(){
    showSt('Syncing...',true);const cloud=await load();
    const local=typeof getAppState==='function'?getAppState():null;
    if(!local){showSt('Not configured',false);return}
    if(cloud&&(cloud.xp||0)>(local.xp||0)){
      if(typeof setAppState==='function')setAppState(cloud);showSt('Pulled newer cloud data ✓',true);
    }else{await save(local);showSt('Pushed local progress ✓',true)}
  }

  function showSt(m,ok){const e=document.getElementById('sync-status');if(e){e.textContent=m;e.className='sync-status '+(ok?'ok':'err')}}

  return{init,save,load,isConnected,openModal,closeModal,connect,disconnect,doPush,doPull,doSync};
})();

// Initialize sync
syncUI.init('habla-spanish');
</script>
</body>
</html>
