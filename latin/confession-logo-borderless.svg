<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="geometricPrecision">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="80%">
      <stop offset="0%"  stop-color="#8a3a42"/>
      <stop offset="45%" stop-color="#5a2028"/>
      <stop offset="100%" stop-color="#2a1014"/>
    </radialGradient>

    <linearGradient id="goldBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#6e4e06"/>
      <stop offset="15%" stop-color="#a77c10"/>
      <stop offset="40%" stop-color="#e9c355"/>
      <stop offset="60%" stop-color="#f5d77b"/>
      <stop offset="85%" stop-color="#b58514"/>
      <stop offset="100%" stop-color="#6e4e06"/>
    </linearGradient>
    <radialGradient id="goldBow" cx="30%" cy="25%" r="85%">
      <stop offset="0%"  stop-color="#fbe59b"/>
      <stop offset="25%" stop-color="#f0c85a"/>
      <stop offset="60%" stop-color="#c69412"/>
      <stop offset="100%" stop-color="#6e4e06"/>
    </radialGradient>

    <linearGradient id="silverBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#4a4a52"/>
      <stop offset="15%" stop-color="#7e7e87"/>
      <stop offset="40%" stop-color="#cbcbd3"/>
      <stop offset="60%" stop-color="#e8e8ef"/>
      <stop offset="85%" stop-color="#8e8e97"/>
      <stop offset="100%" stop-color="#4a4a52"/>
    </linearGradient>
    <radialGradient id="silverBow" cx="30%" cy="25%" r="85%">
      <stop offset="0%"  stop-color="#f2f2f8"/>
      <stop offset="25%" stop-color="#c8c8d0"/>
      <stop offset="60%" stop-color="#808088"/>
      <stop offset="100%" stop-color="#3e3e46"/>
    </radialGradient>

    <radialGradient id="medallion" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#000" stop-opacity="0.2"/>
      <stop offset="80%" stop-color="#000" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0.1 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="keyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" in="SourceAlpha"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <symbol id="key" overflow="visible">
      <rect x="-28" y="-260" width="56" height="540" fill="url(#goldBar)"
            stroke="#5a3d03" stroke-width="2"/>
      <rect x="-6" y="-258" width="4" height="536" fill="#fbe59b" opacity="0.6"/>
      <circle cx="0" cy="340" r="130" fill="url(#goldBow)"
              stroke="#5a3d03" stroke-width="4"/>
      <circle cx="0" cy="340" r="62" fill="#4a1821"/>
      <circle cx="0" cy="340" r="62" fill="none" stroke="#5a3d03" stroke-width="3"/>
      <path d="M -100 290 A 120 120 0 0 1 -10 230"
            fill="none" stroke="#fbe59b" stroke-width="10"
            stroke-linecap="round" opacity="0.9"/>
      <path d="M -75 270 A 105 105 0 0 1 -22 238"
            fill="none" stroke="#fff3c8" stroke-width="5"
            stroke-linecap="round" opacity="0.7"/>
      <rect x="-46" y="265" width="92" height="32" fill="#5a3d03"/>
      <rect x="-42" y="269" width="84" height="24" fill="url(#goldBar)"/>
      <rect x="-42" y="269" width="84" height="5" fill="#fbe59b" opacity="0.7"/>
      <rect x="-42" y="288" width="84" height="3" fill="#3a2400" opacity="0.5"/>
      <path d="M 28 -260 L 180 -260 L 180 -220 L 230 -220 L 230 -180
               L 180 -180 L 180 -140 L 240 -140 L 240 -100 L 180 -100
               L 180 -60 L 28 -60 Z"
            fill="url(#goldBow)" stroke="#5a3d03" stroke-width="4"
            stroke-linejoin="miter"/>
      <path d="M 32 -256 L 176 -256 L 176 -220 L 226 -220"
            fill="none" stroke="#fbe59b" stroke-width="4" opacity="0.7"/>
      <path d="M 32 -256 L 32 -64"
            fill="none" stroke="#fbe59b" stroke-width="3" opacity="0.5"/>
      <circle cx="90" cy="-175" r="16" fill="#5a3d03"/>
      <circle cx="90" cy="-175" r="10" fill="#2a1c00"/>
      <circle cx="86" cy="-179" r="3" fill="#fbe59b" opacity="0.5"/>
      <rect x="-32" y="-282" width="64" height="24" fill="#5a3d03"/>
      <rect x="-28" y="-280" width="56" height="20" fill="url(#goldBar)"/>
      <rect x="-28" y="-280" width="56" height="4" fill="#fbe59b" opacity="0.6"/>
      <circle cx="0" cy="-286" r="10" fill="#5a3d03"/>
      <circle cx="0" cy="-288" r="7" fill="url(#goldBow)"/>
    </symbol>

    <symbol id="keySilver" overflow="visible">
      <rect x="-28" y="-260" width="56" height="540" fill="url(#silverBar)"
            stroke="#3e3e46" stroke-width="2"/>
      <rect x="-6" y="-258" width="4" height="536" fill="#f2f2f8" opacity="0.6"/>
      <circle cx="0" cy="340" r="130" fill="url(#silverBow)"
              stroke="#3e3e46" stroke-width="4"/>
      <circle cx="0" cy="340" r="62" fill="#4a1821"/>
      <circle cx="0" cy="340" r="62" fill="none" stroke="#3e3e46" stroke-width="3"/>
      <path d="M -100 290 A 120 120 0 0 1 -10 230"
            fill="none" stroke="#f2f2f8" stroke-width="10"
            stroke-linecap="round" opacity="0.9"/>
      <path d="M -75 270 A 105 105 0 0 1 -22 238"
            fill="none" stroke="#ffffff" stroke-width="5"
            stroke-linecap="round" opacity="0.7"/>
      <rect x="-46" y="265" width="92" height="32" fill="#3e3e46"/>
      <rect x="-42" y="269" width="84" height="24" fill="url(#silverBar)"/>
      <rect x="-42" y="269" width="84" height="5" fill="#f2f2f8" opacity="0.7"/>
      <rect x="-42" y="288" width="84" height="3" fill="#1a1a22" opacity="0.5"/>
      <path d="M 28 -260 L 180 -260 L 180 -220 L 230 -220 L 230 -180
               L 180 -180 L 180 -140 L 240 -140 L 240 -100 L 180 -100
               L 180 -60 L 28 -60 Z"
            fill="url(#silverBow)" stroke="#3e3e46" stroke-width="4"
            stroke-linejoin="miter"/>
      <path d="M 32 -256 L 176 -256 L 176 -220 L 226 -220"
            fill="none" stroke="#f2f2f8" stroke-width="4" opacity="0.7"/>
      <path d="M 32 -256 L 32 -64"
            fill="none" stroke="#f2f2f8" stroke-width="3" opacity="0.5"/>
      <circle cx="90" cy="-175" r="16" fill="#3e3e46"/>
      <circle cx="90" cy="-175" r="10" fill="#0a0a12"/>
      <circle cx="86" cy="-179" r="3" fill="#f2f2f8" opacity="0.5"/>
      <rect x="-32" y="-282" width="64" height="24" fill="#3e3e46"/>
      <rect x="-28" y="-280" width="56" height="20" fill="url(#silverBar)"/>
      <rect x="-28" y="-280" width="56" height="4" fill="#f2f2f8" opacity="0.6"/>
      <circle cx="0" cy="-286" r="10" fill="#3e3e46"/>
      <circle cx="0" cy="-288" r="7" fill="url(#silverBow)"/>
    </symbol>
</defs>

  <!-- Background: same rich crimson, but goes all the way to edges for app icon -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#medallion)"/>

  <!-- Keys scaled up to 1.30 to fill the frame nicely with iOS rounded corners -->
  <g filter="url(#keyShadow)">
    <g transform="translate(512,440) rotate(22) scale(1.30)">
      <use href="#keySilver"/>
    </g>
    <g transform="translate(512,440) rotate(-22) scale(-1.30,1.30)">
      <use href="#key"/>
    </g>
  </g>

  <!-- Simpler, larger cord knot for visibility at small sizes -->
  <g transform="translate(512,440)">
    <ellipse cx="0" cy="6" rx="145" ry="38" fill="#000" opacity="0.3"/>
    <path d="M -140 -24 Q -65 -11 0 -11 Q 65 -11 140 -24
             L 140 18 Q 65 32 0 32 Q -65 32 -140 18 Z"
          fill="url(#goldBow)" stroke="#5a3d03" stroke-width="4"/>
    <path d="M -125 -18 Q 0 -6 125 -18"
          fill="none" stroke="#fbe59b" stroke-width="4" opacity="0.8"/>
    <ellipse cx="0" cy="4" rx="30" ry="24" fill="#5a3d03"/>
    <ellipse cx="0" cy="0" rx="25" ry="19" fill="url(#goldBow)"/>
    <ellipse cx="-7" cy="-6" rx="7" ry="4" fill="#fbe59b" opacity="0.9"/>
  </g>

  <!-- Light paper grain, gentler at small sizes -->
  <rect width="1024" height="1024" filter="url(#grain)" opacity="0.3"/>
</svg>
